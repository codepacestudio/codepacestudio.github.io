<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Casino 5X Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { 
            background: radial-gradient(circle at center, #1e1b4b 0%, #000000 100%);
            color: #fff; font-family: 'Montserrat', sans-serif; 
            min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 20px;
        }

        .machine {
            background: #0f172a;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 60px rgba(0,0,0,0.9), inset 0 0 20px rgba(251, 191, 36, 0.1);
            border: 2px solid #334155;
            border-top: 4px solid #fbbf24;
            text-align: center;
            width: 100%;
            max-width: 800px;
        }

        .title {
            font-size: 2.5rem;
            font-weight: 900;
            color: #fbbf24;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 2px 10px rgba(251, 191, 36, 0.4);
        }

        .slot-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            background: #020617;
            padding: 20px;
            border-radius: 15px;
            border: inset 4px #1e293b;
            margin-bottom: 30px;
        }

        .cell {
            background: #1e293b;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3.5rem;
            border-radius: 10px;
            border: 1px solid #334155;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            transition: 0.3s;
        }

        .cell.spinning {
            filter: blur(4px);
            animation: vibrate 0.1s infinite;
        }

        @keyframes vibrate {
            0% { transform: translate(0, 0); }
            50% { transform: translate(1px, 1px); }
            100% { transform: translate(0, 0); }
        }

        .cell.win {
            background: rgba(251, 191, 36, 0.2);
            border-color: #fbbf24;
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.5), inset 0 0 20px rgba(251, 191, 36, 0.3);
            animation: pulseWin 1s infinite;
        }

        @keyframes pulseWin {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            font-size: 1.5rem;
            font-weight: 900;
            background: #000;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #334155;
        }

        .kasa { color: #10b981; }
        .wygrana { color: #fbbf24; transition: transform 0.2s; }
        .wygrana.bump { transform: scale(1.2); }

        .action-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .bet-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #020617;
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid #334155;
        }

        .bet-btn {
            background: #3b82f6;
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            font-size: 1.8rem;
            font-weight: 900;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .bet-btn:hover { background: #2563eb; }
        .bet-btn:active { transform: scale(0.95); }

        .bet-amount {
            font-size: 1.5rem;
            font-weight: 900;
            width: 140px;
            color: #fff;
        }

        .spin-btn {
            flex: 1;
            background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%);
            color: #000;
            border: none;
            padding: 20px;
            font-size: 2.5rem;
            font-weight: 900;
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 5px 20px rgba(245, 158, 11, 0.4);
            transition: 0.2s;
        }

        .spin-btn:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .spin-btn:active { transform: translateY(2px); box-shadow: 0 2px 10px rgba(245, 158, 11, 0.4); }
        .spin-btn:disabled { background: #475569; color: #94a3b8; cursor: not-allowed; transform: none; box-shadow: none; }

        .message {
            margin-top: 25px;
            font-size: 1.5rem;
            font-weight: 900;
            height: 35px;
            color: #fbbf24;
            text-transform: uppercase;
        }

        /* Responsywność dla urządzeń mobilnych */
        @media (max-width: 768px) {
            body { padding: 10px; }
            .machine { padding: 20px; }
            .title { font-size: 1.8rem; margin-bottom: 20px; }
            
            .slot-grid {
                grid-template-columns: repeat(5, minmax(0, 1fr)); /* Pozwala komórkom na większe ściskanie */
                gap: 5px;
                padding: 10px;
            }
            .cell {
                height: 80px; /* Znaczne zmniejszenie wysokości komórek */
                font-size: 2.2rem; /* Zmniejszenie emoji */
            }

            .info-panel {
                font-size: 1rem;
                padding: 10px;
                flex-direction: column;
                gap: 5px;
                text-align: center;
            }

            .action-row {
                flex-direction: column;
                gap: 15px;
            }

            .bet-controls {
                width: 100%;
                justify-content: center;
                padding: 10px;
            }
            .bet-amount { font-size: 1.1rem; width: auto; }
            .bet-btn { width: 35px; height: 35px; font-size: 1.3rem; }

            .spin-btn {
                width: 100%;
                padding: 15px;
                font-size: 1.8rem;
            }

            .message { font-size: 1.1rem; height: auto; padding: 10px 0; }
        }
    </style>
</head>
<body>

    <div class="machine">
        <div class="title">Grand Casino 5X</div>
        
        <div class="slot-grid" id="grid">
            </div>

        <div class="controls">
            <div class="info-panel">
                <span class="kasa">Kasa: <span id="balance">100</span> PLN</span>
                <span class="wygrana">Wygrana: <span id="win">0</span> PLN</span>
            </div>

            <div class="action-row">
                <div class="bet-controls">
                    <button class="bet-btn" onclick="changeBet(-10)">-</button>
                    <div class="bet-amount">Stawka: <span id="bet">10</span></div>
                    <button class="bet-btn" onclick="changeBet(10)">+</button>
                </div>
                <button class="spin-btn" id="spinBtn" onclick="spin()">SPIN</button>
            </div>
        </div>

        <div class="message" id="msg">ZAKRĘĆ BĘBNAMI!</div>
    </div>

    <script>
        const symbols = ['🍒', '🍋', '🍉', '🍇', '🔔', '⭐', '7️⃣'];
        const multipliers = { '🍒': 2, '🍋': 3, '🍉': 5, '🍇': 8, '🔔': 15, '⭐': 25, '7️⃣': 50 };
        
        const paylines = [
            [0, 1, 2, 3, 4],    // Pozioma góra
            [5, 6, 7, 8, 9],    // Pozioma środek
            [10, 11, 12, 13, 14], // Pozioma dół
            [0, 6, 12, 8, 4],   // Linia V w dół
            [10, 6, 2, 8, 14]   // Linia V w górę
        ];

        let balance = 100;
        let bet = 10;
        let isSpinning = false;
        let cells = [];

        const grid = document.getElementById('grid');
        for (let i = 0; i < 15; i++) {
            let cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerText = getRandomSymbol();
            grid.appendChild(cell);
            cells.push(cell);
        }

        const balanceEl = document.getElementById('balance');
        const betEl = document.getElementById('bet');
        const winEl = document.getElementById('win');
        const msgEl = document.getElementById('msg');
        const spinBtn = document.getElementById('spinBtn');

        function getRandomSymbol() {
            // Pool z przewagą tańszych symboli dla lepszej grywalności
            const weightedSymbols = ['🍒','🍒','🍒','🍒','🍋','🍋','🍋','🍉','🍉','🍉','🍇','🍇','🔔','⭐','7️⃣'];
            return weightedSymbols[Math.floor(Math.random() * weightedSymbols.length)];
        }

        function changeBet(amount) {
            if (isSpinning) return;
            let newBet = bet + amount;
            if (newBet >= 10 && newBet <= 500) {
                bet = newBet;
                betEl.innerText = bet;
            }
        }

        function spin() {
            if (isSpinning) return;
            if (balance < bet) {
                msgEl.innerText = "BRAK ŚRODKÓW! ODŚWIEŻ STRONĘ.";
                msgEl.style.color = "#ef4444";
                return;
            }

            isSpinning = true;
            spinBtn.disabled = true;
            balance -= bet;
            winEl.innerText = "0";
            winEl.parentElement.classList.remove('bump');
            msgEl.innerText = "KRĘCĘ...";
            msgEl.style.color = "#fff";
            balanceEl.innerText = balance;

            cells.forEach(c => {
                c.classList.remove('win');
                c.classList.add('spinning');
            });

            let spins = 0;
            const maxSpins = 20;
            
            const interval = setInterval(() => {
                spins++;
                
                for(let col = 0; col < 5; col++) {
                    // Stopowanie bębnów po kolei od lewej
                    if (spins < 10 + (col * 3)) {
                        cells[col].innerText = getRandomSymbol();
                        cells[col + 5].innerText = getRandomSymbol();
                        cells[col + 10].innerText = getRandomSymbol();
                    } else {
                        // Zatrzymane bębny nie wibrują i nie są rozmyte
                        cells[col].classList.remove('spinning');
                        cells[col + 5].classList.remove('spinning');
                        cells[col + 10].classList.remove('spinning');
                    }
                }

                if (spins >= 22) {
                    clearInterval(interval);
                    checkWin();
                }
            }, 60);
        }

        function checkWin() {
            let totalWin = 0;
            let winningCells = new Set();

            paylines.forEach(line => {
                let symbol = cells[line[0]].innerText;
                let count = 1;
                let lineWinCells = [line[0]];

                // Sprawdzanie nieprzerwanego ciągu od lewej
                for (let i = 1; i < 5; i++) {
                    if (cells[line[i]].innerText === symbol) {
                        count++;
                        lineWinCells.push(line[i]);
                    } else {
                        break; 
                    }
                }

                // Minimum 3 symbole od lewej dają wygraną
                if (count >= 3) {
                    let baseWin = multipliers[symbol] * (bet / 10); // Przelicznik wygranej
                    // Bonus za więcej symboli w linii
                    let multiplier = (count === 3) ? 1 : (count === 4) ? 5 : 20;
                    totalWin += baseWin * multiplier;
                    
                    lineWinCells.forEach(idx => winningCells.add(idx));
                }
            });

            isSpinning = false;
            spinBtn.disabled = false;

            if (totalWin > 0) {
                totalWin = Math.floor(totalWin);
                balance += totalWin;
                winEl.innerText = totalWin;
                winEl.parentElement.classList.add('bump'); // Efekt bumpu na wygranej
                balanceEl.innerText = balance;
                msgEl.innerText = `WYGRYWASZ ${totalWin} PLN!`;
                msgEl.style.color = "#10b981";
                
                winningCells.forEach(idx => cells[idx].classList.add('win')); // Pulsowanie wygranych komórek
            } else {
                msgEl.innerText = "SPRÓBUJ PONOWNIE!";
                msgEl.style.color = "#94a3b8";
            }
        }
    </script>
</body>
</html>
