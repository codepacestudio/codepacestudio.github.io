<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Slot Machine</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { 
            background: radial-gradient(circle at center, #2c3e50 0%, #000000 100%);
            color: #fff; font-family: 'Montserrat', sans-serif; 
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .machine {
            background: #1e293b;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8), inset 0 0 10px rgba(255,255,255,0.1);
            border: 4px solid #334155;
            text-align: center;
            width: 100%;
            max-width: 500px;
        }

        .title {
            font-size: 2rem;
            font-weight: 900;
            color: #f59e0b;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .display {
            display: flex;
            justify-content: space-between;
            background: #0f172a;
            padding: 20px;
            border-radius: 15px;
            border: inset 5px #000;
            margin-bottom: 30px;
        }

        .reel {
            font-size: 4rem;
            width: 100px;
            height: 120px;
            background: #fff;
            color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: 700;
            background: #000;
            padding: 15px;
            border-radius: 10px;
            color: #10b981;
        }

        .bet-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        .bet-btn {
            background: #3b82f6;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            font-size: 1.5rem;
            font-weight: 900;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
        }

        .bet-btn:hover { background: #2563eb; }
        .bet-btn:active { transform: scale(0.95); }

        .bet-amount {
            font-size: 1.5rem;
            font-weight: 900;
            width: 100px;
        }

        .spin-btn {
            background: linear-gradient(to bottom, #ef4444, #b91c1c);
            color: white;
            border: none;
            padding: 20px;
            font-size: 2rem;
            font-weight: 900;
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4);
            transition: 0.2s;
        }

        .spin-btn:hover { filter: brightness(1.2); }
        .spin-btn:active { transform: translateY(4px); box-shadow: 0 1px 5px rgba(239, 68, 68, 0.4); }
        .spin-btn:disabled { background: #475569; cursor: not-allowed; transform: none; box-shadow: none; }

        .message {
            margin-top: 20px;
            font-size: 1.5rem;
            font-weight: 900;
            height: 30px;
            color: #fbbf24;
        }
    </style>
</head>
<body>

    <div class="machine">
        <div class="title">Casino 777</div>
        
        <div class="display">
            <div class="reel" id="r1">🍒</div>
            <div class="reel" id="r2">🍋</div>
            <div class="reel" id="r3">🔔</div>
        </div>

        <div class="controls">
            <div class="info-panel">
                <span>Kasa: <span id="balance">100</span> PLN</span>
                <span>Wygrana: <span id="win">0</span> PLN</span>
            </div>

            <div class="bet-controls">
                <button class="bet-btn" onclick="changeBet(-10)">-</button>
                <div class="bet-amount">Stawka: <span id="bet">10</span></div>
                <button class="bet-btn" onclick="changeBet(10)">+</button>
            </div>

            <button class="spin-btn" id="spinBtn" onclick="spin()">SPIN</button>
        </div>

        <div class="message" id="msg"></div>
    </div>

    <script>
        const symbols = ['🍒', '🍋', '🍉', '🍇', '🔔', '⭐', '7️⃣'];
        let balance = 100;
        let bet = 10;
        let isSpinning = false;

        const r1 = document.getElementById('r1');
        const r2 = document.getElementById('r2');
        const r3 = document.getElementById('r3');
        const balanceEl = document.getElementById('balance');
        const betEl = document.getElementById('bet');
        const winEl = document.getElementById('win');
        const msgEl = document.getElementById('msg');
        const spinBtn = document.getElementById('spinBtn');

        function changeBet(amount) {
            if (isSpinning) return;
            let newBet = bet + amount;
            if (newBet >= 10 && newBet <= 100) {
                bet = newBet;
                betEl.innerText = bet;
            }
        }

        function updateUI() {
            balanceEl.innerText = balance;
        }

        function spin() {
            if (isSpinning) return;
            if (balance < bet) {
                msgEl.innerText = "Brak środków! Odśwież stronę.";
                msgEl.style.color = "#ef4444";
                return;
            }

            isSpinning = true;
            spinBtn.disabled = true;
            balance -= bet;
            winEl.innerText = "0";
            msgEl.innerText = "";
            updateUI();

            let spins = 0;
            const maxSpins = 20;
            
            const interval = setInterval(() => {
                r1.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                r2.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                r3.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                spins++;

                if (spins >= maxSpins) {
                    clearInterval(interval);
                    checkWin();
                }
            }, 50);
        }

        function checkWin() {
            const v1 = r1.innerText;
            const v2 = r2.innerText;
            const v3 = r3.innerText;

            isSpinning = false;
            spinBtn.disabled = false;

            if (v1 === v2 && v2 === v3) {
                let multiplier = (v1 === '7️⃣') ? 50 : 10;
                let winAmount = bet * multiplier;
                balance += winAmount;
                winEl.innerText = winAmount;
                msgEl.innerText = `WYGRYWASZ ${winAmount} PLN!`;
                msgEl.style.color = "#10b981";
                updateUI();
            } else {
                msgEl.innerText = "Spróbuj ponownie!";
                msgEl.style.color = "#94a3b8";
            }
        }
    </script>
</body>
</html>
