<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Scatter 6x4</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { 
            background: radial-gradient(circle at center, #1e1b4b 0%, #000000 100%);
            color: #fff; font-family: 'Montserrat', sans-serif; 
            min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 20px;
        }

        .machine {
            background: #0f172a;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 60px rgba(0,0,0,0.9), inset 0 0 20px rgba(251, 191, 36, 0.1);
            border: 2px solid #334155;
            border-top: 4px solid #fbbf24;
            text-align: center;
            width: 100%;
            max-width: 900px;
            position: relative;
            overflow: hidden;
        }

        .title {
            font-size: 2.2rem;
            font-weight: 900;
            color: #fbbf24;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 2px 10px rgba(251, 191, 36, 0.4);
        }

        .message {
            font-size: 1.5rem;
            font-weight: 900;
            height: 35px;
            color: #fbbf24;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .slot-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            background: #020617;
            padding: 15px;
            border-radius: 15px;
            border: inset 4px #1e293b;
            margin-bottom: 25px;
        }

        .cell {
            background: #1e293b;
            height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            border-radius: 10px;
            border: 1px solid #334155;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
            transition: 0.3s;
        }

        .cell.spinning {
            filter: blur(4px);
            animation: vibrate 0.1s infinite;
        }

        @keyframes vibrate {
            0% { transform: translate(0, 0); }
            50% { transform: translate(1px, 1px); }
            100% { transform: translate(0, 0); }
        }

        .cell.win {
            background: rgba(251, 191, 36, 0.2);
            border-color: #fbbf24;
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.5), inset 0 0 20px rgba(251, 191, 36, 0.3);
            animation: pulseWin 1s infinite;
        }

        @keyframes pulseWin {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            font-size: 1.5rem;
            font-weight: 900;
            background: #000;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #334155;
        }

        .kasa { color: #10b981; }
        .wygrana { color: #fbbf24; transition: transform 0.2s; }
        .wygrana.bump { transform: scale(1.2); }

        .action-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .bet-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #020617;
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid #334155;
        }

        .bet-btn {
            background: #3b82f6;
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            font-size: 1.8rem;
            font-weight: 900;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .bet-btn:hover { background: #2563eb; }
        .bet-btn:active { transform: scale(0.95); }

        .bet-amount {
            font-size: 1.5rem;
            font-weight: 900;
            width: 140px;
            color: #fff;
        }

        .spin-btn {
            flex: 1;
            background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%);
            color: #000;
            border: none;
            padding: 20px;
            font-size: 2.5rem;
            font-weight: 900;
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 5px 20px rgba(245, 158, 11, 0.4);
            transition: 0.2s;
        }

        .spin-btn:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .spin-btn:active { transform: translateY(2px); box-shadow: 0 2px 10px rgba(245, 158, 11, 0.4); }
        .spin-btn:disabled { background: #475569; color: #94a3b8; cursor: not-allowed; transform: none; box-shadow: none; }

        /* OVERLAY WYGRANEJ */
        .win-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .win-overlay.active {
            display: flex;
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .win-text {
            font-size: 3rem;
            color: #10b981;
            font-weight: 900;
            text-shadow: 0 0 30px rgba(16, 185, 129, 0.6);
            text-align: center;
            margin-bottom: 10px;
        }

        .big-win-text {
            font-size: 5rem;
            color: #fbbf24;
            font-weight: 900;
            text-shadow: 0 0 40px rgba(251, 191, 36, 0.8);
            display: none;
            text-transform: uppercase;
            animation: bigWinPulse 0.5s infinite alternate;
        }

        @keyframes bigWinPulse {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        @media (max-width: 768px) {
            body { padding: 5px; }
            .machine { padding: 15px; }
            .title { font-size: 1.5rem; margin-bottom: 10px; }
            .message { font-size: 1.1rem; height: 25px; margin-bottom: 10px;}
            
            .slot-grid {
                grid-template-columns: repeat(6, minmax(0, 1fr)); 
                gap: 4px;
                padding: 8px;
            }
            .cell { height: 65px; font-size: 2rem; }

            .info-panel { font-size: 1rem; padding: 10px; flex-direction: column; gap: 5px; text-align: center; }
            .action-row { flex-direction: column; gap: 10px; }

            .bet-controls { width: 100%; justify-content: center; padding: 8px; }
            .bet-amount { font-size: 1.1rem; width: auto; }
            .bet-btn { width: 35px; height: 35px; font-size: 1.3rem; }

            .spin-btn { width: 100%; padding: 12px; font-size: 1.6rem; }

            .win-text { font-size: 2rem; }
            .big-win-text { font-size: 3.5rem; }
        }
    </style>
</head>
<body>

    <div class="machine">
        <div class="win-overlay" id="winOverlay">
            <div class="win-text" id="winText">WYGRYWASZ 0.00 PLN!</div>
            <div class="big-win-text" id="bigWinText">BIG WIN!</div>
        </div>

        <div class="title">Mega Scatter 6x4</div>
        <div class="message" id="msg">GOTOWY DO GRY</div>
        
        <div class="slot-grid" id="grid"></div>

        <div class="controls">
            <div class="info-panel">
                <span class="kasa">Kasa: <span id="balance">100.00</span> PLN</span>
                <span class="wygrana">Wygrana: <span id="win">0.00</span> PLN</span>
            </div>

            <div class="action-row">
                <div class="bet-controls">
                    <button class="bet-btn" onclick="changeBet(-0.5)">-</button>
                    <div class="bet-amount">Stawka: <span id="bet">1.00</span></div>
                    <button class="bet-btn" onclick="changeBet(0.5)">+</button>
                </div>
                <button class="spin-btn" id="spinBtn" onclick="spin()">SPIN</button>
            </div>
        </div>
    </div>

    <script>
        const fruits = ['🍒', '🍋', '🍉', '🍇'];
        const colsCount = 6;
        const rowsCount = 4;
        const totalCells = colsCount * rowsCount;

        let balance = 100.00;
        let bet = 1.00;
        let isSpinning = false;
        let cells = [];

        const grid = document.getElementById('grid');
        for (let i = 0; i < totalCells; i++) {
            let cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerText = getRandomSymbol();
            grid.appendChild(cell);
            cells.push(cell);
        }

        const balanceEl = document.getElementById('balance');
        const betEl = document.getElementById('bet');
        const winEl = document.getElementById('win');
        const msgEl = document.getElementById('msg');
        const spinBtn = document.getElementById('spinBtn');
        const winOverlay = document.getElementById('winOverlay');
        const winText = document.getElementById('winText');
        const bigWinText = document.getElementById('bigWinText');

        function getRandomSymbol() {
            const pool = ['🍒','🍒','🍒','🍋','🍋','🍉','🍉','🍇','🍇','🔔','⭐','7️⃣'];
            return pool[Math.floor(Math.random() * pool.length)];
        }

        function changeBet(amount) {
            if (isSpinning) return;
            let newBet = bet + amount;
            if (newBet >= 0.50 && newBet <= 500) {
                bet = newBet;
                betEl.innerText = bet.toFixed(2);
            }
        }

        // Pobiera komórki z konkretnej kolumny
        function getColCells(colIndex) {
            let colCells = [];
            for (let row = 0; row < rowsCount; row++) {
                colCells.push(cells[colIndex + row * colsCount]);
            }
            return colCells;
        }

        function spin() {
            if (isSpinning) return;
            if (balance < bet) {
                msgEl.innerText = "BRAK ŚRODKÓW!";
                msgEl.style.color = "#ef4444";
                return;
            }

            isSpinning = true;
            spinBtn.disabled = true;
            balance -= bet;
            winEl.innerText = "0.00";
            winEl.parentElement.classList.remove('bump');
            msgEl.innerText = "KRĘCĘ...";
            msgEl.style.color = "#fff";
            balanceEl.innerText = balance.toFixed(2);
            winOverlay.classList.remove('active');

            cells.forEach(c => {
                c.classList.remove('win');
                c.classList.add('spinning');
            });

            let spins = 0;
            
            const interval = setInterval(() => {
                spins++;
                
                for(let col = 0; col < colsCount; col++) {
                    if (spins < 10 + (col * 3)) {
                        for(let row = 0; row < rowsCount; row++) {
                            cells[col + row * colsCount].innerText = getRandomSymbol();
                        }
                    } else {
                        for(let row = 0; row < rowsCount; row++) {
                            cells[col + row * colsCount].classList.remove('spinning');
                        }
                    }
                }

                if (spins >= 30) {
                    clearInterval(interval);
                    checkWin();
                }
            }, 50);
        }

        function checkWin() {
            let totalWin = 0;
            let winningCellsDom = new Set();

            // Skanujemy wszystkie unikalne symbole w pierwszej kolumnie
            let reel0Symbols = [...new Set(getColCells(0).map(c => c.innerText))];

            reel0Symbols.forEach(symbol => {
                let symbolCount = 0;
                let currentWinCells = [];

                // Sprawdzamy kolejne kolumny od lewej
                for (let col = 0; col < colsCount; col++) {
                    let foundCells = getColCells(col).filter(c => c.innerText === symbol);
                    if (foundCells.length > 0) {
                        symbolCount += foundCells.length;
                        foundCells.forEach(c => currentWinCells.push(c));
                    } else {
                        break; // Łańcuch przerwany, sprawdzamy ile zebraliśmy do tej pory
                    }
                }

                if (symbolCount >= 3) {
                    // Wygrana bazowa za 3 symbole
                    let baseWin = 0;
                    if (fruits.includes(symbol)) baseWin = bet * 0.5;
                    if (symbol === '🔔') baseWin = bet * 0.8;
                    if (symbol === '⭐') baseWin = bet * 1.0;
                    if (symbol === '7️⃣') baseWin = bet * 2.0;

                    // Mnożniki za większą ilość symboli w łańcuchu
                    let multiplier = 1;
                    if (symbolCount === 4) {
                        if (fruits.includes(symbol)) multiplier = 1.5;
                        if (symbol === '🔔') multiplier = 1.8;
                        if (symbol === '⭐') multiplier = 2.0;
                        if (symbol === '7️⃣') multiplier = 3.0;
                    } else if (symbolCount >= 5) {
                        if (fruits.includes(symbol)) multiplier = 2.0;
                        if (symbol === '🔔') multiplier = 2.5;
                        if (symbol === '⭐') multiplier = 3.0;
                        if (symbol === '7️⃣') multiplier = 5.0;
                    }

                    totalWin += baseWin * multiplier;
                    currentWinCells.forEach(c => winningCellsDom.add(c));
                }
            });

            isSpinning = false;
            spinBtn.disabled = false;

            if (totalWin > 0) {
                balance += totalWin;
                winEl.innerText = totalWin.toFixed(2);
                winEl.parentElement.classList.add('bump');
                balanceEl.innerText = balance.toFixed(2);
                msgEl.innerText = `WYGRYWASZ ${totalWin.toFixed(2)} PLN!`;
                msgEl.style.color = "#10b981";
                
                winningCellsDom.forEach(c => c.classList.add('win'));

                // Logika czarnego ekranu i BIG WIN
                if (totalWin >= bet * 5) {
                    winText.innerText = `WYGRYWASZ ${totalWin.toFixed(2)} PLN!`;
                    if (totalWin >= bet * 10) {
                        bigWinText.style.display = 'block';
                    } else {
                        bigWinText.style.display = 'none';
                    }
                    winOverlay.classList.add('active');

                    setTimeout(() => {
                        winOverlay.classList.remove('active');
                    }, 2500);
                }

            } else {
                msgEl.innerText = "SPRÓBUJ PONOWNIE!";
                msgEl.style.color = "#94a3b8";
            }
        }
    </script>
</body>
</html>
