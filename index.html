<style>
        :root {
            --bg-color: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #475569;
            --accent: #2563eb;
            --card-bg: #ffffff;
            --nav-bg: rgba(15, 23, 42, 0.95); /* Dark nav to match the image */
        }

        /* --- Global Reset & Animations --- */
        html {
            scroll-behavior: smooth;
            box-sizing: border-box;
        }
        *, *:before, *:after {
            box-sizing: inherit;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.7;
            padding-top: 70px; /* Space for fixed nav */
        }

        /* --- Navigation --- */
        nav {
            background-color: var(--nav-bg);
            padding: 15px 0;
            position: fixed;
            width: 100%;
            top: 0;
            box-shadow: 0 1px 15px rgba(0,0,0,0.1);
            z-index: 1000;
            display: flex;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        nav .nav-container {
            display: flex;
            gap: 25px;
            max-width: 900px;
            width: 90%;
            justify-content: center;
        }

        nav a {
            text-decoration: none;
            color: #f1f5f9; /* Light text for dark nav */
            font-weight: 600;
            font-size: 0.95rem;
            transition: color 0.3s ease;
            position: relative;
        }

        nav a:hover { color: #fdfefe; opacity: 1; } /* Dark blue accent is invisible here, so we go slightly white */
        nav a:after {
            content: '';
            position: absolute;
            width: 100%;
            transform: scaleX(0);
            height: 2px;
            bottom: -3px;
            left: 0;
            background-color: var(--accent);
            transform-origin: bottom right;
            transition: transform 0.3s ease;
        }
        nav a:hover:after { transform: scaleX(1); transform-origin: bottom left; }

        /* --- New Header / Hero using generated image --- */
        header {
            background-color: #0f172a; /* Fallback for image load */
            padding: 100px 20px 80px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: -70px; /* Overlap with fixed nav */
        }

        header img.brand-logo {
            max-width: 700px; /* Make the image the focus, adjust width as needed */
            width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        /* Removed old text styles */

        /* --- (Rest of the old styles below) --- */
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <a href="#oferta">Oferta</a>
            <a href="#portfolio">Portfolio</a>
            <a href="#proces">Jak pracuję</a>
            <a href="#kontakt">Kontakt</a>
        </div>
    </nav>

    <header id="start">
        <img src="codepace.png" alt="CodePace Studio Web Development" class="brand-logo">
    </header>
