<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Card Tycoon</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        body {
            background-color: #0f0f13;
            color: #ffffff;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            width: 100%;
            max-width: 500px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background-color: #16161c;
            position: relative;
        }

        /* Sprite Sheet CSS */
        .icon {
            display: inline-block;
            background-image: url('https://i.postimg.cc/MTvnVGbD/IMG-0727.png');
            background-repeat: no-repeat;
            vertical-align: middle;
        }
        
        .icon-hud {
            width: 24px;
            height: 24px;
            background-size: 500% 200%;
        }

        .icon-shirt {
            width: 40px;
            height: 40px;
            background-size: 500% 200%;
            border-radius: 4px;
            background-color: #2a2a35;
        }

        /* Top Row Positions */
        .icon-cash { background-position: 0% 0%; }
        .icon-gem { background-position: 25% 0%; }
        .icon-lootbox { background-position: 50% 0%; }

        /* Bottom Row Positions */
        .icon-shirt-common { background-position: 0% 100%; }
        .icon-shirt-rare { background-position: 25% 100%; }
        .icon-shirt-epic { background-position: 50% 100%; }
        .icon-shirt-mythic { background-position: 75% 100%; }
        .icon-shirt-legendary { background-position: 100% 100%; }

        /* Top HUD */
        #hud {
            display: flex;
            flex-direction: column;
            background-color: #1e1e26;
            padding: 15px;
            border-bottom: 2px solid #2a2a35;
            z-index: 10;
        }

        .currencies {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .currency-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .cash-color { color: #4ade80; }
        .gem-color { color: #c084fc; }

        .global-actions {
            display: flex;
            gap: 8px;
        }

        .btn-global {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.8rem;
            cursor: pointer;
            transition: opacity 0.1s;
        }

        .btn-global:active { opacity: 0.7; }
        .btn-global:disabled { opacity: 0.4; cursor: not-allowed; }
        
        #btn-lootbox { background-color: #9333ea; color: white; }
        #btn-unlock { background-color: #2563eb; color: white; }
        #btn-reset { background-color: #dc2626; color: white; flex: 0.6; }

        /* Scrollable Game Area */
        #game-board {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Station Cards */
        .station {
            background-color: #22222d;
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #333342;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .station-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .level-badge {
            background-color: #3b82f6;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.8rem;
        }

        .station-info {
            font-size: 0.9rem;
            color: #a1a1aa;
        }

        .station-controls {
            display: flex;
            gap: 8px;
            height: 45px;
        }

        .btn-action {
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-action:active { opacity: 0.7; }
        .btn-action:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-work { flex: 2; background-color: #eab308; color: #000; font-size: 1rem; }
        .btn-work.automated { background-color: #22c55e; color: white; pointer-events: none; }
        
        .btn-upg { flex: 2; background-color: #10b981; color: white; flex-direction: column; }
        .btn-upg span { font-size: 0.7rem; font-weight: normal; }
        
        .btn-skin { flex: 1; background-color: #475569; color: white; font-size: 0.8rem; }

        /* Modal */
        #modal-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background-color: #1e1e26;
            padding: 20px;
            border-radius: 12px;
            width: 90%;
            max-height: 80%;
            overflow-y: auto;
            border: 1px solid #333342;
        }

        .modal-title { margin-bottom: 15px; font-size: 1.2rem; text-align: center; }

        .skin-item {
            background-color: #2a2a35;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #333342;
        }

        .skin-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-equip {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-close-modal {
            width: 100%;
            padding: 12px;
            background-color: #ef4444;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud">
        <div class="currencies">
            <div class="currency-item">
                <div class="icon icon-hud icon-cash"></div>
                <span class="cash-color" id="ui-cash">0</span>
            </div>
            <div class="currency-item">
                <div class="icon icon-hud icon-gem"></div>
                <span class="gem-color" id="ui-gems">500</span>
            </div>
        </div>
        <div class="global-actions">
            <button class="btn-global" id="btn-lootbox" onclick="buyLootbox()">Lootbox</button>
            <button class="btn-global" id="btn-unlock" onclick="unlockShaft()">Unlock Shaft</button>
            <button class="btn-global" id="btn-reset" onclick="hardReset()">Reset</button>
        </div>
    </div>

    <div id="game-board">
        <div class="station" id="station-warehouse">
            <div class="station-header">
                Warehouse (Streamer) <span class="level-badge" id="wh-level">Lv 1</span>
            </div>
            <div class="station-info">
                Ready to sell: <span id="wh-stock" style="color:white; font-weight:bold;">0</span> cards<br>
                Multiplier: <span id="wh-mult">1x</span> | Power: <span id="wh-power">2</span>/click
            </div>
            <div class="station-controls">
                <button class="btn-action btn-work" id="wh-work" onclick="workWarehouse()">Work</button>
                <button class="btn-action btn-upg" id="wh-upg" onclick="upgrade('warehouse')">
                    Upgrade <span id="wh-cost">$10</span>
                </button>
                <button class="btn-action btn-skin" id="wh-skin" onclick="openSkinModal('warehouse')">Skin</button>
            </div>
        </div>

        <div class="station" id="station-elevator">
            <div class="station-header">
                Elevator (Transport) <span class="level-badge" id="el-level">Lv 1</span>
            </div>
            <div class="station-info">
                Carrying: <span id="el-stock" style="color:white; font-weight:bold;">0</span> cards<br>
                Multiplier: <span id="el-mult">1x</span> | Capacity: <span id="el-power">5</span>
            </div>
            <div class="station-controls">
                <button class="btn-action btn-work" id="el-work" onclick="workElevator()">Work</button>
                <button class="btn-action btn-upg" id="el-upg" onclick="upgrade('elevator')">
                    Upgrade <span id="el-cost">$15</span>
                </button>
                <button class="btn-action btn-skin" id="el-skin" onclick="openSkinModal('elevator')">Skin</button>
            </div>
        </div>

        <div id="shafts-container"></div>
    </div>

    <div id="modal-overlay">
        <div class="modal-content">
            <div class="modal-title">Equip Skin</div>
            <div id="skins-list"></div>
            <button class="btn-close-modal" onclick="closeModal()">Close</button>
        </div>
    </div>
</div>

<script>
    // Game State
    let cash = 0;
    let gems = 500;
    let maxShafts = 5;
    
    let inventory = [];
    let targetStationForSkin = null;

    let warehouse = { level: 1, cards: 0, auto: false, mult: 1, baseCap: 2, baseCost: 10 };
    let elevator = { level: 1, cards: 0, auto: false, mult: 1, baseCap: 5, baseCost: 15 };
    let shafts = [
        { id: 0, level: 1, cards: 0, auto: false, mult: 1, baseCap: 1, baseCost: 10 }
    ];

    // Core Logic
    function getCost(base, level) {
        return Math.floor(base * Math.pow(1.15, level - 1));
    }

    function getPower(base, level, mult) {
        return Math.floor(base * Math.pow(1.1, level - 1) * mult);
    }

    function getShaftUnlockCost() {
        return Math.floor(100 * Math.pow(4, shafts.length - 1));
    }

    // Actions
    function workWarehouse() {
        let power = getPower(warehouse.baseCap, warehouse.level, warehouse.mult);
        let amount = Math.min(warehouse.cards, power);
        warehouse.cards -= amount;
        cash += amount;
        updateUI();
    }

    function workElevator() {
        let capacity = getPower(elevator.baseCap, elevator.level, elevator.mult);
        
        if (elevator.cards > 0) {
            warehouse.cards += elevator.cards;
            elevator.cards = 0;
        } else {
            let collected = 0;
            for (let i = 0; i < shafts.length; i++) {
                if (collected >= capacity) break;
                let shaft = shafts[i];
                let take = Math.min(shaft.cards, capacity - collected);
                shaft.cards -= take;
                collected += take;
            }
            elevator.cards = collected;
        }
        updateUI();
    }

    function workShaft(id) {
        let shaft = shafts[id];
        let power = getPower(shaft.baseCap, shaft.level, shaft.mult);
        shaft.cards += power;
        updateUI();
    }

    // Upgrades
    function upgrade(type, index = 0) {
        let target = type === 'warehouse' ? warehouse : type === 'elevator' ? elevator : shafts[index];
        let cost = getCost(target.baseCost, target.level);
        
        if (cash >= cost) {
            cash -= cost;
            target.level++;
            updateUI();
        }
    }

    function unlockShaft() {
        let cost = getShaftUnlockCost();
        if (cash >= cost && shafts.length < maxShafts) {
            cash -= cost;
            shafts.push({
                id: shafts.length,
                level: 1,
                cards: 0,
                auto: false,
                mult: 1,
                baseCap: 2 * shafts.length,
                baseCost: 10 * Math.pow(3, shafts.length)
            });
            renderShafts();
            updateUI();
        }
    }

    // Gacha System
    function buyLootbox() {
        if (gems < 100) return;
        gems -= 100;
        
        const roll = Math.random();
        let rarity, mult, color;
        
        if (roll > 0.95)      { rarity = 'Legendary'; mult = 25; color = '#f59e0b'; }
        else if (roll > 0.85) { rarity = 'Mythic'; mult = 10; color = '#ef4444'; }
        else if (roll > 0.65) { rarity = 'Epic'; mult = 5; color = '#a855f7'; }
        else if (roll > 0.40) { rarity = 'Rare'; mult = 3; color = '#3b82f6'; }
        else                  { rarity = 'Common'; mult = 1.5; color = '#a1a1aa'; }
        
        inventory.push({ rarity, mult, color });
        updateUI();
    }

    function openSkinModal(stationType, index = null) {
        targetStationForSkin = { type: stationType, index: index };
        const list = document.getElementById('skins-list');
        list.innerHTML = '';
        
        if (inventory.length === 0) {
            list.innerHTML = '<div style="text-align:center; color:#a1a1aa;">No skins available. Buy Lootboxes!</div>';
        } else {
            inventory.forEach((skin, i) => {
                const div = document.createElement('div');
                div.className = 'skin-item';
                const shirtClass = skin.rarity.toLowerCase();
                
                div.innerHTML = `
                    <div class="skin-info">
                        <div class="icon icon-shirt icon-shirt-${shirtClass}"></div>
                        <div>
                            <strong style="color:${skin.color}">${skin.rarity} Skin</strong><br>
                            <span style="font-size:0.8rem; color:#a1a1aa;">Multiplier: ${skin.mult}x</span>
                        </div>
                    </div>
                    <button class="btn-equip" onclick="equipSkin(${i})">Equip</button>
                `;
                list.appendChild(div);
            });
        }
        document.getElementById('modal-overlay').style.display = 'flex';
    }

    function equipSkin(inventoryIndex) {
        const skin = inventory.splice(inventoryIndex, 1)[0];
        let target = null;
        
        if (targetStationForSkin.type === 'warehouse') target = warehouse;
        else if (targetStationForSkin.type === 'elevator') target = elevator;
        else if (targetStationForSkin.type === 'shaft') target = shafts[targetStationForSkin.index];
        
        if (target) {
            target.mult = skin.mult;
            target.auto = true;
        }
        
        closeModal();
        updateUI();
    }

    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
        targetStationForSkin = null;
    }

    // Save System
    function saveGame() {
        const saveData = {
            cash,
            gems,
            inventory,
            warehouse,
            elevator,
            shafts
        };
        localStorage.setItem('cardTycoonSave', JSON.stringify(saveData));
    }

    function loadGame() {
        const saved = localStorage.getItem('cardTycoonSave');
        if (saved) {
            const data = JSON.parse(saved);
            cash = data.cash || 0;
            gems = data.gems !== undefined ? data.gems : 500;
            inventory = data.inventory || [];
            
            if (data.warehouse) Object.assign(warehouse, data.warehouse);
            if (data.elevator) Object.assign(elevator, data.elevator);
            
            if (data.shafts && data.shafts.length > 0) {
                shafts.length = 0;
                data.shafts.forEach(s => shafts.push(s));
            }
        }
    }

    function hardReset() {
        if(confirm("Are you sure you want to wipe all progress?")) {
            localStorage.removeItem('cardTycoonSave');
            location.reload();
        }
    }

    // Loops
    setInterval(() => {
        if (warehouse.auto) workWarehouse();
        if (elevator.auto) workElevator();
        shafts.forEach(s => { if (s.auto) workShaft(s.id); });
    }, 1000);

    setInterval(saveGame, 5000);

    // UI Rendering
    function renderShafts() {
        const container = document.getElementById('shafts-container');
        container.innerHTML = '';
        
        shafts.forEach(shaft => {
            const div = document.createElement('div');
            div.className = 'station';
            div.innerHTML = `
                <div class="station-header">
                    Mine Shaft ${shaft.id + 1} <span class="level-badge" id="sh-level-${shaft.id}">Lv ${shaft.level}</span>
                </div>
                <div class="station-info">
                    Printed Cards: <span id="sh-stock-${shaft.id}" style="color:white; font-weight:bold;">${Math.floor(shaft.cards)}</span><br>
                    Multiplier: <span id="sh-mult-${shaft.id}">${shaft.mult}x</span> | Power: <span id="sh-power-${shaft.id}">${getPower(shaft.baseCap, shaft.level, shaft.mult)}</span>/click
                </div>
                <div class="station-controls">
                    <button class="btn-action btn-work ${shaft.auto ? 'automated' : ''}" id="sh-work-${shaft.id}" onclick="workShaft(${shaft.id})">
                        ${shaft.auto ? 'Auto' : 'Work'}
                    </button>
                    <button class="btn-action btn-upg" onclick="upgrade('shaft', ${shaft.id})" id="sh-upg-${shaft.id}">
                        Upgrade <span>$${getCost(shaft.baseCost, shaft.level)}</span>
                    </button>
                    <button class="btn-action btn-skin" onclick="openSkinModal('shaft', ${shaft.id})" ${shaft.auto ? 'disabled' : ''}>Skin</button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    function updateUI() {
        document.getElementById('ui-cash').innerText = Math.floor(cash);
        document.getElementById('ui-gems').innerText = gems;
        
        const unlockBtn = document.getElementById('btn-unlock');
        if (shafts.length >= maxShafts) {
            unlockBtn.innerText = 'Max Shafts';
            unlockBtn.disabled = true;
        } else {
            unlockBtn.innerText = `Unlock ($${getShaftUnlockCost()})`;
            unlockBtn.disabled = cash < getShaftUnlockCost();
        }
        
        document.getElementById('btn-lootbox').disabled = gems < 100;

        // Warehouse Update
        document.getElementById('wh-level').innerText = `Lv ${warehouse.level}`;
        document.getElementById('wh-stock').innerText = Math.floor(warehouse.cards);
        document.getElementById('wh-mult').innerText = `${warehouse.mult}x`;
        document.getElementById('wh-power').innerText = getPower(warehouse.baseCap, warehouse.level, warehouse.mult);
        
        const whUpgBtn = document.getElementById('wh-upg');
        const whCost = getCost(warehouse.baseCost, warehouse.level);
        document.getElementById('wh-cost').innerText = `$${whCost}`;
        whUpgBtn.disabled = cash < whCost;
        
        const whWorkBtn = document.getElementById('wh-work');
        if (warehouse.auto) { whWorkBtn.innerText = 'Auto'; whWorkBtn.classList.add('automated'); }
        document.getElementById('wh-skin').disabled = warehouse.auto;

        // Elevator Update
        document.getElementById('el-level').innerText = `Lv ${elevator.level}`;
        document.getElementById('el-stock').innerText = Math.floor(elevator.cards);
        document.getElementById('el-mult').innerText = `${elevator.mult}x`;
        document.getElementById('el-power').innerText = getPower(elevator.baseCap, elevator.level, elevator.mult);
        
        const elUpgBtn = document.getElementById('el-upg');
        const elCost = getCost(elevator.baseCost, elevator.level);
        document.getElementById('el-cost').innerText = `$${elCost}`;
        elUpgBtn.disabled = cash < elCost;
        
        const elWorkBtn = document.getElementById('el-work');
        if (elevator.auto) { elWorkBtn.innerText = 'Auto'; elWorkBtn.classList.add('automated'); }
        document.getElementById('el-skin').disabled = elevator.auto;

        // Shafts Update
        shafts.forEach(shaft => {
            const shStock = document.getElementById(`sh-stock-${shaft.id}`);
            if(shStock) {
                document.getElementById(`sh-level-${shaft.id}`).innerText = `Lv ${shaft.level}`;
                shStock.innerText = Math.floor(shaft.cards);
                document.getElementById(`sh-mult-${shaft.id}`).innerText = `${shaft.mult}x`;
                document.getElementById(`sh-power-${shaft.id}`).innerText = getPower(shaft.baseCap, shaft.level, shaft.mult);
                
                const upgBtn = document.getElementById(`sh-upg-${shaft.id}`);
                const cost = getCost(shaft.baseCost, shaft.level);
                upgBtn.innerHTML = `Upgrade <span>$${cost}</span>`;
                upgBtn.disabled = cash < cost;
                
                const workBtn = document.getElementById(`sh-work-${shaft.id}`);
                if (shaft.auto) { 
                    workBtn.innerText = 'Auto'; 
                    workBtn.classList.add('automated'); 
                    document.getElementById(`sh-work-${shaft.id}`).nextElementSibling.nextElementSibling.disabled = true;
                }
            }
        });
    }

    // Init
    loadGame();
    renderShafts();
    updateUI();
</script>
</body>
</html>
