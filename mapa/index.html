<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Million Dollar Map Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #0f0f0f; color: #eee; font-family: 'Inter', sans-serif; overflow: hidden; touch-action: none; }
        
        #ui-top { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 10; background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 50px; border: 1px solid #333; backdrop-filter: blur(5px); }
        
        canvas { display: block; cursor: grab; }
        canvas:active { cursor: grabbing; }

        #buy-panel { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); 
            background: #1a1a1a; padding: 20px; border-radius: 15px; border: 2px solid #ffcc00;
            width: 90%; max-width: 400px; display: none; z-index: 20; box-shadow: 0 10px 50px rgba(0,0,0,0.5);
        }

        .btn-pay { width: 100%; background: #ffcc00; color: #000; border: none; padding: 15px; font-weight: 900; border-radius: 8px; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        .info { font-size: 0.9rem; color: #aaa; margin-bottom: 5px; }
        .price { font-size: 1.5rem; font-weight: 900; color: #fff; }
    </style>
</head>
<body>

    <div id="ui-top">Piksele na sprzedaż: <b>984,200</b></div>

    <div id="buy-panel">
        <div class="info">Wybrany obszar: <span id="coords">0,0</span></div>
        <div class="price" id="total-price">0.00 PLN</div>
        <button class="btn-pay" onclick="startPayment()">KUP TEN KAWAŁEK</button>
        <button style="background:none; border:none; color:#666; width:100%; margin-top:10px; cursor:pointer;" onclick="cancelSelection()">Anuluj</button>
    </div>

    <canvas id="mapCanvas"></canvas>

<script>
    const canvas = document.getElementById('mapCanvas');
    const ctx = canvas.getContext('2d');
    const buyPanel = document.getElementById('buy-panel');
    
    // Ustawienia siatki
    const gridSize = 1000; // 1000x1000 pikseli
    const cellSize = 20;   // Rozmiar jednego "bloku"
    let scale = 1;
    let offsetX = 0;
    let offsetY = 0;

    let isDragging = false;
    let lastMouseX = 0;
    let lastMouseY = 0;

    let selectedCell = null;

    function init() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        offsetX = canvas.width / 2 - (gridSize * cellSize) / 2;
        offsetY = canvas.height / 2 - (gridSize * cellSize) / 2;
        draw();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.translate(offsetX, offsetY);
        ctx.scale(scale, scale);

        // Rysowanie tła mapy
        ctx.fillStyle = '#222';
        ctx.fillRect(0, 0, gridSize * cellSize, gridSize * cellSize);

        // Rysowanie siatki (tylko gdy jest odpowiedni zoom)
        if (scale > 0.5) {
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= gridSize; i++) {
                ctx.beginPath();
                ctx.moveTo(i * cellSize, 0);
                ctx.lineTo(i * cellSize, gridSize * cellSize);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * cellSize);
                ctx.lineTo(gridSize * cellSize, i * cellSize);
                ctx.stroke();
            }
        }

        // Rysowanie zaznaczenia
        if (selectedCell) {
            ctx.fillStyle = 'rgba(255, 204, 0, 0.5)';
            ctx.fillRect(selectedCell.x * cellSize, selectedCell.y * cellSize, cellSize, cellSize);
            ctx.strokeStyle = '#ffcc00';
            ctx.lineWidth = 2;
            ctx.strokeRect(selectedCell.x * cellSize, selectedCell.y * cellSize, cellSize, cellSize);
        }

        ctx.restore();
    }

    // Obsługa myszy i dotyku
    canvas.addEventListener('mousedown', e => {
        isDragging = true;
        lastMouseX = e.clientX;
        lastMouseY = e.clientY;
    });

    window.addEventListener('mouseup', () => isDragging = false);

    window.addEventListener('mousemove', e => {
        if (isDragging) {
            offsetX += e.clientX - lastMouseX;
            offsetY += e.clientY - lastMouseY;
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
            draw();
        }
    });

    canvas.addEventListener('wheel', e => {
        const zoomSpeed = 0.001;
        scale -= e.deltaY * zoomSpeed;
        scale = Math.min(Math.max(0.1, scale), 5); // Limity zoomu
        draw();
    });

    canvas.addEventListener('click', e => {
        if (isDragging) return;

        // Przeliczanie kliknięcia na współrzędne siatki
        const rect = canvas.getBoundingClientRect();
        const mouseX = (e.clientX - rect.left - offsetX) / scale;
        const mouseY = (e.clientY - rect.top - offsetY) / scale;

        const gridX = Math.floor(mouseX / cellSize);
        const gridY = Math.floor(mouseY / cellSize);

        if (gridX >= 0 && gridX < gridSize && gridY >= 0 && gridY < gridSize) {
            selectedCell = { x: gridX, y: gridY };
            showUI(gridX, gridY);
        } else {
            selectedCell = null;
            buyPanel.style.display = 'none';
        }
        draw();
    });

    function showUI(x, y) {
        document.getElementById('coords').innerText = `X: ${x}, Y: ${y}`;
        document.getElementById('total-price').innerText = "10.00 PLN";
        buyPanel.style.display = 'block';
    }

    function cancelSelection() {
        selectedCell = null;
        buyPanel.style.display = 'none';
        draw();
    }

    function startPayment() {
        alert("Tu następuje połączenie z Twoim backendem PHP i generowanie linku HotPay dla pola X:" + selectedCell.x + " Y:" + selectedCell.y);
    }

    window.addEventListener('resize', init);
    init();
</script>

</body>
</html>
