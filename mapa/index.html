<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Million Dollar Map</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #050505; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; touch-action: none; }
        
        #top-bar {
            position: absolute; top: 0; left: 0; width: 100%; background: rgba(10, 10, 15, 0.85);
            border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center;
            padding: 15px 30px; box-sizing: border-box; z-index: 50; backdrop-filter: blur(12px);
        }
        
        .stats-container { display: flex; gap: 30px; }
        .stat-box { display: flex; flex-direction: column; }
        .stat-label { color: #666; font-size: 0.75rem; text-transform: uppercase; font-weight: 900; }
        .stat-value { font-weight: 900; font-size: 1.3rem; color: #fff; }
        .stat-value.pool { color: #00f2ff; }
        
        .top-nav button {
            background: #111; color: #fff; border: 1px solid #333; padding: 10px 20px; font-weight: 900;
            border-radius: 8px; cursor: pointer; transition: 0.2s; font-family: 'Inter';
        }
        .top-nav button:hover { background: #00f2ff; color: #000; border-color: #00f2ff; }

        canvas { display: block; cursor: crosshair; }

        /* Mały pasek na dole podczas wybierania */
        #bottom-bar {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(15, 15, 20, 0.95); border: 1px solid #333; border-radius: 50px;
            padding: 10px 20px 10px 30px; display: none; align-items: center; gap: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); z-index: 40; backdrop-filter: blur(10px);
        }
        .bb-info { display: flex; gap: 20px; font-size: 0.95rem; }
        .bb-info b { color: #00f2ff; font-size: 1.1rem; }
        .btn-checkout-trigger {
            background: #00f2ff; color: #000; border: none; padding: 10px 25px; font-weight: 900;
            border-radius: 30px; cursor: pointer; font-size: 0.9rem; transition: 0.2s;
        }
        .btn-checkout-trigger:disabled { background: #333; color: #666; cursor: not-allowed; }

        /* Modal z formularzem (Krok 2) */
        #checkout-modal-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 100; display: none; backdrop-filter: blur(5px);
        }
        #checkout-modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 360px; background: #0a0a0c; border: 1px solid #333; border-radius: 16px; padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }
        .modal-header { font-weight: 900; font-size: 1.4rem; margin-bottom: 20px; color: #fff; text-align: center; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.8rem; color: #aaa; margin-bottom: 6px; font-weight: 600; }
        .input-group input { width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; box-sizing: border-box; font-family: 'Inter'; outline: none; }
        .input-group input:focus { border-color: #00f2ff; }
        
        .summary-total { display: flex; justify-content: space-between; font-weight: 900; font-size: 1.4rem; color: #00f2ff; margin-top: 15px; padding-top: 15px; border-top: 1px solid #333; margin-bottom: 20px; }
        
        .btn-buy { width: 100%; background: #00f2ff; color: #000; border: none; padding: 16px; font-weight: 900; border-radius: 8px; cursor: pointer; font-size: 1.1rem; text-transform: uppercase; }
        .btn-cancel { width: 100%; background: none; border: none; color: #666; margin-top: 15px; font-weight: bold; cursor: pointer; }

        #hover-tooltip {
            position: absolute; background: rgba(10,10,15,0.95); border: 1px solid #444; padding: 15px;
            border-radius: 8px; pointer-events: none; display: none; z-index: 60; font-size: 0.9rem;
        }
        #hover-tooltip b { color: #00f2ff; }

        @media (max-width: 768px) {
            .stats-container { gap: 15px; }
            .stat-value { font-size: 1rem; }
            #bottom-bar { width: 90%; flex-direction: column; padding: 15px; border-radius: 15px; bottom: 20px; }
            .btn-checkout-trigger { width: 100%; }
        }
    </style>
</head>
<body>

    <div id="top-bar">
        <div class="stats-container">
            <div class="stat-box"><span class="stat-label">Zajęte Pola</span><span class="stat-value" id="stat-taken">0</span></div>
            <div class="stat-box"><span class="stat-label">Wolne Pola</span><span class="stat-value" id="stat-free">1,000,000</span></div>
            <div class="stat-box"><span class="stat-label">Pula Nagród</span><span class="stat-value pool" id="stat-pool">0.00 PLN</span></div>
        </div>
        <div class="top-nav">
            <button>🏆 TOP 10</button>
        </div>
    </div>

    <div id="hover-tooltip"></div>

    <div id="bottom-bar">
        <div class="bb-info">
            <span>Wybrano: <b id="bb-count">0</b> pól</span>
            <span>Suma: <b id="bb-total">0.00 PLN</b></span>
        </div>
        <button id="bb-btn" class="btn-checkout-trigger" onclick="openCheckout()">KUP TERAZ</button>
    </div>

    <div id="checkout-modal-bg">
        <div id="checkout-modal">
            <div class="modal-header">Podaj szczegóły</div>
            <div class="input-group">
                <label>Twoja Nazwa / Nick</label>
                <input type="text" id="buyer-name" placeholder="Np. CodePace">
            </div>
            <div class="input-group">
                <label>Link do obrazka (URL)</label>
                <input type="url" id="img-url" placeholder="https://imgur.com/...jpg">
            </div>
            <div class="input-group">
                <label>Link po kliknięciu w obrazek</label>
                <input type="url" id="target-url" placeholder="https://twojastrona.pl">
            </div>
            
            <div class="summary-total"><span>Do zapłaty:</span><span id="modal-total">0.00 PLN</span></div>
            
            <button class="btn-buy" onclick="processPayment()">ZAPŁAĆ BLIKIEM</button>
            <button class="btn-cancel" onclick="closeCheckout()">WRÓĆ DO MAPY</button>
        </div>
    </div>

    <canvas id="mapCanvas"></canvas>

<script>
    const canvas = document.getElementById('mapCanvas');
    const ctx = canvas.getContext('2d');
    const tooltip = document.getElementById('hover-tooltip');
    const bottomBar = document.getElementById('bottom-bar');
    const bbBtn = document.getElementById('bb-btn');
    const modalBg = document.getElementById('checkout-modal-bg');
    
    const mapSize = 1000; // ZMIANA: 1000x1000 = 1,000,000 pikseli
    const cellSize = 10; // Zmniejszamy klocki, żeby mapa nie była gigantyczna na start
    const basePrice = 1.00;
    const minOrderValue = 4.00; 
    
    let scale = 1;
    let offsetX = window.innerWidth / 2 - (mapSize * cellSize) / 2;
    let offsetY = window.innerHeight / 2 - (mapSize * cellSize) / 2;
    
    let isDragging = false;
    let startX = 0, startY = 0;
    let lastX = 0, lastY = 0;
    
    let db = {
        "500,500": { owner: 'Prezes', price: 1.0, color: '#e74c3c' },
        "500,501": { owner: 'Prezes', price: 1.0, color: '#e74c3c' },
        "499,500": { owner: 'Prezes', price: 1.0, color: '#e74c3c' },
        "499,501": { owner: 'Prezes', price: 1.0, color: '#e74c3c' }
    };
    
    let selectedCells = new Set(); 
    
    function updateTopStats() {
        const taken = Object.keys(db).length;
        document.getElementById('stat-taken').innerText = taken;
        document.getElementById('stat-free').innerText = ((mapSize * mapSize) - taken).toLocaleString();
        document.getElementById('stat-pool').innerText = (taken * 0.15).toFixed(2) + " PLN";
    }

    function init() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        updateTopStats();
        draw();
    }

    function draw() {
        ctx.fillStyle = "#050505";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.save();
        ctx.translate(offsetX, offsetY);
        ctx.scale(scale, scale);

        ctx.fillStyle = "#0a0a0c";
        ctx.fillRect(0, 0, mapSize * cellSize, mapSize * cellSize);

        for (let key in db) {
            const [x, y] = key.split(',').map(Number);
            ctx.fillStyle = db[key].color;
            ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
        }

        // Rysuj siatkę tylko jak przybliżysz (optymalizacja dla miliona pikseli)
        if (scale > 0.8) {
            ctx.strokeStyle = "#1a1a1a";
            ctx.lineWidth = 1 / scale;
            for(let i=0; i<=mapSize; i++) {
                ctx.beginPath(); ctx.moveTo(i*cellSize, 0); ctx.lineTo(i*cellSize, mapSize*cellSize); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i*cellSize); ctx.lineTo(mapSize*cellSize, i*cellSize); ctx.stroke();
            }
        }

        ctx.fillStyle = "rgba(0, 242, 255, 0.4)";
        ctx.strokeStyle = "#00f2ff";
        ctx.lineWidth = 2 / scale;
        selectedCells.forEach(key => {
            const [x, y] = key.split(',').map(Number);
            ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
            ctx.strokeRect(x * cellSize, y * cellSize, cellSize, cellSize);
        });

        ctx.restore();
    }

    // Obsługa dotyku i myszy
    const handleStart = (x, y) => { isDragging = true; startX = x; startY = y; lastX = x; lastY = y; };
    const handleMove = (x, y) => {
        if (isDragging) {
            offsetX += x - lastX;
            offsetY += y - lastY;
            lastX = x; lastY = y;
            draw();
            tooltip.style.display = 'none';
        }
    };
    const handleEnd = () => { isDragging = false; };

    canvas.addEventListener('mousedown', e => handleStart(e.clientX, e.clientY));
    window.addEventListener('mousemove', e => {
        handleMove(e.clientX, e.clientY);
        if (!isDragging) checkHover(e.clientX, e.clientY);
    });
    window.addEventListener('mouseup', handleEnd);

    canvas.addEventListener('touchstart', e => handleStart(e.touches[0].clientX, e.touches[0].clientY));
    canvas.addEventListener('touchmove', e => handleMove(e.touches[0].clientX, e.touches[0].clientY));
    canvas.addEventListener('touchend', handleEnd);

    function checkHover(cx, cy) {
        const rect = canvas.getBoundingClientRect();
        const mouseX = (cx - rect.left - offsetX) / scale;
        const mouseY = (cy - rect.top - offsetY) / scale;
        const x = Math.floor(mouseX / cellSize);
        const y = Math.floor(mouseY / cellSize);

        if (x >= 0 && x < mapSize && y >= 0 && y < mapSize) {
            const key = `${x},${y}`;
            if (db[key]) {
                tooltip.style.display = 'block';
                tooltip.style.left = cx + 20 + 'px';
                tooltip.style.top = cy + 20 + 'px';
                tooltip.innerHTML = `Właściciel: <b>${db[key].owner}</b><br>Wartość: <b>${db[key].price.toFixed(2)} PLN</b><br><span style="color:#888; font-size:0.75rem;">Kliknij, aby przebić (+10%)</span>`;
            } else {
                tooltip.style.display = 'none';
            }
        } else {
            tooltip.style.display = 'none';
        }
    }

    canvas.addEventListener('wheel', e => {
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        scale = Math.max(0.1, Math.min(scale * delta, 5));
        draw();
    });

    // Zaznaczanie przy kliknięciu/puszczeniu palca
    canvas.addEventListener('click', e => {
        // Ignoruj jeśli to było przesunięcie mapy
        if (Math.abs(startX - e.clientX) > 5 || Math.abs(startY - e.clientY) > 5) return; 

        const rect = canvas.getBoundingClientRect();
        const mouseX = (e.clientX - rect.left - offsetX) / scale;
        const mouseY = (e.clientY - rect.top - offsetY) / scale;
        const x = Math.floor(mouseX / cellSize);
        const y = Math.floor(mouseY / cellSize);

        if (x >= 0 && x < mapSize && y >= 0 && y < mapSize) {
            const key = `${x},${y}`;
            if (selectedCells.has(key)) selectedCells.delete(key);
            else selectedCells.add(key);
            
            updateBottomBar();
            draw();
        }
    });

    let currentTotal = 0;

    function updateBottomBar() {
        if (selectedCells.size === 0) {
            bottomBar.style.display = 'none';
            return;
        }

        bottomBar.style.display = 'flex';
        
        let totalPrice = 0;
        selectedCells.forEach(key => {
            if (db[key]) totalPrice += db[key].price * 1.10;
            else totalPrice += basePrice;
        });

        currentTotal = totalPrice;
        document.getElementById('bb-count').innerText = selectedCells.size;
        document.getElementById('bb-total').innerText = totalPrice.toFixed(2) + " PLN";
        
        if (totalPrice < minOrderValue) {
            bbBtn.innerText = `DOBIERZ KLOCKI (MIN. ${minOrderValue.toFixed(2)} PLN)`;
            bbBtn.disabled = true;
        } else {
            bbBtn.innerText = "PRZEJDŹ DO ZAKUPU";
            bbBtn.disabled = false;
        }
    }

    function openCheckout() {
        document.getElementById('modal-total').innerText = currentTotal.toFixed(2) + " PLN";
        modalBg.style.display = 'block';
    }

    function closeCheckout() {
        modalBg.style.display = 'none';
    }

    function processPayment() {
        const name = document.getElementById('buyer-name').value;
        if(!name) { alert("Podaj swoją nazwę!"); return; }
        alert(`Tu następuje weryfikacja na serwerze i przekierowanie do bramki BLIK dla użytkownika: ${name}`);
    }

    window.addEventListener('resize', init);
    init();
</script>
</body>
</html>
