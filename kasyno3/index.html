<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Bandit Clone - Cluster & Cascade</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { 
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            color: #fff; font-family: 'Montserrat', sans-serif; 
            min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 20px;
        }

        .machine {
            background: #111;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 40px rgba(0,0,0,0.9), inset 0 0 15px rgba(255, 204, 0, 0.1);
            border: 2px solid #333;
            border-top: 4px solid #ffcc00;
            text-align: center;
            width: 100%;
            max-width: 800px;
            position: relative;
        }

        .title {
            font-size: 2rem;
            font-weight: 900;
            color: #ffcc00;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 1rem;
            font-weight: 700;
            color: #aaa;
            margin-bottom: 15px;
        }

        /* SIATKA 6x5 */
        .slot-area {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 4px;
            background: #000;
            padding: 10px;
            border-radius: 10px;
            border: inset 2px #222;
            margin-bottom: 20px;
            position: relative;
        }

        .cell-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1/1;
            background: #1a1a1a;
            border-radius: 8px;
            border: 1px solid #333;
            transition: 0.3s;
            overflow: hidden;
        }

        /* Złote Kwadraty */
        .cell-wrapper.golden {
            background: linear-gradient(135deg, #b8860b 0%, #ffd700 50%, #b8860b 100%);
            border-color: #ffe066;
            box-shadow: inset 0 0 15px rgba(255, 215, 0, 0.6);
        }

        .symbol {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            font-weight: 900;
            transition: transform 0.3s ease-in-out, opacity 0.3s;
            z-index: 2;
        }

        .symbol.text-sym { font-size: 2.2rem; text-shadow: 2px 2px 0px #000; }
        
        /* Kolory symboli tekstowych */
        .sym-10 { color: #f39c12; }
        .sym-J { color: #3498db; }
        .sym-Q { color: #9b59b6; }
        .sym-K { color: #2ecc71; }
        .sym-A { color: #e74c3c; }

        .symbol.win-pop {
            animation: popOut 0.4s forwards;
        }

        @keyframes popOut {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }

        .symbol.falling {
            transform: translateY(-100px);
            opacity: 0;
            animation: dropIn 0.3s forwards;
        }

        @keyframes dropIn {
            to { transform: translateY(0); opacity: 1; }
        }

        /* Monety po tęczy */
        .coin-val {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            font-weight: 900;
            color: #000;
            background: radial-gradient(circle, #ffdf00 0%, #daa520 100%);
            border-radius: 50%;
            border: 2px solid #fff;
            z-index: 3;
            opacity: 0;
            transform: scale(0);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .coin-val.show {
            opacity: 1;
            transform: scale(1);
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: 900;
            background: #000;
            padding: 15px 20px;
            border-radius: 8px;
            border: 1px solid #333;
            margin-bottom: 15px;
        }

        .kasa { color: #aaa; }
        .wygrana { color: #ffcc00; transition: 0.2s; }
        .wygrana.bump { transform: scale(1.1); color: #fff; }

        .action-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        .bet-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #000;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #333;
        }

        .bet-btn {
            background: #333;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            font-size: 1.5rem;
            font-weight: 900;
            border-radius: 6px;
            cursor: pointer;
        }
        .bet-btn:active { background: #555; }
        .bet-btn:disabled { background: #111; color: #555; }

        .bet-amount { font-size: 1.2rem; font-weight: 900; width: 100px; }

        .spin-btn {
            flex: 1;
            background: #fff;
            color: #000;
            border: none;
            padding: 15px;
            font-size: 1.8rem;
            font-weight: 900;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
        }
        .spin-btn:active { transform: translateY(3px); }
        .spin-btn:disabled { background: #333; color: #666; cursor: not-allowed; }

        .msg-bar {
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: 900;
            color: #ffcc00;
            height: 30px;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            .slot-area { gap: 2px; padding: 5px; }
            .symbol { font-size: 2rem; }
            .symbol.text-sym { font-size: 1.5rem; }
            .action-row { flex-direction: column; gap: 10px; }
            .bet-controls { width: 100%; justify-content: center; }
            .spin-btn { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="machine">
        <div class="title">Szop Bandyta</div>
        <div class="subtitle">Klastry | Kaskady | Złote Kwadraty</div>
        
        <div class="slot-area" id="slotArea"></div>

        <div class="info-panel">
            <span class="kasa">Saldo: <span id="balance">100.00</span> €</span>
            <span class="wygrana">Wygrana: <span id="win">0.00</span> €</span>
        </div>

        <div class="action-row">
            <div class="bet-controls">
                <button class="bet-btn" id="btnMinus" onclick="changeBet(-1.00)">-</button>
                <div class="bet-amount">Zakład: <span id="bet">1.00</span></div>
                <button class="bet-btn" id="btnPlus" onclick="changeBet(1.00)">+</button>
            </div>
            <button class="spin-btn" id="spinBtn" onclick="startSpin()">OBRÓĆ</button>
        </div>

        <div class="msg-bar" id="msg">ZAKRĘĆ BĘBNAMI!</div>
    </div>

    <script>
        const cols = 6;
        const rows = 5;
        
        // Symbole - używam zbliżonych emoji do zrzutów
        const lowSyms = ['10', 'J', 'Q', 'K', 'A'];
        const highSyms = ['🪤', '🧀', '🍺', '🥖', '🎩']; // Pułapka, ser, piwo, bagietka, kapelusz
        const RAINBOW = '🌈';
        
        // Baza wypłat klastrowych (min 5). Uproszczona tabela oparta na screenach
        function getPayout(symbol, count, currentBet) {
            let mult = 0;
            if (lowSyms.includes(symbol)) {
                if(count === 5) mult = 0.1;
                else if(count === 6) mult = 0.2;
                else if(count >= 7 && count <= 8) mult = 0.5;
                else if(count >= 9 && count <= 10) mult = 1.5;
                else if(count >= 11 && count <= 12) mult = 5;
                else if(count >= 13) mult = 15;
            } else {
                let base = (symbol === '🎩') ? 1.0 : (['🍺','🥖'].includes(symbol) ? 0.5 : 0.3);
                if(count === 5) mult = base;
                else if(count === 6) mult = base * 1.5;
                else if(count >= 7 && count <= 8) mult = base * 3;
                else if(count >= 9 && count <= 10) mult = base * 10;
                else if(count >= 11 && count <= 12) mult = base * 30;
                else if(count >= 13) mult = base * 100;
            }
            return mult * currentBet;
        }

        let balance = 100.00;
        let bet = 1.00;
        let isProcessing = false;
        
        let grid = []; // 2D array [col][row] przechowująca obiekty danych
        let domGrid = []; // 2D array przechowująca DIVy
        let totalWin = 0;

        const slotArea = document.getElementById('slotArea');
        const balanceEl = document.getElementById('balance');
        const betEl = document.getElementById('bet');
        const winEl = document.getElementById('win');
        const msgEl = document.getElementById('msg');
        const spinBtn = document.getElementById('spinBtn');

        // Funkcja opóźniająca dla asynchronicznej kaskady
        const wait = ms => new Promise(res => setTimeout(res, ms));

        function getRandomSymbol() {
            let pool = [...lowSyms, ...lowSyms, ...lowSyms, ...highSyms];
            // Tęcza z małą szansą
            if (Math.random() < 0.05) pool.push(RAINBOW);
            return pool[Math.floor(Math.random() * pool.length)];
        }

        function getCoinMultiplier() {
            // Brązowe, Srebrne, Złote
            let val = Math.random();
            if (val < 0.7) return [0.2, 0.5, 1, 2, 3, 4][Math.floor(Math.random()*6)];
            if (val < 0.95) return [5, 10, 15, 20][Math.floor(Math.random()*4)];
            return [25, 50, 100][Math.floor(Math.random()*3)];
        }

        // Inicjalizacja siatki HTML i danych
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                if (!grid[c]) grid[c] = [];
                if (!domGrid[c]) domGrid[c] = [];

                let wrapper = document.createElement('div');
                wrapper.className = 'cell-wrapper';
                
                let symEl = document.createElement('div');
                symEl.className = 'symbol';
                
                let coinEl = document.createElement('div');
                coinEl.className = 'coin-val';

                wrapper.appendChild(symEl);
                wrapper.appendChild(coinEl);
                slotArea.appendChild(wrapper);

                domGrid[c][r] = { wrapper, symEl, coinEl };
                grid[c][r] = { symbol: getRandomSymbol(), isGolden: false };
            }
        }

        function renderGrid(animateDrop = false) {
            for (let c = 0; c < cols; c++) {
                for (let r = 0; r < rows; r++) {
                    let data = grid[c][r];
                    let dom = domGrid[c][r];
                    
                    dom.symEl.innerText = data.symbol;
                    dom.symEl.className = 'symbol';
                    if (lowSyms.includes(data.symbol)) {
                        dom.symEl.classList.add('text-sym', `sym-${data.symbol}`);
                    }
                    if (animateDrop) dom.symEl.classList.add('falling');
                    
                    if (data.isGolden) dom.wrapper.classList.add('golden');
                    else dom.wrapper.classList.remove('golden');
                }
            }
        }

        renderGrid();

        function changeBet(amount) {
            if (isProcessing) return;
            let newBet = bet + amount;
            if (newBet >= 0.10 && newBet <= 100) {
                bet = newBet;
                betEl.innerText = bet.toFixed(2);
            }
        }

        async function startSpin() {
            if (isProcessing) return;
            if (balance < bet) {
                msgEl.innerText = "BRAK ŚRODKÓW!";
                return;
            }

            isProcessing = true;
            spinBtn.disabled = true;
            document.getElementById('btnMinus').disabled = true;
            document.getElementById('btnPlus').disabled = true;

            balance -= bet;
            totalWin = 0;
            balanceEl.innerText = balance.toFixed(2);
            winEl.innerText = "0.00";
            msgEl.innerText = "KASKADA W TOKU...";

            // Wyczyść planszę z monet i złotych pól
            for (let c = 0; c < cols; c++) {
                for (let r = 0; r < rows; r++) {
                    grid[c][r].isGolden = false;
                    domGrid[c][r].coinEl.classList.remove('show');
                    grid[c][r].symbol = getRandomSymbol();
                }
            }

            renderGrid(true); // Animacja zrzutu początkowego
            await wait(400);

            await resolveBoard();
        }

        // DFS szukający klastrów
        function findClusters() {
            let visited = Array(cols).fill(null).map(() => Array(rows).fill(false));
            let clusters = [];

            for (let c = 0; c < cols; c++) {
                for (let r = 0; r < rows; r++) {
                    if (!visited[c][r] && grid[c][r].symbol !== RAINBOW && grid[c][r].symbol !== '') {
                        let targetSym = grid[c][r].symbol;
                        let currentCluster = [];
                        let stack = [{c, r}];

                        while (stack.length > 0) {
                            let {c: currC, r: currR} = stack.pop();
                            
                            if (currC < 0 || currC >= cols || currR < 0 || currR >= rows) continue;
                            if (visited[currC][currR]) continue;
                            if (grid[currC][currR].symbol !== targetSym) continue;

                            visited[currC][currR] = true;
                            currentCluster.push({c: currC, r: currR});

                            stack.push({c: currC + 1, r: currR});
                            stack.push({c: currC - 1, r: currR});
                            stack.push({c: currC, r: currR + 1});
                            stack.push({c: currC, r: currR - 1});
                        }

                        if (currentCluster.length >= 5) {
                            clusters.push({symbol: targetSym, cells: currentCluster});
                        }
                    }
                }
            }
            return clusters;
        }

        async function resolveBoard() {
            let clusters = findClusters();

            if (clusters.length > 0) {
                // Etap 1: Analiza wygranych klastrów i zamiana na złoto
                let spinWin = 0;
                for (let cluster of clusters) {
                    spinWin += getPayout(cluster.symbol, cluster.cells.length, bet);
                    
                    for (let cell of cluster.cells) {
                        grid[cell.c][cell.r].isGolden = true;
                        domGrid[cell.c][cell.r].wrapper.classList.add('golden');
                        domGrid[cell.c][cell.r].symEl.classList.add('win-pop');
                    }
                }

                totalWin += spinWin;
                winEl.innerText = totalWin.toFixed(2);
                msgEl.innerText = `KLASTER: +${spinWin.toFixed(2)} €`;

                await wait(500); // Czas na animację znikania

                // Etap 2: Super Kaskada (usuwanie i spadanie)
                for (let c = 0; c < cols; c++) {
                    // Wyciągamy tylko te symbole, które NIE są zniszczone w klastrze
                    let remainingSymbols = [];
                    let goldenStatus = []; // Złote kwadraty zostają na stałych pozycjach, więc ich nie przenosimy tu
                    
                    for (let r = rows - 1; r >= 0; r--) {
                        let isDestroyed = false;
                        for (let cluster of clusters) {
                            if (cluster.cells.some(cell => cell.c === c && cell.r === r)) {
                                isDestroyed = true; break;
                            }
                        }
                        if (!isDestroyed) {
                            remainingSymbols.unshift(grid[c][r].symbol);
                        }
                    }

                    // Uzupełniamy górę nowymi losowymi
                    while (remainingSymbols.length < rows) {
                        remainingSymbols.unshift(getRandomSymbol());
                    }

                    // Zapisujemy nową kolumnę (złote tła zostają na swoich rzędach niezależnie od spadających symboli)
                    for (let r = 0; r < rows; r++) {
                        grid[c][r].symbol = remainingSymbols[r];
                        // Animacja spadania dla nowych lub przesuniętych - tu uproszczone przez renderGrid
                    }
                }

                renderGrid(true);
                await wait(400);

                // Rekurencja dopóki są wygrane
                await resolveBoard();

            } else {
                // Brak klastrów - sprawdzamy Tęczę
                await checkRainbowFeature();
            }
        }

        async function checkRainbowFeature() {
            let hasRainbow = false;
            let goldenCells = [];

            for (let c = 0; c < cols; c++) {
                for (let r = 0; r < rows; r++) {
                    if (grid[c][r].symbol === RAINBOW) hasRainbow = true;
                    if (grid[c][r].isGolden) goldenCells.push({c, r});
                }
            }

            if (hasRainbow && goldenCells.length > 0) {
                msgEl.innerText = "TĘCZA AKTYWUJE MONETY!";
                await wait(500);

                let coinWin = 0;
                for (let cell of goldenCells) {
                    let dom = domGrid[cell.c][cell.r];
                    let mult = getCoinMultiplier();
                    let val = mult * bet;
                    coinWin += val;

                    dom.symEl.style.opacity = '0'; // Ukryj symbol
                    dom.coinEl.innerText = val >= 25 ? `${val.toFixed(0)}x` : val.toFixed(1);
                    if(mult >= 25) dom.coinEl.style.background = "radial-gradient(circle, #ffcc00, #b8860b)"; // Złota
                    else if(mult >= 5) dom.coinEl.style.background = "radial-gradient(circle, #e0e0e0, #999)"; // Srebrna
                    else dom.coinEl.style.background = "radial-gradient(circle, #cd7f32, #8b4513)"; // Brązowa
                    
                    dom.coinEl.classList.add('show');
                }

                await wait(1000);
                totalWin += coinWin;
                winEl.innerText = totalWin.toFixed(2);
                msgEl.innerText = `ZŁOTE MONETY: +${coinWin.toFixed(2)} €`;
                await wait(1000);

                // Po tęczy złote kwadraty znikają
                for (let cell of goldenCells) {
                    grid[cell.c][cell.r].isGolden = false;
                    domGrid[cell.c][cell.r].wrapper.classList.remove('golden');
                    domGrid[cell.c][cell.r].coinEl.classList.remove('show');
                    domGrid[cell.c][cell.r].symEl.style.opacity = '1';
                }
            }

            finishSpin();
        }

        function finishSpin() {
            if (totalWin > 0) {
                balance += totalWin;
                balanceEl.innerText = balance.toFixed(2);
                winEl.parentElement.classList.add('bump');
                msgEl.innerText = `CAŁKOWITA WYGRANA: ${totalWin.toFixed(2)} €!`;
                setTimeout(() => winEl.parentElement.classList.remove('bump'), 300);
            } else {
                msgEl.innerText = "SPRÓBUJ PONOWNIE!";
            }

            isProcessing = false;
            spinBtn.disabled = false;
            document.getElementById('btnMinus').disabled = false;
            document.getElementById('btnPlus').disabled = false;
        }

    </script>
</body>
</html>
