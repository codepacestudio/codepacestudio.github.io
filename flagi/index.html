 <style>
   :root{
     --bg:#040817;--bg2:#07152f;--panel:rgba(8,15,35,.86);--panel2:rgba(11,22,50,.94);
     --cyan:#00e5ff;--blue:#156bff;--red:#ff334e;--green:#00d084;--gold:#ffd166;--muted:#9aa7c9;--white:#fff;

   *{box-sizing:border-box;margin:0;padding:0;font-family:Inter,"Segoe UI",system-ui,-apple-system,sans-serif;-webkit-tap-highlight-color:transparent;user-select:none}
   html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:#fff}
   body{position:fixed;inset:0;height:100dvh;background:radial-gradient(circle at 50% 15%,rgba(0,229,255,.15),transparent 34%),radial-gradient(circle at 12% 78%,rgba(255,51,78,.12),transparent 32%),radial-gradient(circle at 88% 82%,rgba(0,208,132,.10),transparent 35%),linear-gradient(180deg,#040817,#07152f 58%,#02040d)}
   canvas{position:absolute;inset:0;width:100%;height:100%;display:block}#bgCanvas{z-index:1}#gameCanvas{z-index:2}
   #loader{position:absolute;inset:0;z-index:200;background:radial-gradient(circle at 50% 35%,rgba(0,229,255,.18),transparent 42%),#040817;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;text-align:center}.loaderBall{width:82px;height:82px;border:5px solid rgba(255,255,255,.16);border-top-color:var(--cyan);border-right-color:var(--red);border-bottom-color:var(--green);border-radius:50%;animation:spin 1s linear infinite;box-shadow:0 0 45px rgba(0,229,255,.35)}@keyframes spin{to{transform:rotate(360deg)}}.loaderTitle{font-weight:1000;letter-spacing:3px;text-transform:uppercase;color:var(--cyan)}.loaderSub{font-size:.72rem;color:var(--muted);font-weight:900;letter-spacing:2px;text-transform:uppercase}
   #flash{position:absolute;inset:0;background:white;opacity:0;z-index:90;pointer-events:none;transition:.15s}@keyframes shake{0%,100%{transform:translate(0)}25%{transform:translate(-3px,2px)}50%{transform:translate(3px,-2px)}75%{transform:translate(-2px,-1px)}}.shake{animation:shake .22s both}
   #ui{position:absolute;inset:0;z-index:10;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}.glass{background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.02)),var(--panel);border:1px solid var(--border);box-shadow:var(--shadow),inset 0 0 25px rgba(0,229,255,.035);backdrop-filter:blur(18px)}
   #topHud{width:100%;padding:10px 10px 0;display:grid;grid-template-columns:52px 1fr 132px;gap:8px;align-items:start;pointer-events:auto}.iconBtn,.textBtn{height:50px;border:1px solid var(--border);border-radius:17px;background:var(--panel);color:white;font-weight:1000;letter-spacing:1.6px;box-shadow:0 10px 30px rgba(0,0,0,.38);cursor:pointer}.iconBtn{width:52px;font-size:1.2rem}.textBtn{font-size:.72rem;text-transform:uppercase;padding:0 12px}.scoreWrap{grid-column:1/4;grid-row:2;display:flex;flex-direction:column;align-items:center}.scorePill{display:flex;align-items:center;justify-content:center;gap:18px;border-radius:22px;padding:9px 22px;min-width:min(92vw,470px);background:linear-gradient(90deg,rgba(0,229,255,.09),rgba(255,51,78,.045),rgba(0,208,132,.06)),var(--panel2)}.scoreBox{text-align:center;min-width:86px}.scoreLabel{font-size:.64rem;color:var(--muted);font-weight:1000;letter-spacing:2px;text-transform:uppercase}.scoreValue{font-size:2rem;line-height:1;font-weight:1000;color:var(--cyan);text-shadow:0 0 18px rgba(0,229,255,.75);margin-top:4px}.scoreDivider{width:1px;height:44px;background:rgba(255,255,255,.13)}.livePill{margin-top:-4px;border-radius:0 0 22px 22px;padding:7px 12px;display:flex;gap:12px;justify-content:center;align-items:center;color:var(--muted);font-size:.63rem;font-weight:1000;letter-spacing:1.4px;text-transform:uppercase;background:rgba(0,0,0,.38);border-top:0;max-width:92vw}.livePill strong{color:white}.livePill span{color:var(--cyan)}
   #bottomHud{width:100%;padding:0 12px 14px;display:flex;flex-direction:column;align-items:center;pointer-events:auto}#hero{width:100%;text-align:center;margin-bottom:8px;transition:.22s;pointer-events:none}body.playing #hero{height:0;margin:0;opacity:0;overflow:hidden;transform:translateY(12px)}.flagsRemain{font-size:.76rem;color:var(--muted);font-weight:1000;letter-spacing:2.6px;text-transform:uppercase;text-shadow:0 3px 12px #000}.flagsRemain span{color:var(--cyan);font-size:1.2rem;text-shadow:0 0 14px rgba(0,229,255,.8)}.headline{font-size:clamp(1.9rem,7.8vw,4rem);font-weight:1000;letter-spacing:4px;line-height:.96;text-transform:uppercase;background:linear-gradient(90deg,var(--cyan),#6b93ff,var(--red),var(--green),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 22px rgba(0,229,255,.28))}
   #controls{width:100%;max-width:780px;border-radius:24px;padding:12px;background:linear-gradient(90deg,rgba(0,229,255,.065),rgba(255,51,78,.035),rgba(0,208,132,.045)),var(--panel)}.controlRow{display:flex;gap:10px;align-items:center;justify-content:center;flex-wrap:wrap}.mainBtn{min-width:100%;order:1;min-height:58px;border:0;border-radius:18px;background:linear-gradient(90deg,var(--cyan),var(--blue));box-shadow:0 0 30px rgba(0,229,255,.42),inset 0 0 24px rgba(255,255,255,.08);color:white;font-size:1rem;font-weight:1000;letter-spacing:2.2px;text-transform:uppercase;cursor:pointer;text-shadow:0 3px 10px rgba(0,0,0,.4)}.mainBtn.running{background:linear-gradient(90deg,var(--red),#ff8733);box-shadow:0 0 30px rgba(255,51,78,.42)}.selectBox{order:2;min-height:50px;min-width:108px;border-radius:16px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.1);padding:7px 11px;display:flex;flex-direction:column;justify-content:center}.selectBox label{font-size:.56rem;font-weight:1000;letter-spacing:1.8px;color:var(--muted);text-transform:uppercase}.selectBox select{background:transparent;color:white;border:0;outline:0;font-size:1.12rem;font-weight:1000}.autoToggle{order:2;min-height:50px;display:flex;align-items:center;gap:9px;font-weight:1000;letter-spacing:1.25px;white-space:nowrap}.autoToggle input{width:20px;height:20px;accent-color:var(--cyan)}.resetBtn{order:2;flex:1;min-height:50px;border-radius:16px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);color:white;font-size:.86rem;font-weight:1000;letter-spacing:1.3px;padding:0 16px;cursor:pointer}
   .sidePanel{position:absolute;top:142px;left:4vw;right:4vw;width:92vw;max-height:50dvh;overflow:auto;border-radius:22px;padding:17px;z-index:60;pointer-events:auto;transition:.22s}.sidePanel.hidden{opacity:0;transform:translateY(-8px) scale(.96);pointer-events:none}.panelTitle{text-align:center;font-size:.72rem;font-weight:1000;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}.row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.07)}.row:last-child{border-bottom:0}.rankNum{width:24px;color:var(--cyan);font-weight:1000}.flagIcon{width:28px;height:28px;border-radius:50%;object-fit:cover;border:1px solid rgba(255,255,255,.25)}.rowName{flex:1;font-size:.86rem;font-weight:850}.rowScore{font-size:1.05rem;font-weight:1000;color:var(--gold);text-shadow:0 0 12px rgba(255,209,102,.55)}
   #toastLayer{position:absolute;left:50%;top:40%;transform:translate(-50%,-50%);z-index:70;width:100%;text-align:center;pointer-events:none}.bigText{max-width:96vw;margin:0 auto;font-size:clamp(2.15rem,8vw,5.6rem);line-height:1.04;font-weight:1000;text-transform:uppercase;letter-spacing:3px;opacity:0;transform:scale(.65);transition:.34s cubic-bezier(.18,.89,.32,1.28);text-shadow:0 20px 60px rgba(0,0,0,.95)}.bigText.show{opacity:1;transform:scale(1)}.goldText{color:var(--gold);filter:drop-shadow(0 0 34px rgba(255,209,102,.7))}.redText{color:white;filter:drop-shadow(0 0 34px rgba(255,51,78,.7))}.cyanText{color:white;filter:drop-shadow(0 0 34px rgba(0,229,255,.7))}.elimBanner{position:absolute;top:-110px;left:0;width:100vw;padding:13px 0;background:linear-gradient(90deg,transparent,rgba(255,51,78,.94),rgba(0,229,255,.58),transparent);font-size:clamp(1rem,4.2vw,1.85rem);font-weight:1000;letter-spacing:3px;text-transform:uppercase;opacity:0;transition:.22s;text-shadow:0 4px 16px rgba(0,0,0,.9)}.elimBanner.show{top:15dvh;opacity:1}
   @media(min-width:769px){#topHud{grid-template-columns:58px 1fr 150px;padding:14px 18px 0}.scoreWrap{grid-column:2;grid-row:1}.scorePill{min-width:470px;padding:10px 30px;gap:28px}.livePill{font-size:.68rem}.iconBtn{width:58px}.textBtn{font-size:.78rem}.mainBtn{min-width:0;order:3;flex:1}.selectBox,.autoToggle,.resetBtn{order:1}.resetBtn{flex:0 0 auto}.controlRow{flex-wrap:nowrap}.sidePanel{top:96px;right:18px;left:auto;width:330px;max-height:58dvh}.sidePanel.left{right:auto;left:18px}.headline{font-size:clamp(2.6rem,5.2vw,4.4rem)}}
   @media(max-height:720px){.headline{font-size:clamp(1.55rem,6.8vw,3rem)}#hero{margin-bottom:5px}.mainBtn{min-height:52px}.selectBox,.autoToggle,.resetBtn{min-height:46px}#controls{padding:10px}.scoreValue{font-size:1.82rem}.scorePill{padding:8px 18px}.livePill{font-size:.58rem}}
 </style>

<body>
 <div id="loader"><div class="loaderBall"></div><div class="loaderTitle">World Cup 2026 Mobile Arena</div><div class="loaderSub">Pure Canvas Physics · No Lag Edition</div></div>
 <canvas id="bgCanvas"></canvas><canvas id="gameCanvas"></canvas><div id="flash"></div>
 <div id="toastLayer"><div id="elimBanner" class="elimBanner"></div><div id="bigText" class="bigText"></div></div>
 <div id="ui">
   <div id="topHud">
     <button class="iconBtn" id="statsBtn">▥</button>
     <div class="scoreWrap"><div class="scorePill glass"><div class="scoreBox"><div class="scoreLabel">Round</div><div class="scoreValue" id="roundVal">1</div></div><div class="scoreDivider"></div><div class="scoreBox"><div class="scoreLabel">Remaining</div><div class="scoreValue" id="remainVal">48</div></div></div><div class="livePill glass"><div>Match time: <strong id="timerVal">00:00</strong></div><div>Leader: <span id="leaderVal">NONE</span></div></div></div>
     <button class="textBtn" id="rankingBtn">☷ Ranking</button>
   </div>
   <div id="rankingPanel" class="sidePanel glass hidden"><div class="panelTitle">World Cup Leaders</div><div id="rankingList"></div></div>
   <div id="statsPanel" class="sidePanel glass hidden"><div class="panelTitle">Global Statistics</div><div id="statsList"></div><div class="panelTitle" style="margin-top:16px">Elimination Feed</div><div id="feedList"></div></div>
   <div id="bottomHud"><div id="hero"><div class="flagsRemain"><span id="remainHero">48</span> flags remain</div><div class="headline">Who will win?</div></div><div id="controls" class="glass"><div class="controlRow"><div class="selectBox"><label for="targetSelect">First to</label><select id="targetSelect"><option value="3">3</option><option value="5" selected>5</option><option value="7">7</option><option value="10">10</option></select></div><label class="autoToggle"><input type="checkbox" id="autoCheck"> Auto live</label><button id="mainBtn" class="mainBtn">▶ Start Match</button><button id="resetBtn" class="resetBtn">↻ Reset</button></div></div></div>
 </div>
<script>
const TEAM_DATA=[["Mexico","mx"],["South Africa","za"],["South Korea","kr"],["Czechia","cz"],["Canada","ca"],["Bosnia","ba"],["Qatar","qa"],["Switzerland","ch"],["Brazil","br"],["Morocco","ma"],["Haiti","ht"],["Scotland","gb-sct"],["USA","us"],["Paraguay","py"],["Australia","au"],["Türkiye","tr"],["Germany","de"],["Curacao","cw"],["Ivory Coast","ci"],["Ecuador","ec"],["Netherlands","nl"],["Japan","jp"],["Sweden","se"],["Tunisia","tn"],["Belgium","be"],["Egypt","eg"],["Iran","ir"],["New Zealand","nz"],["Spain","es"],["Cape Verde","cv"],["Saudi Arabia","sa"],["Uruguay","uy"],["France","fr"],["Senegal","sn"],["Iraq","iq"],["Norway","no"],["Argentina","ar"],["Algeria","dz"],["Austria","at"],["Jordan","jo"],["Portugal","pt"],["DR Congo","cd"],["Uzbekistan","uz"],["Colombia","co"],["England","gb-eng"],["Croatia","hr"],["Ghana","gh"],["Panama","pa"]];
const BASE_TEAMS=TEAM_DATA.map(([n,c])=>({n,c,s:0}));const $=id=>document.getElementById(id);
const CFG={gap:Math.PI*.135,wallRest:.91,ballRest:.92,maxSpeed:10.8,gravity:.038,damping:.999,rotBase:.0105,rotDuel:.017,subSteps:2};
let state={teams:JSON.parse(JSON.stringify(BASE_TEAMS)),images:{},round:1,target:5,auto:false,running:false,balls:[],rot:0,rotSpeed:CFG.rotBase,timeMs:0,feed:[],m:{}};
let stats={cups:0,rounds:0,fastest:999999,slowest:0,wins:{}};let canvas=$("gameCanvas"),ctx=canvas.getContext("2d"),bg=$("bgCanvas"),bgx=bg.getContext("2d");let cx=0,cy=0,rad=200,last=performance.now(),lastUi=0,stars=[];
function cloneTeams(){return JSON.parse(JSON.stringify(BASE_TEAMS))}function fmt(ms){let t=Math.floor(ms/1000);return String(Math.floor(t/60)).padStart(2,"0")+":"+String(t%60).padStart(2,"0")}
function load(){try{let s=JSON.parse(localStorage.getItem("wc26_mobile_canvas_v1")||"{}");if(Array.isArray(s.teams)&&s.teams.length===48)state.teams=s.teams;state.round=s.round||1;state.target=s.target||5;state.auto=!!s.auto;let st=JSON.parse(localStorage.getItem("wc26_mobile_canvas_stats_v1")||"{}");stats={cups:st.cups||0,rounds:st.rounds||0,fastest:st.fastest||999999,slowest:st.slowest||0,wins:st.wins||{}}}catch(e){}$("targetSelect").value=String(state.target);$("autoCheck").checked=state.auto}
function save(){try{localStorage.setItem("wc26_mobile_canvas_v1",JSON.stringify({teams:state.teams,round:state.round,target:state.target,auto:state.auto}));localStorage.setItem("wc26_mobile_canvas_stats_v1",JSON.stringify(stats))}catch(e){}}
function updateUI(){let sorted=[...state.teams].sort((a,b)=>b.s-a.s||a.n.localeCompare(b.n));$("roundVal").textContent=state.round;$("remainVal").textContent=state.balls.length;$("remainHero").textContent=state.balls.length;$("timerVal").textContent=fmt(state.timeMs);$("leaderVal").textContent=sorted[0]&&sorted[0].s>0?sorted[0].n.toUpperCase():"NONE";$("rankingList").innerHTML=sorted.slice(0,12).map((t,i)=>`<div class="row"><div class="rankNum">${i+1}</div><img class="flagIcon" src="https://flagcdn.com/w40/${t.c}.png" onerror="this.style.display='none'"><div class="rowName">${t.n}</div><div class="rowScore">${t.s}</div></div>`).join("");let most=Object.keys(stats.wins).sort((a,b)=>stats.wins[b]-stats.wins[a])[0];$("statsList").innerHTML=`<div class="row"><div class="rowName">Completed Cups</div><div class="rowScore">${stats.cups}</div></div><div class="row"><div class="rowName">Total Rounds</div><div class="rowScore">${stats.rounds}</div></div><div class="row"><div class="rowName">Fastest Round</div><div class="rowScore">${stats.fastest===999999?"--":fmt(stats.fastest)}</div></div><div class="row"><div class="rowName">Longest Round</div><div class="rowScore">${stats.slowest?fmt(stats.slowest):"--"}</div></div><div class="row"><div class="rowName">Most Championships</div><div class="rowScore">${most?most+" "+stats.wins[most]:"--"}</div></div>`;$("feedList").innerHTML=state.feed.slice(0,10).map(x=>`<div class="row"><div class="rankNum" style="color:var(--red)">#${x.place}</div><div class="rowName">${x.name}</div></div>`).join("")||`<div style="text-align:center;color:var(--muted);font-weight:900;font-size:.82rem">No eliminations yet</div>`}
function fallback(code){let c=document.createElement("canvas"),x=c.getContext("2d");c.width=c.height=96;let g=x.createLinearGradient(0,0,96,96);g.addColorStop(0,"#00e5ff");g.addColorStop(.5,"#156bff");g.addColorStop(1,"#ff334e");x.fillStyle=g;x.fillRect(0,0,96,96);x.fillStyle="rgba(255,255,255,.15)";x.beginPath();x.arc(48,48,43,0,7);x.fill();x.fillStyle="#fff";x.font="1000 22px Segoe UI";x.textAlign="center";x.textBaseline="middle";x.fillText(code.toUpperCase().slice(0,4),48,49);return c}
function preload(){load();let loaded=0,finished=false;function finish(){if(finished)return;finished=true;BASE_TEAMS.forEach(t=>state.images[t.c]||(state.images[t.c]=fallback(t.c)));$("loader").style.display="none";resizeAll();spawn();requestAnimationFrame(loop)}BASE_TEAMS.forEach(t=>{let im=new Image();im.crossOrigin="anonymous";im.onload=()=>{state.images[t.c]=im;if(++loaded===48)finish()};im.onerror=()=>{state.images[t.c]=fallback(t.c);if(++loaded===48)finish()};im.src=`https://flagcdn.com/w80/${t.c}.png`});setTimeout(finish,4200)}
function resizeAll(){let dpr=devicePixelRatio||1;canvas.width=Math.floor(innerWidth*dpr);canvas.height=Math.floor(innerHeight*dpr);canvas.style.width=innerWidth+"px";canvas.style.height=innerHeight+"px";ctx.setTransform(dpr,0,0,dpr,0,0);bg.width=Math.floor(innerWidth*dpr);bg.height=Math.floor(innerHeight*dpr);bg.style.width=innerWidth+"px";bg.style.height=innerHeight+"px";bgx.setTransform(dpr,0,0,dpr,0,0);stars=Array.from({length:innerWidth<700?75:120},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,s:Math.random()*1.8+.45,v:Math.random()*.26+.06,h:Math.random()}));layoutArena();if(state.balls.length&&!state.running&&state.timeMs===0)spawn()}
function layoutArena(){let top=$("topHud").getBoundingClientRect().bottom+10,bottom=$("bottomHud").getBoundingClientRect().top-10,h=Math.max(160,bottom-top);cx=innerWidth/2;cy=top+h/2;let side=innerWidth*(innerWidth<700?.445:.43),height=h*.47;rad=Math.floor(Math.max(108,Math.min(side,height,innerWidth<700?318:400)))}addEventListener("resize",()=>setTimeout(resizeAll,120));
function drawBg(){let t=performance.now()*.00035,g=bgx.createRadialGradient(innerWidth*.5,innerHeight*.35,0,innerWidth*.5,innerHeight*.35,Math.max(innerWidth,innerHeight));g.addColorStop(0,"#102052");g.addColorStop(.46,"#07152f");g.addColorStop(1,"#02040d");bgx.fillStyle=g;bgx.fillRect(0,0,innerWidth,innerHeight);bgx.save();bgx.globalAlpha=.12;bgx.strokeStyle="#00e5ff";for(let i=0;i<5;i++){bgx.beginPath();bgx.arc(innerWidth*.5,innerHeight*.46,150+i*95+Math.sin(t+i)*18,0,7);bgx.stroke()}bgx.restore();for(let p of stars){let col=p.h<.13?"rgba(255,51,78,.72)":p.h<.25?"rgba(0,208,132,.66)":"rgba(0,229,255,.72)";bgx.fillStyle=col;bgx.shadowColor=col;bgx.shadowBlur=8;bgx.beginPath();bgx.arc(p.x,p.y,p.s,0,7);bgx.fill();p.y-=p.v;p.x+=Math.sin(t+p.y*.01)*.05;if(p.y<-8){p.y=innerHeight+8;p.x=Math.random()*innerWidth}}bgx.shadowBlur=0;requestAnimationFrame(drawBg)}drawBg();
function spawn(keepPlaying=false){if(!keepPlaying)document.body.classList.remove("playing");layoutArena();state.balls=[];state.feed=[];state.m={};state.timeMs=0;state.rotSpeed=CFG.rotBase;lastUi=0;$("hero").style.opacity=keepPlaying?"0":"1";let br=Math.max(7.4,Math.min(14.5,rad/18.2)),rings=[[1,0],[7,br*2.55],[14,br*5.25],[26,br*7.95]],idx=0;for(let rr=0;rr<rings.length;rr++){for(let i=0;i<rings[rr][0]&&idx<state.teams.length;i++,idx++){let a=i/rings[rr][0]*Math.PI*2+rr*.09+(Math.random()-.5)*.24;state.balls.push({x:cx+Math.cos(a)*rings[rr][1]+(Math.random()-.5)*br*.8,y:cy-8+Math.sin(a)*rings[rr][1]+(Math.random()-.5)*br*.8,vx:(Math.random()-.5)*5.2,vy:(Math.random()-.5)*5.2,r:br,team:state.teams[idx],angle:Math.random()*7,av:(Math.random()-.5)*.14,dead:false})}}updateUI()}
function physics(dt){let step=dt/CFG.subSteps;for(let s=0;s<CFG.subSteps;s++){state.rot+=state.rotSpeed*step;for(let b of state.balls){b.vy+=CFG.gravity*step;b.vx*=Math.pow(CFG.damping,step);b.vy*=Math.pow(CFG.damping,step);let sp=Math.hypot(b.vx,b.vy);if(sp>CFG.maxSpeed){let k=CFG.maxSpeed/sp;b.vx*=k;b.vy*=k}b.x+=b.vx*step;b.y+=b.vy*step;b.angle+=b.av*step;wallBounce(b)}ballCollisions()}state.balls=state.balls.filter(b=>!b.dead)}
function wallBounce(b){let dx=b.x-cx,dy=b.y-cy,dist=Math.hypot(dx,dy);if(dist<.001)return;let local=Math.atan2(dy,dx)-state.rot;local=Math.atan2(Math.sin(local),Math.cos(local));let inGap=Math.abs(local)<CFG.gap*.54;if(inGap&&dist-b.r>rad+22){eliminateBall(b);return}if(dist+b.r>rad&&!inGap){let nx=dx/dist,ny=dy/dist;b.x=cx+nx*(rad-b.r);b.y=cy+ny*(rad-b.r);let dot=b.vx*nx+b.vy*ny;if(dot>0){b.vx-= (1+CFG.wallRest)*dot*nx;b.vy-= (1+CFG.wallRest)*dot*ny;let tx=-ny,ty=nx,spin=state.rotSpeed*rad*.20;b.vx+=tx*spin;b.vy+=ty*spin;b.av+=dot*.012}}}
function ballCollisions(){let a,b,dx,dy,d2,min,dist,nx,ny,over,rvx,rvy,rel,j;for(let i=0;i<state.balls.length;i++){a=state.balls[i];for(let k=i+1;k<state.balls.length;k++){b=state.balls[k];dx=b.x-a.x;dy=b.y-a.y;d2=dx*dx+dy*dy;min=a.r+b.r;if(d2>0&&d2<min*min){dist=Math.sqrt(d2);nx=dx/dist;ny=dy/dist;over=(min-dist)*.52;a.x-=nx*over;a.y-=ny*over;b.x+=nx*over;b.y+=ny*over;rvx=b.vx-a.vx;rvy=b.vy-a.vy;rel=rvx*nx+rvy*ny;if(rel<0){j=-(1+CFG.ballRest)*rel*.5;a.vx-=j*nx;a.vy-=j*ny;b.vx+=j*nx;b.vy+=j*ny;a.av-=j*.018;b.av+=j*.018}}}}}
function eliminateBall(b){if(b.dead)return;b.dead=true;let place=state.balls.filter(x=>!x.dead).length;state.feed.unshift({place,name:b.team.n});document.body.classList.remove("shake");void document.body.offsetWidth;document.body.classList.add("shake");banner(b.team.n.toUpperCase()+" ELIMINATED!");setTimeout(()=>{updateUI();milestones()},0)}
function draw(){ctx.clearRect(0,0,innerWidth,innerHeight);let gh=CFG.gap/2,start=state.rot+gh,end=state.rot+Math.PI*2-gh,gr=ctx.createLinearGradient(cx-rad,cy,cx+rad,cy);gr.addColorStop(0,"#00e5ff");gr.addColorStop(.3,"#156bff");gr.addColorStop(.55,"#ff334e");gr.addColorStop(.78,"#00d084");gr.addColorStop(1,"#ffd166");ctx.save();ctx.lineCap="round";ctx.beginPath();ctx.arc(cx,cy,rad+2,start,end);ctx.strokeStyle="rgba(0,229,255,.16)";ctx.lineWidth=24;ctx.shadowBlur=44;ctx.shadowColor="#00e5ff";ctx.stroke();ctx.beginPath();ctx.arc(cx,cy,rad,start,end);ctx.strokeStyle=gr;ctx.lineWidth=8;ctx.shadowBlur=16;ctx.stroke();ctx.shadowBlur=0;ctx.beginPath();ctx.arc(cx,cy,rad-18,0,7);ctx.strokeStyle="rgba(255,255,255,.045)";ctx.lineWidth=1;ctx.stroke();for(let b of state.balls){let im=state.images[b.team.c],r=b.r;ctx.save();ctx.translate(b.x,b.y);ctx.rotate(b.angle);ctx.beginPath();ctx.arc(0,0,r+2,0,7);ctx.fillStyle="rgba(255,255,255,.12)";ctx.shadowBlur=12;ctx.shadowColor="rgba(0,229,255,.35)";ctx.fill();ctx.shadowBlur=0;ctx.beginPath();ctx.arc(0,0,r,0,7);ctx.clip();if(im)ctx.drawImage(im,-r,-r,r*2,r*2);let sh=ctx.createRadialGradient(-r*.35,-r*.4,r*.1,0,0,r);sh.addColorStop(0,"rgba(255,255,255,.50)");sh.addColorStop(.5,"rgba(255,255,255,.03)");sh.addColorStop(1,"rgba(0,0,0,.58)");ctx.fillStyle=sh;ctx.fillRect(-r,-r,r*2,r*2);ctx.restore();ctx.beginPath();ctx.arc(b.x,b.y,r,0,7);ctx.strokeStyle="rgba(255,255,255,.55)";ctx.lineWidth=1.25;ctx.stroke()}ctx.restore()}
function loop(now){requestAnimationFrame(loop);let dt=(now-last)/16.666;last=now;if(!Number.isFinite(dt)||dt<=0||dt>2.5)dt=1;if(state.running){state.timeMs+=dt*16.666;if(state.timeMs-lastUi>250){$("timerVal").textContent=fmt(state.timeMs);lastUi=state.timeMs}physics(dt);milestones()}draw()}
function big(html,cls="goldText",ms=2200){let e=$("bigText");e.innerHTML=html;e.className="bigText show "+cls;clearTimeout(big.t);big.t=setTimeout(()=>e.className="bigText",ms)}function banner(txt){let e=$("elimBanner");e.textContent=txt;e.classList.add("show");clearTimeout(banner.t);banner.t=setTimeout(()=>e.classList.remove("show"),1200)}
function milestones(){let r=state.balls.length;if(r===10&&!state.m[10]){state.m[10]=1;big("Final 10","cyanText",1800)}if(r===5&&!state.m[5]){state.m[5]=1;big("Final 5","redText",1800)}if(r===3&&!state.m[3]){state.m[3]=1;big("Final 3","redText",1800)}if(r===2&&!state.m[2]){state.m[2]=1;state.rotSpeed=CFG.rotDuel;big("Final Duel","goldText",2400)}if(r===1)roundWin()}
function roundWin(){if(!state.running)return;state.running=false;btnState();let w=state.balls[0].team,idx=state.teams.findIndex(t=>t.c===w.c);if(idx<0)return;state.teams[idx].s++;stats.rounds++;stats.fastest=Math.min(stats.fastest,state.timeMs);stats.slowest=Math.max(stats.slowest,state.timeMs);$("flash").style.opacity="1";setTimeout(()=>$("flash").style.opacity="0",170);let champ=state.teams[idx].s>=state.target;save();updateUI();if(champ){stats.cups++;stats.wins[w.n]=(stats.wins[w.n]||0)+1;save();if(typeof confetti==="function")confetti({particleCount:650,spread:280,startVelocity:45,origin:{y:.48},zIndex:1000,colors:["#00e5ff","#156bff","#ff334e","#00d084","#ffd166","#fff"]});big(`👑 ${w.n.toUpperCase()}<br>WORLD CHAMPIONS!`,"goldText",7200);setTimeout(()=>{state.teams=cloneTeams();state.round=1;save();spawn();autoNext()},7800)}else{let sc=state.teams[idx].s;big((sc===state.target-1?"🔥 Match Point<br>":"🏆 ")+`${w.n.toUpperCase()} +1 POINT<br>${sc}/${state.target}`,"goldText",3800);setTimeout(()=>{state.round++;save();spawn();autoNext()},4200)}}
function btnState(){let b=$("mainBtn");if(state.running){b.classList.add("running");b.textContent="⏸ Pause Game"}else b.classList.remove("running")}function start(){document.body.classList.add("playing");layoutArena();if(state.timeMs===0||state.balls.length<=1)spawn(true);state.running=true;btnState()}function pause(){state.running=false;$("mainBtn").textContent="▶ Resume Game";btnState()}function autoNext(){if(state.auto)setTimeout(start,850);else{$("mainBtn").textContent="▶ Start Next Round";btnState()}}
$("mainBtn").onclick=()=>state.running?pause():start();$("resetBtn").onclick=()=>{if(confirm("Reset championship to Round 1?")){pause();document.body.classList.remove("playing");state.teams=cloneTeams();state.round=1;state.timeMs=0;save();spawn();$("mainBtn").textContent="▶ Start Match";btnState();updateUI()}};$("targetSelect").onchange=e=>{state.target=parseInt(e.target.value,10)||5;save();updateUI()};$("autoCheck").onchange=e=>{state.auto=e.target.checked;save()};$("rankingBtn").onclick=()=>{$("statsPanel").classList.add("hidden");$("rankingPanel").classList.toggle("hidden");updateUI()};$("statsBtn").onclick=()=>{$("rankingPanel").classList.add("hidden");$("statsPanel").classList.toggle("hidden");updateUI()};preload();
</script>
