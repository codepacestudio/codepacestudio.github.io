<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>World Cup 2026 Survivor - Pro Live Edition</title>
    <style>
        :root {
            --bg-dark: #050510;
            --accent: #00f0ff;
            --accent-glow: rgba(0, 240, 255, 0.5);
            --danger: #ff003c;
            --danger-glow: rgba(255, 0, 60, 0.5);
            --gold: #ffd700;
            --gold-glow: rgba(255, 215, 0, 0.5);
            --glass-bg: rgba(15, 15, 25, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Shake Animation */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .shake-active {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        /* Layers */
        #bg-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        #game-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }

        /* Glassmorphism UI */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            pointer-events: auto;
        }

        /* Header Area */
        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 15px;
        }

        .stats-box {
            display: flex;
            gap: 20px;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-val {
            font-size: 2rem;
            font-weight: 900;
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.6);
        }

        /* Top 5 Leaderboard */
        .leaderboard {
            min-width: 200px;
        }

        .lb-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: rgba(255,255,255,0.6);
            margin-bottom: 10px;
            text-align: center;
            letter-spacing: 2px;
        }

        .lb-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            background: rgba(0,0,0,0.3);
            padding: 5px 10px;
            border-radius: 8px;
        }

        .lb-rank { width: 20px; font-weight: bold; color: var(--accent); }
        .lb-flag { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; margin-right: 10px; border: 1px solid var(--glass-border); }
        .lb-name { flex: 1; font-weight: 600; font-size: 0.9rem; }
        .lb-score { font-weight: 900; color: var(--gold); }

        /* Controls Area */
        .controls-area {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 15px;
        }

        button {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover { background: rgba(255,255,255,0.2); transform: translateY(-2px); }
        button.btn-start { background: rgba(0, 240, 255, 0.2); border-color: var(--accent); color: var(--accent); }
        button.btn-start:hover { background: var(--accent); color: black; box-shadow: 0 0 20px var(--accent-glow); }

        select {
            background: rgba(0,0,0,0.5);
            color: white;
            border: 1px solid var(--glass-border);
            padding: 10px;
            border-radius: 8px;
            outline: none;
        }

        /* Dramatic Headers & Notifications */
        #notify-layer {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 50;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .dramatic-text {
            font-size: 8vw;
            font-weight: 900;
            text-transform: uppercase;
            text-align: center;
            opacity: 0;
            transform: scale(0.2) translateY(50px);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-shadow: 0 10px 30px rgba(0,0,0,0.9);
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.5));
            background: -webkit-linear-gradient(#fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .dramatic-text.show {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .text-danger { background: -webkit-linear-gradient(#ff5577, #ff003c); -webkit-background-clip: text; filter: drop-shadow(0 0 30px var(--danger-glow)); }
        .text-gold { background: -webkit-linear-gradient(#ffeeaa, #ffd700); -webkit-background-clip: text; filter: drop-shadow(0 0 40px var(--gold-glow)); font-size: 10vw;}

        .elim-banner {
            background: linear-gradient(90deg, transparent, rgba(255,0,60,0.8), transparent);
            width: 100vw;
            text-align: center;
            padding: 15px 0;
            font-size: 2rem;
            font-weight: 800;
            color: white;
            opacity: 0;
            transform: scaleY(0);
            transition: 0.3s;
        }

        .elim-banner.show { opacity: 1; transform: scaleY(1); }

        #flash {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: white; opacity: 0; z-index: 100; pointer-events: none;
            transition: opacity 0.2s;
        }

        /* Loading */
        #loader {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: var(--bg-dark); z-index: 200;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .spinner { width: 60px; height: 60px; border: 4px solid rgba(0,240,255,0.2); border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .header-area { flex-direction: column; align-items: center; }
            .stats-box { width: 100%; justify-content: space-around; }
            .leaderboard { width: 100%; }
            .dramatic-text { font-size: 12vw; }
            .controls-area { flex-wrap: wrap; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <div id="loader"><div class="spinner"></div><div style="margin-top:20px; font-weight:bold; color:var(--accent);">INITIALIZING PHYSICS...</div></div>

    <canvas id="bg-canvas"></canvas>
    
    <div id="wrapper" style="position:absolute; width:100%; height:100%;">
        <div id="game-layer"></div>
    </div>

    <div id="flash"></div>

    <div id="notify-layer">
        <div id="elim-banner" class="elim-banner"></div>
        <div id="dramatic-msg" class="dramatic-text"></div>
    </div>

    <div id="ui-layer">
        <div class="header-area">
            <div class="glass-panel stats-box">
                <div class="stat">
                    <div class="stat-label">Round</div>
                    <div class="stat-val" id="ui-round">1</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Remaining</div>
                    <div class="stat-val" id="ui-rem">48</div>
                </div>
            </div>
            
            <div class="glass-panel leaderboard">
                <div class="lb-title">Top 5 Leaders</div>
                <div id="lb-content"></div>
            </div>
        </div>

        <div class="controls-area">
            <div class="glass-panel" style="display:flex; gap:10px; align-items:center;">
                <select id="set-target">
                    <option value="3">Best of 3</option>
                    <option value="5">Best of 5</option>
                    <option value="7">Best of 7</option>
                </select>
                <label style="font-size:0.8rem; font-weight:bold;"><input type="checkbox" id="set-auto"> AUTO LIVE</label>
            </div>
            <button class="btn-start" id="btn-start">Start Game</button>
            <button id="btn-reset">Reset</button>
        </div>
    </div>

    <script>
        // --- DATA ---
        const TEAMS = [
            { n: "USA", c: "us" }, { n: "Mexico", c: "mx" }, { n: "Canada", c: "ca" },
            { n: "Brazil", c: "br" }, { n: "Argentina", c: "ar" }, { n: "France", c: "fr" },
            { n: "Germany", c: "de" }, { n: "Italy", c: "it" }, { n: "Spain", c: "es" },
            { n: "England", c: "gb-eng" }, { n: "Portugal", c: "pt" }, { n: "Netherlands", c: "nl" },
            { n: "Belgium", c: "be" }, { n: "Croatia", c: "hr" }, { n: "Uruguay", c: "uy" },
            { n: "Colombia", c: "co" }, { n: "Japan", c: "jp" }, { n: "South Korea", c: "kr" },
            { n: "Morocco", c: "ma" }, { n: "Senegal", c: "sn" }, { n: "Switzerland", c: "ch" },
            { n: "Denmark", c: "dk" }, { n: "Poland", c: "pl" }, { n: "Sweden", c: "se" },
            { n: "Serbia", c: "rs" }, { n: "Australia", c: "au" }, { n: "Ecuador", c: "ec" },
            { n: "Peru", c: "pe" }, { n: "Chile", c: "cl" }, { n: "Nigeria", c: "ng" },
            { n: "Egypt", c: "eg" }, { n: "Algeria", c: "dz" }, { n: "Cameroon", c: "cm" },
            { n: "Ivory Coast", c: "ci" }, { n: "Mali", c: "ml" }, { n: "Tunisia", c: "tn" },
            { n: "Ghana", c: "gh" }, { n: "Costa Rica", c: "cr" }, { n: "Panama", c: "pa" },
            { n: "Jamaica", c: "jm" }, { n: "Honduras", c: "hn" }, { n: "New Zealand", c: "nz" },
            { n: "Qatar", c: "qa" }, { n: "Turkey", c: "tr" }, { n: "Ukraine", c: "ua" },
            { n: "Saudi Arabia", c: "sa" }, { n: "Iran", c: "ir" }, { n: "Venezuela", c: "ve" }
        ];

        let state = {
            teams: [], images: {}, loaded: 0,
            round: 1, target: 3, auto: false, running: false,
            balls: [], arenaRot: 0, rotSpeed: 0.008, 
            baseTimeScale: 1, zoom: 1
        };

        // --- AUDIO ENGINE ---
        let actx;
        function initAudio() { if(!actx) actx = new (window.AudioContext || window.webkitAudioContext)(); if(actx.state==='suspended') actx.resume(); }
        
        function playTone(freq, type, dur, vol, slideFreq=null) {
            if(!actx) return;
            const osc = actx.createOscillator();
            const gain = actx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, actx.currentTime);
            if(slideFreq) osc.frequency.exponentialRampToValueAtTime(slideFreq, actx.currentTime + dur);
            gain.gain.setValueAtTime(vol, actx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
            osc.connect(gain); gain.connect(actx.destination);
            osc.start(); osc.stop(actx.currentTime + dur);
        }

        function sndHit(velocity) {
            if(!actx || velocity < 2) return;
            const vol = Math.min(velocity * 0.02, 0.15);
            playTone(150 + Math.random()*50, 'triangle', 0.1, vol);
        }

        function sndEliminate() {
            playTone(300, 'sawtooth', 0.5, 0.2, 50);
            setTimeout(()=>playTone(150, 'square', 0.4, 0.2, 30), 100);
        }

        function sndEvent() { playTone(800, 'sine', 1.0, 0.2, 200); }
        
        function sndWin() {
            [440, 554, 659, 880].forEach((f, i) => setTimeout(()=>playTone(f, 'square', 0.5, 0.1), i*100));
        }

        function sndChampion() {
            [440, 554, 659, 880, 1108, 1318].forEach((f, i) => setTimeout(()=>playTone(f, 'sine', 0.8, 0.15), i*150));
            setTimeout(()=>playTone(880, 'square', 2.0, 0.2), 900);
        }

        // --- BACKGROUND PARTICLES ---
        const bgCanvas = document.getElementById('bg-canvas');
        const bgCtx = bgCanvas.getContext('2d');
        let particles = [];
        function initBg() {
            bgCanvas.width = window.innerWidth; bgCanvas.height = window.innerHeight;
            particles = Array.from({length: 50}, () => ({
                x: Math.random() * bgCanvas.width,
                y: Math.random() * bgCanvas.height,
                s: Math.random() * 2 + 1,
                v: Math.random() * 0.5 + 0.2
            }));
        }
        function drawBg() {
            bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
            bgCtx.fillStyle = 'rgba(0, 240, 255, 0.3)';
            particles.forEach(p => {
                bgCtx.beginPath(); bgCtx.arc(p.x, p.y, p.s, 0, Math.PI*2); bgCtx.fill();
                p.y -= p.v;
                if(p.y < 0) { p.y = bgCanvas.height; p.x = Math.random() * bgCanvas.width; }
            });
            requestAnimationFrame(drawBg);
        }
        initBg(); drawBg(); window.addEventListener('resize', initBg);

        // --- CORE LOGIC & STORAGE ---
        function loadStorage() {
            const sv = localStorage.getItem('wcProSave');
            if(sv) {
                const p = JSON.parse(sv);
                state.teams = p.teams; state.round = p.round;
            } else initData();
        }
        function saveStorage() { localStorage.setItem('wcProSave', JSON.stringify({teams: state.teams, round: state.round})); }
        function initData() { state.teams = TEAMS.map(t => ({...t, s: 0})); state.round = 1; saveStorage(); }

        function updateUI() {
            document.getElementById('ui-round').innerText = state.round;
            document.getElementById('ui-rem').innerText = state.balls.length;
            
            const sort = [...state.teams].sort((a,b) => b.s - a.s || a.n.localeCompare(b.n)).slice(0, 5);
            document.getElementById('lb-content').innerHTML = sort.map((t, i) => `
                <div class="lb-row">
                    <div class="lb-rank">${i+1}</div>
                    <img src="https://flagcdn.com/w40/${t.c}.png" class="lb-flag" crossorigin="anonymous">
                    <div class="lb-name">${t.n}</div>
                    <div class="lb-score">${t.s}</div>
                </div>
            `).join('');
        }

        function preload() {
            TEAMS.forEach(t => {
                const img = new Image(); img.crossOrigin = "anonymous";
                img.onload = () => {
                    state.images[t.c] = img; state.loaded++;
                    if(state.loaded === TEAMS.length) { document.getElementById('loader').style.display = 'none'; loadStorage(); updateUI(); setupMatter(); }
                };
                img.src = `https://flagcdn.com/w80/${t.c}.png`;
            });
        }

        // --- MATTER.JS PHYSICS ---
        const { Engine, Render, Runner, Bodies, Body, Composite, Events, Vector } = Matter;
        let eng, rnd, run, arena;
        let cx, cy, rad;

        function setupMatter() {
            const cont = document.getElementById('game-layer');
            eng = Engine.create({ positionIterations: 8, velocityIterations: 8 });
            eng.gravity.y = 0; eng.gravity.x = 0; // Top-down
            
            rnd = Render.create({
                element: cont, engine: eng,
                options: { width: window.innerWidth, height: window.innerHeight, wireframes: false, background: 'transparent' }
            });

            resizeArena();
            Render.run(rnd);
            run = Runner.create();

            // Custom Render for Flags
            Events.on(rnd, 'afterRender', () => {
                const ctx = rnd.context;
                // Handle Zoom
                ctx.save();
                if(state.zoom !== 1) {
                    ctx.translate(cx, cy); ctx.scale(state.zoom, state.zoom); ctx.translate(-cx, -cy);
                }

                state.balls.forEach(b => {
                    const t = b.tData; const img = state.images[t.c];
                    if(img) {
                        ctx.save();
                        ctx.translate(b.position.x, b.position.y);
                        ctx.rotate(b.angle);
                        ctx.beginPath(); ctx.arc(0, 0, b.circleRadius, 0, Math.PI*2); ctx.clip();
                        const r = b.circleRadius;
                        ctx.drawImage(img, -r, -r, r*2, r*2);
                        // Glass/Light effect on ball
                        const grad = ctx.createRadialGradient(-r*0.3, -r*0.3, r*0.1, 0, 0, r);
                        grad.addColorStop(0, 'rgba(255,255,255,0.4)'); grad.addColorStop(1, 'rgba(0,0,0,0.4)');
                        ctx.fillStyle = grad; ctx.fill();
                        ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.stroke();
                        ctx.restore();
                    }
                });
                ctx.restore();
            });

            // Collisions for sound
            Events.on(eng, 'collisionStart', (e) => {
                e.pairs.forEach(p => {
                    if(!p.bodyA.isStatic && !p.bodyB.isStatic) {
                        const vA = p.bodyA.velocity; const vB = p.bodyB.velocity;
                        const relVel = Math.hypot(vA.x - vB.x, vA.y - vB.y);
                        sndHit(relVel);
                    }
                });
            });

            Events.on(eng, 'beforeUpdate', physicsLoop);
            spawn();
        }

        function resizeArena() {
            cx = window.innerWidth / 2; cy = window.innerHeight / 2;
            rad = Math.min(window.innerWidth, window.innerHeight) * 0.42;
            
            if(rnd) { rnd.canvas.width = window.innerWidth; rnd.canvas.height = window.innerHeight; rnd.options.width = window.innerWidth; rnd.options.height = window.innerHeight; }
            if(arena) Composite.remove(eng.world, arena);

            const parts = []; const segs = 70; const thick = 30;
            for(let i=0; i<segs; i++) {
                if(i < 5) continue; // Gap
                const a = (i/segs) * Math.PI*2;
                const p = Bodies.rectangle(cx + Math.cos(a)*rad, cy + Math.sin(a)*rad, (Math.PI*2*rad)/segs * 1.05, thick, {
                    angle: a, isStatic: true, restitution: 0.8, friction: 0.1,
                    render: { fillStyle: 'rgba(0, 240, 255, 0.1)', strokeStyle: '#00f0ff', lineWidth: 2 }
                });
                parts.push(p);
            }
            arena = Body.create({ parts: parts, isStatic: true });
            Body.setPosition(arena, {x: cx, y: cy});
            Composite.add(eng.world, arena);
            if(!state.running) spawn();
        }

        window.addEventListener('resize', () => { clearTimeout(window.rsz); window.rsz = setTimeout(resizeArena, 200); });

        function spawn() {
            state.balls.forEach(b => Composite.remove(eng.world, b));
            state.balls = [];
            const br = Math.max(10, rad / 22);
            
            state.teams.forEach((t, i) => {
                const a = (i/state.teams.length) * Math.PI*2;
                const d = Math.random()*(rad*0.6) + 30;
                const b = Bodies.circle(cx + Math.cos(a)*d, cy + Math.sin(a)*d, br, {
                    restitution: 0.95, friction: 0.02, frictionAir: 0.005, density: 0.05, render: { visible: false }
                });
                b.tData = t; state.balls.push(b); Composite.add(eng.world, b);
            });
            state.baseTimeScale = 1; eng.timing.timeScale = 1; state.zoom = 1; updateUI();
        }

        // --- DRAMA & UI FX ---
        const elWrap = document.getElementById('wrapper');
        const dText = document.getElementById('dramatic-msg');
        const elimBan = document.getElementById('elim-banner');

        function shake() { elWrap.classList.remove('shake-active'); void elWrap.offsetWidth; elWrap.classList.add('shake-active'); }
        
        function showText(txt, cls, dur) {
            dText.innerHTML = txt; dText.className = `dramatic-text show ${cls}`;
            setTimeout(() => dText.className = 'dramatic-text', dur);
        }

        function showElim(txt) {
            elimBan.innerHTML = txt; elimBan.classList.add('show');
            setTimeout(() => elimBan.classList.remove('show'), 1500);
        }

        // --- GAME LOOP ---
        function physicsLoop() {
            if(!state.running) return;

            // Arena Rotation
            state.arenaRot += state.rotSpeed;
            Body.setAngle(arena, state.arenaRot); Body.setPosition(arena, {x: cx, y: cy});

            // Random impulses (Chaos)
            if(Math.random() < 0.03) {
                const b = state.balls[Math.floor(Math.random()*state.balls.length)];
                if(b) Body.applyForce(b, b.position, {x: (Math.random()-0.5)*0.01, y: (Math.random()-0.5)*0.01});
            }

            // Speed changes
            if(Math.random() < 0.005) state.rotSpeed = (Math.random() > 0.5 ? 1 : -1) * (0.005 + Math.random()*0.01);

            // Bounds check & Elimination
            for(let i = state.balls.length-1; i>=0; i--) {
                const b = state.balls[i];
                if(Math.hypot(b.position.x - cx, b.position.y - cy) > rad + 20) {
                    const t = b.tData;
                    Composite.remove(eng.world, b); state.balls.splice(i, 1);
                    
                    sndEliminate(); shake();
                    showElim(`${t.n.toUpperCase()} ELIMINATED!`);
                    updateUI();
                    checkMilestones();
                }
            }
        }

        function checkMilestones() {
            const rem = state.balls.length;
            if(rem === 10) { showText("FINAL 10", "", 2000); sndEvent(); }
            if(rem === 5) { showText("FINAL 5", "text-danger", 2000); sndEvent(); state.rotSpeed *= 1.5; }
            if(rem === 3) { showText("FINAL 3", "text-danger", 2000); sndEvent(); eng.timing.timeScale = 0.6; } // Slowmo
            if(rem === 2) { showText("FINAL 2", "text-gold", 2000); sndEvent(); eng.timing.timeScale = 0.4; state.zoom = 1.3; } // Super Slow + Zoom
            if(rem === 1) handleWin();
        }

        function handleWin() {
            state.running = false; Runner.stop(run);
            const w = state.balls[0].tData;
            const idx = state.teams.findIndex(t => t.c === w.c);
            state.teams[idx].s++; saveStorage(); updateUI();

            const isChamp = state.teams[idx].s >= state.target;

            document.getElementById('flash').style.opacity = '1';
            setTimeout(() => document.getElementById('flash').style.opacity = '0', 300);

            if(isChamp) {
                sndChampion();
                confetti({ particleCount: 300, spread: 150, origin: { y: 0.6 }, zIndex: 1000, colors: ['#ffd700', '#00f0ff', '#ffffff'] });
                showText(`
                    👑 ${w.n.toUpperCase()} WINS! 👑<br>
                    <img src="https://flagcdn.com/w160/${w.c}.png" style="margin-top:30px; border-radius:15px; box-shadow:0 0 50px var(--gold); border: 2px solid var(--gold);">
                `, 'text-gold', 7000);
                setTimeout(() => { initData(); updateUI(); if(state.auto) start(); else resetUI(); }, 8000);
            } else {
                sndWin();
                showText(`🏆 ${w.n.toUpperCase()} +1 POINT!`, 'text-gold', 4000);
                setTimeout(() => { state.round++; saveStorage(); if(state.auto) start(); else resetUI(); }, 4500);
            }
        }

        function start() {
            initAudio();
            if(state.balls.length <= 1) spawn();
            state.running = true; Runner.run(run, eng);
            document.getElementById('btn-start').innerText = "Running...";
        }

        function resetUI() {
            spawn();
            document.getElementById('btn-start').innerText = "Start Game";
        }

        // --- EVENTS ---
        document.getElementById('btn-start').onclick = () => { if(!state.running) start(); };
        document.getElementById('btn-reset').onclick = () => {
            if(confirm("Wipe all scores and reset?")) { state.running = false; Runner.stop(run); initData(); resetUI(); }
        };
        document.getElementById('set-target').onchange = (e) => state.target = parseInt(e.target.value);
        document.getElementById('set-auto').onchange = (e) => state.auto = e.target.checked;

        preload();
    </script>
</body>
</html>
