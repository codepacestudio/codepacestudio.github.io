<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>World Cup 2026 Simulator - Ultimate Balance</title>
    <style>
        :root {
            --bg-base: #03050a;
            --accent: #00e5ff;
            --accent-glow: rgba(0, 229, 255, 0.5);
            --danger: #ff0044;
            --danger-glow: rgba(255, 0, 68, 0.6);
            --gold: #ffd700;
            --glass-bg: rgba(10, 15, 30, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #8892b0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #bg-canvas, #physics-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }
        #bg-canvas { z-index: 1; opacity: 0.6; }
        #physics-canvas { z-index: 2; }

        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-3px, 2px); }
            50% { transform: translate(3px, -2px); }
            75% { transform: translate(-3px, -2px); }
        }
        .shake-active { animation: shake 0.25s cubic-bezier(.36,.07,.19,.97) both; }
        #flash-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: white; opacity: 0; z-index: 99; pointer-events: none; transition: opacity 0.15s; }

        #ui-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: auto;
            width: 100%;
        }

        .icon-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: white;
            width: 45px; height: 45px;
            border-radius: 12px;
            font-size: 1.2rem;
            cursor: pointer;
            backdrop-filter: blur(10px);
            display: flex; justify-content: center; align-items: center;
            transition: 0.2s;
        }
        .icon-btn:hover { background: rgba(255,255,255,0.15); }

        .score-pill {
            display: flex;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 10px 30px;
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
            gap: 30px;
        }

        .score-half { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .score-half .label { font-size: 0.7rem; color: var(--text-muted); letter-spacing: 2px; font-weight: 700; text-transform: uppercase;}
        .score-half .value { font-size: 2.2rem; font-weight: 900; color: var(--accent); text-shadow: 0 0 15px var(--accent-glow); line-height: 1; margin-top: 4px; }
        .divider { width: 1px; background: rgba(255,255,255,0.15); margin: 5px 0; }

        .btn-ranking {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 0.85rem;
            cursor: pointer;
            backdrop-filter: blur(15px);
            transition: 0.3s;
            display: flex; align-items: center; gap: 8px; letter-spacing: 1px;
        }
        .btn-ranking:hover { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

        .ranking-panel {
            position: absolute;
            top: 80px; right: 20px;
            width: 260px;
            background: rgba(8, 12, 25, 0.9);
            border: 1px solid var(--accent-glow);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(25px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-origin: top right;
            pointer-events: auto;
            max-height: 50vh;
            overflow-y: auto;
            z-index: 20;
        }
        .ranking-panel.hidden { transform: scale(0.9) translateY(-10px); opacity: 0; pointer-events: none; }
        .lb-title { text-align: center; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 15px; letter-spacing: 3px; font-weight: 800; }
        .lb-row { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .lb-rank { width: 25px; color: var(--accent); font-weight: 900; font-size: 0.9rem; }
        .lb-flag { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; margin-right: 12px; border: 1px solid rgba(255,255,255,0.2); }
        .lb-name { flex: 1; font-size: 0.9rem; font-weight: 700; }
        .lb-score { font-weight: 900; color: var(--gold); font-size: 1.1rem; }

        .bottom-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .center-labels { width: 100%; text-align: center; margin-bottom: 15px; }
        .flags-remain { font-size: 0.9rem; color: var(--text-muted); letter-spacing: 2px; margin-bottom: 5px; font-weight: 700; }
        .flags-remain span { color: var(--accent); font-weight: 900; font-size: 1.3rem; }
        .who-wins { font-size: 2.8rem; font-weight: 900; letter-spacing: 3px; text-shadow: 0 0 25px var(--accent-glow); line-height: 1; }

        .controls-panel {
            width: 100%; max-width: 700px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(25px);
            pointer-events: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            display: flex; flex-direction: column; gap: 20px;
        }
        .controls-main { display: flex; justify-content: space-between; align-items: center; gap: 15px; }
        .select-wrapper { display: flex; flex-direction: column; }
        .select-wrapper label { font-size: 0.65rem; color: var(--text-muted); margin-bottom: 5px; font-weight: bold; letter-spacing: 1px; }
        .select-wrapper select { background: rgba(0,0,0,0.4); color: white; border: 1px solid var(--glass-border); padding: 12px; border-radius: 8px; font-weight: 900; outline: none; cursor: pointer; font-size: 1rem; }
        
        .auto-live { display: flex; align-items: center; gap: 10px; font-size: 0.9rem; font-weight: 800; cursor: pointer; letter-spacing: 1px;}
        .auto-live input { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; }

        button.action-btn { flex: 1; padding: 16px; font-weight: 900; font-size: 1rem; border-radius: 12px; cursor: pointer; border: none; text-transform: uppercase; transition: 0.2s; letter-spacing: 2px; }
        .btn-primary { background: linear-gradient(90deg, #00f0ff, #0080ff); color: #000; box-shadow: 0 0 25px var(--accent-glow); }
        .btn-primary:active { transform: scale(0.96); }
        .btn-secondary { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border) !important; color: white; }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); }

        .controls-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px; }
        .footer-col { display: flex; flex-direction: column; align-items: center; text-align: center; }
        .footer-col .small-text { font-size: 0.6rem; color: var(--text-muted); letter-spacing: 1px; font-weight: 600; }
        .footer-col .cyan-text { font-size: 0.9rem; color: var(--accent); font-weight: 900; margin: 4px 0; letter-spacing: 1px;}
        .footer-col.mid .trophy-icon { font-size: 1.5rem; color: var(--accent); text-shadow: 0 0 15px var(--accent); margin-bottom: 5px;}

        #notify-layer { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); z-index: 50; pointer-events: none; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .dramatic-text {
            font-size: 9vw; font-weight: 900; text-transform: uppercase; text-align: center;
            opacity: 0; transform: scale(0.5); transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-shadow: 0 15px 40px rgba(0,0,0,0.9);
            background: -webkit-linear-gradient(#fff, #bbb); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            line-height: 1.1;
        }
        .dramatic-text.show { opacity: 1; transform: scale(1); }
        .text-accent { background: -webkit-linear-gradient(#fff, #00e5ff); -webkit-background-clip: text; filter: drop-shadow(0 0 30px var(--accent-glow)); }
        .text-danger { background: -webkit-linear-gradient(#ffaaaa, #ff0044); -webkit-background-clip: text; filter: drop-shadow(0 0 50px var(--danger-glow)); }
        .text-gold { background: -webkit-linear-gradient(#fff, #ffd700); -webkit-background-clip: text; filter: drop-shadow(0 0 60px rgba(255, 215, 0, 0.7)); font-size: 11vw;}

        .elim-banner {
            position: absolute; top: -100px;
            background: linear-gradient(90deg, transparent, rgba(255,0,68,0.95), transparent);
            width: 100vw; text-align: center; padding: 15px 0; font-size: 2rem; font-weight: 900; color: white;
            opacity: 0; transform: scaleY(0); transition: 0.3s; letter-spacing: 2px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.8);
        }
        .elim-banner.show { opacity: 1; transform: scaleY(1); top: 0; }

        #loader {
            position: absolute; top:0; left:0; width:100%; height:100%; background: var(--bg-base); z-index: 200;
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--accent); font-weight: 900; font-size: 1.5rem; letter-spacing: 3px;
        }

        @media (max-width: 768px) {
            .top-bar { padding: 15px; }
            .score-pill { padding: 10px 20px; gap: 20px; }
            .score-half .value { font-size: 1.6rem; }
            .who-wins { font-size: 2rem; }
            .controls-panel { width: 95%; padding: 15px; gap: 15px; }
            .controls-main { flex-wrap: wrap; justify-content: center; gap: 10px; }
            button.action-btn { min-width: 100%; padding: 12px; }
            .dramatic-text { font-size: 12vw; }
            .controls-footer { display: none; }
        }
        @media (max-height: 750px) {
            .center-labels { margin-bottom: 10px; }
            .who-wins { font-size: 1.8rem; }
            .ranking-panel { top: 70px; max-height: 40vh; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <div id="loader">INITIALIZING PHYSICS ENGINE...</div>
    <canvas id="bg-canvas"></canvas>
    <canvas id="physics-canvas"></canvas>
    <div id="flash-overlay"></div>

    <div id="notify-layer">
        <div id="elim-banner" class="elim-banner"></div>
        <div id="dramatic-msg" class="dramatic-text"></div>
    </div>

    <div id="ui-layer">
        <div class="top-bar">
            <button class="icon-btn">☰</button>
            <div class="score-pill">
                <div class="score-half">
                    <div class="label">ROUND</div>
                    <div class="value" id="val-round">1</div>
                </div>
                <div class="divider"></div>
                <div class="score-half">
                    <div class="label">REMAINING</div>
                    <div class="value" id="val-rem">48</div>
                </div>
            </div>
            <button id="btn-ranking" class="btn-ranking">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M4 22H20C21.1 22 22 21.1 22 20V4C22 2.9 21.1 2 20 2H4C2.9 2 2 2.9 2 4V20C2 21.1 2.9 22 4 22ZM7 14H9V18H7V14ZM11 10H13V18H11V10ZM15 6H17V18H15V6Z"/></svg> 
                RANKING
            </button>
        </div>

        <div class="ranking-panel hidden" id="ranking-panel">
            <div class="lb-title">TOP 5 LEADERS</div>
            <div id="lb-content"></div>
        </div>

        <div class="bottom-section">
            <div class="center-labels" id="center-labels">
                <div class="flags-remain"><span id="lbl-rem-num">48</span> FLAGS REMAIN</div>
                <div class="who-wins">WHO WILL WIN?</div>
            </div>

            <div class="controls-panel">
                <div class="controls-main">
                    <div class="select-wrapper">
                        <label>BEST OF</label>
                        <select id="sel-target">
                            <option value="3">3</option>
                            <option value="5" selected>5</option>
                            <option value="7">7</option>
                        </select>
                    </div>
                    <label class="auto-live"><input type="checkbox" id="chk-auto"> AUTO LIVE</label>
                    <button id="btn-action" class="action-btn btn-primary">▶ START GAME</button>
                    <button id="btn-reset" class="action-btn btn-secondary">↻ RESET</button>
                </div>
                <div class="controls-footer">
                    <div class="footer-col">
                        <div class="small-text">FIRST TEAM TO</div>
                        <div class="cyan-text" id="ft-pts">5 POINTS</div>
                        <div class="small-text">WINS THE BATTLE</div>
                    </div>
                    <div class="footer-col mid">
                        <div class="trophy-icon">🏆</div>
                        <div class="small-text">SURVIVE. ELIMINATE. WIN.</div>
                    </div>
                    <div class="footer-col">
                        <div class="small-text">MAY THE BEST</div>
                        <div class="cyan-text">FLAG</div>
                        <div class="small-text">WIN!</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const TEAMS = [
            { n: "Mexico", c: "mx" }, { n: "South Africa", c: "za" }, { n: "South Korea", c: "kr" }, { n: "Czechia", c: "cz" },
            { n: "Canada", c: "ca" }, { n: "Bosnia", c: "ba" }, { n: "Qatar", c: "qa" }, { n: "Switzerland", c: "ch" },
            { n: "Brazil", c: "br" }, { n: "Morocco", c: "ma" }, { n: "Haiti", c: "ht" }, { n: "Scotland", c: "gb-sct" },
            { n: "USA", c: "us" }, { n: "Paraguay", c: "py" }, { n: "Australia", c: "au" }, { n: "Türkiye", c: "tr" },
            { n: "Germany", c: "de" }, { n: "Curacao", c: "cw" }, { n: "Ivory Coast", c: "ci" }, { n: "Ecuador", c: "ec" },
            { n: "Netherlands", c: "nl" }, { n: "Japan", c: "jp" }, { n: "Sweden", c: "se" }, { n: "Tunisia", c: "tn" },
            { n: "Belgium", c: "be" }, { n: "Egypt", c: "eg" }, { n: "Iran", c: "ir" }, { n: "New Zealand", c: "nz" },
            { n: "Spain", c: "es" }, { n: "Cape Verde", c: "cv" }, { n: "Saudi Arabia", c: "sa" }, { n: "Uruguay", c: "uy" },
            { n: "France", c: "fr" }, { n: "Senegal", c: "sn" }, { n: "Iraq", c: "iq" }, { n: "Norway", c: "no" },
            { n: "Argentina", c: "ar" }, { n: "Algeria", c: "dz" }, { n: "Austria", c: "at" }, { n: "Jordan", c: "jo" },
            { n: "Portugal", c: "pt" }, { n: "DR Congo", c: "cd" }, { n: "Uzbekistan", c: "uz" }, { n: "Colombia", c: "co" },
            { n: "England", c: "gb-eng" }, { n: "Croatia", c: "hr" }, { n: "Ghana", c: "gh" }, { n: "Panama", c: "pa" }
        ];

        let state = {
            teams: [], images: {}, loaded: 0,
            round: 1, target: 5, auto: false, running: false,
            balls: [], arenaRot: 0, 
            rotSpeed: 0.012, targetRotSpeed: 0.012,
            timeScale: 1, targetTimeScale: 1, zoom: 1, targetZoom: 1,
            m10: false, m5: false, m3: false, m2: false,
            timeSinceLastElim: 0, currentGap: 0, targetGap: 0
        };

        const MAX_BALL_SPEED = 18; // Limit, żeby piłki nie latały jak rakiety

        let actx = null;
        let lastHitTime = 0;
        
        function initAudio() {
            try {
                if(!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
                if(actx.state === 'suspended') actx.resume();
            } catch(e) {}
        }
        
        function playTone(freq, type, dur, vol, slideFreq=null) {
            if(!actx) return;
            try {
                const osc = actx.createOscillator();
                const gain = actx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, actx.currentTime);
                if(slideFreq) osc.frequency.exponentialRampToValueAtTime(slideFreq, actx.currentTime + dur);
                gain.gain.setValueAtTime(vol, actx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
                osc.connect(gain); gain.connect(actx.destination);
                osc.start(); osc.stop(actx.currentTime + dur);
            } catch(e) {}
        }

        function sndHit(velocity) {
            const now = performance.now();
            if(!actx || velocity < 2.0 || now - lastHitTime < 30) return;
            lastHitTime = now;
            playTone(150 + Math.random()*80, 'triangle', 0.1, Math.min(velocity * 0.012, 0.1));
        }

        function sndEliminate() {
            playTone(250, 'sawtooth', 0.4, 0.2, 50);
            setTimeout(()=>playTone(150, 'square', 0.3, 0.2, 30), 80);
        }

        function sndEvent() { playTone(900, 'sine', 1.5, 0.2, 200); }
        function sndWin() { [440, 554, 659, 880].forEach((f, i) => setTimeout(()=>playTone(f, 'square', 0.4, 0.15), i*100)); }
        function sndChampion() {
            [440, 554, 659, 880, 1108, 1318].forEach((f, i) => setTimeout(()=>playTone(f, 'sine', 0.8, 0.2), i*150));
            setTimeout(()=>playTone(880, 'square', 2.0, 0.3), 900);
        }

        const bgCanvas = document.getElementById('bg-canvas');
        const bgCtx = bgCanvas.getContext('2d');
        let particles = [];
        function initBg() {
            bgCanvas.width = window.innerWidth; bgCanvas.height = window.innerHeight;
            particles = Array.from({length: 60}, () => ({
                x: Math.random() * bgCanvas.width, y: Math.random() * bgCanvas.height,
                s: Math.random() * 2 + 0.5, v: Math.random() * 0.4 + 0.1
            }));
        }
        function drawBg() {
            bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
            bgCtx.fillStyle = 'rgba(0, 229, 255, 0.5)';
            particles.forEach(p => {
                bgCtx.beginPath(); bgCtx.arc(p.x, p.y, p.s, 0, Math.PI*2); bgCtx.fill();
                p.y -= p.v; if(p.y < 0) { p.y = bgCanvas.height; p.x = Math.random() * bgCanvas.width; }
            });
            requestAnimationFrame(drawBg);
        }
        initBg(); drawBg(); window.addEventListener('resize', initBg);

        function loadStorage() {
            try {
                const sv = localStorage.getItem('wc26_balanced');
                if(sv) {
                    const p = JSON.parse(sv);
                    state.teams = p.teams || TEAMS.map(t => ({...t, s: 0}));
                    state.round = p.round || 1;
                } else initData();
            } catch(e) { initData(); }
        }
        function saveStorage() { try { localStorage.setItem('wc26_balanced', JSON.stringify({teams: state.teams, round: state.round})); } catch(e) {} }
        function initData() { state.teams = TEAMS.map(t => ({...t, s: 0})); state.round = 1; saveStorage(); }

        function updateUI() {
            document.getElementById('val-round').innerText = state.round;
            document.getElementById('val-rem').innerText = state.balls.length;
            document.getElementById('lbl-rem-num').innerText = state.balls.length;
            
            const sort = [...state.teams].sort((a,b) => b.s - a.s || a.n.localeCompare(b.n)).slice(0, 5);
            document.getElementById('lb-content').innerHTML = sort.map((t, i) => `
                <div class="lb-row">
                    <div class="lb-rank">${i+1}</div>
                    <img src="https://flagcdn.com/w40/${t.c}.png" class="lb-flag" crossorigin="anonymous">
                    <div class="lb-name">${t.n}</div>
                    <div class="lb-score">${t.s}</div>
                </div>
            `).join('');
        }

        function preload() {
            TEAMS.forEach(t => {
                const img = new Image(); 
                img.crossOrigin = "anonymous";
                const checkLoad = () => {
                    state.loaded++;
                    if(state.loaded === TEAMS.length) { 
                        document.getElementById('loader').style.display = 'none'; 
                        loadStorage(); updateUI(); setupMatter(); 
                    }
                };
                img.onload = () => { state.images[t.c] = img; checkLoad(); };
                img.onerror = () => {
                    const c = document.createElement('canvas'); c.width = 80; c.height = 80;
                    const ctx = c.getContext('2d');
                    ctx.fillStyle = `hsl(${Math.random()*360}, 60%, 40%)`; ctx.fillRect(0,0,80,80);
                    ctx.fillStyle = '#fff'; ctx.font = 'bold 24px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText(t.c.toUpperCase(), 40, 40);
                    state.images[t.c] = c; checkLoad();
                };
                img.src = `https://flagcdn.com/w80/${t.c}.png`;
            });
        }

        const { Engine, Render, Bodies, Body, Composite, Constraint, Events } = Matter;
        let eng, rnd, arena;
        let cx, cy, rad;
        let arenaSegments = [];
        const NUM_SEGMENTS = 80;

        function setupMatter() {
            const canvas = document.getElementById('physics-canvas');
            eng = Engine.create({ positionIterations: 20, velocityIterations: 20 });
            eng.gravity.y = 0.8;
            eng.gravity.x = 0;
            
            rnd = Render.create({
                canvas: canvas, engine: eng,
                options: { width: window.innerWidth, height: window.innerHeight, wireframes: false, background: 'transparent' }
            });

            resizeArena();

            Events.on(rnd, 'beforeRender', () => {
                const ctx = rnd.context;
                ctx.save();
                ctx.translate(cx, cy); ctx.scale(state.zoom, state.zoom); ctx.translate(-cx, -cy);
            });

            Events.on(rnd, 'afterRender', () => {
                const ctx = rnd.context;
                
                const gapHalf = state.currentGap / 2;
                ctx.beginPath();
                ctx.arc(cx, cy, rad, state.arenaRot + gapHalf, state.arenaRot + Math.PI*2 - gapHalf);
                ctx.strokeStyle = '#00e5ff'; ctx.lineWidth = 10;
                ctx.shadowBlur = 20; ctx.shadowColor = '#00e5ff';
                ctx.stroke(); ctx.shadowBlur = 0;

                state.balls.forEach(b => {
                    const img = state.images[b.tData.c];
                    if(img) {
                        ctx.save();
                        ctx.translate(b.position.x, b.position.y);
                        ctx.rotate(b.angle);
                        ctx.beginPath(); ctx.arc(0, 0, b.circleRadius, 0, Math.PI*2); ctx.clip();
                        const r = b.circleRadius;
                        ctx.drawImage(img, -r, -r, r*2, r*2);
                        const grad = ctx.createRadialGradient(-r*0.2, -r*0.2, r*0.1, 0, 0, r);
                        grad.addColorStop(0, 'rgba(255,255,255,0.4)'); grad.addColorStop(1, 'rgba(0,0,0,0.5)');
                        ctx.fillStyle = grad; ctx.fill();
                        ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.stroke();
                        ctx.restore();
                    }
                });
                ctx.restore();
            });

            Events.on(eng, 'collisionStart', (e) => {
                e.pairs.forEach(p => {
                    if(!p.bodyA.isStatic && !p.bodyB.isStatic && p.bodyA.label==='ball' && p.bodyB.label==='ball') {
                        const vA = p.bodyA.velocity; const vB = p.bodyB.velocity;
                        sndHit(Math.hypot(vA.x - vB.x, vA.y - vB.y));
                    }
                });
            });

            // Ogranicznik maksymalnej prędkości (Zabezpieczenie przeciwko wystrzałom)
            Events.on(eng, 'beforeUpdate', () => {
                state.balls.forEach(b => {
                    if (b.speed > MAX_BALL_SPEED) {
                        const scale = MAX_BALL_SPEED / b.speed;
                        Body.setVelocity(b, { x: b.velocity.x * scale, y: b.velocity.y * scale });
                    }
                });
            });

            spawn();
            Render.run(rnd);
            requestAnimationFrame(customPhysicsLoop);
        }

        function resizeArena() {
            cx = window.innerWidth / 2; 
            cy = window.innerHeight * 0.40; 
            rad = Math.min(window.innerWidth, window.innerHeight) * 0.38;
            if(rad > 320) rad = 320;
            if(rad < 160) rad = 160;
            
            if(rnd) { rnd.canvas.width = window.innerWidth; rnd.canvas.height = window.innerHeight; }

            arenaSegments.forEach(s => Composite.remove(eng.world, s.body));
            arenaSegments = [];

            const thick = 40;
            const len = (Math.PI*2*rad)/NUM_SEGMENTS * 1.05;

            for(let i=0; i<NUM_SEGMENTS; i++) {
                const baseAngle = (i/NUM_SEGMENTS) * Math.PI*2;
                const body = Bodies.rectangle(cx + Math.cos(baseAngle)*rad, cy + Math.sin(baseAngle)*rad, len, thick, {
                    isStatic: true, restitution: 0.75, friction: 0.05, label: 'wall', render: { visible: false }
                });
                arenaSegments.push({ body: body, baseAngle: baseAngle });
                Composite.add(eng.world, body);
            }
            
            if(!state.running && state.balls.length <= 1) spawn();
        }

        window.addEventListener('resize', () => { clearTimeout(window.rsz); window.rsz = setTimeout(resizeArena, 200); });

        // GRID SPAWN (Płynny opad na start)
        function spawn() {
            state.balls.forEach(b => Composite.remove(eng.world, b));
            state.balls = [];
            const br = Math.max(10, rad / 14);
            
            const cols = 8;
            const spacingX = br * 2.2;
            const spacingY = br * 2.2;
            const startX = cx - ((cols - 1) * spacingX) / 2;
            const startY = cy - rad + br * 3;

            state.teams.forEach((t, i) => {
                const row = Math.floor(i / cols);
                const col = i % cols;
                // Przesunięcie parzystych rzędów by piłki układały się jak cegły (stabilniej)
                const offset = (row % 2 === 0) ? 0 : spacingX * 0.5;
                const bx = startX + (col * spacingX) + offset;
                const by = startY + (row * spacingY);

                const b = Bodies.circle(bx, by, br, {
                    restitution: 0.75, friction: 0.05, frictionAir: 0.001, density: 0.05, label: 'ball', render: { visible: false }
                });
                b.tData = t; state.balls.push(b); Composite.add(eng.world, b);
            });
            
            state.targetTimeScale = 1; state.timeScale = 1; state.targetZoom = 1; state.zoom = 1; 
            state.m10 = false; state.m5 = false; state.m3 = false; state.m2 = false;
            
            state.timeSinceLastElim = 0;
            state.targetGap = Math.PI * 0.08;
            state.currentGap = Math.PI * 0.08;
            state.targetRotSpeed = 0.015;
            state.rotSpeed = 0.015;
            
            document.getElementById('center-labels').style.opacity = '1';
            updateUI();
        }

        let lastTime = performance.now();

        // KONTROLER TEMPA I ZAAWANSOWANA FIZYKA
        function customPhysicsLoop(time) {
            requestAnimationFrame(customPhysicsLoop);
            let delta = time - lastTime; lastTime = time;
            if(delta > 100) delta = 1000/60;

            state.zoom += (state.targetZoom - state.zoom) * 0.05;
            state.timeScale += (state.targetTimeScale - state.timeScale) * 0.05;
            state.rotSpeed += (state.targetRotSpeed - state.rotSpeed) * 0.02;
            state.currentGap += (state.targetGap - state.currentGap) * 0.05; 

            if(!state.running) return;

            let rem = state.balls.length;
            state.timeSinceLastElim += delta * state.timeScale;

            // DYNAMICZNY POZIOM TRUDNOŚCI
            let baseGap = Math.PI * 0.08; 
            let baseSpeed = 0.015;

            if (rem <= 30) baseGap = Math.PI * 0.12;
            if (rem <= 20) baseGap = Math.PI * 0.16;
            if (rem <= 10) baseGap = Math.PI * 0.22;
            if (rem <= 5)  { baseGap = Math.PI * 0.26; baseSpeed = 0.019; }
            if (rem <= 3)  { baseGap = Math.PI * 0.35; baseSpeed = 0.022; }
            if (rem <= 2)  { baseGap = Math.PI * 0.45; baseSpeed = 0.026; }

            // SYSTEM ANTI-STALL
            let stallGap = 0;
            let stallSpeed = 0;
            if (state.timeSinceLastElim > 20000) {
                const stallTicks = Math.floor((state.timeSinceLastElim - 20000) / 5000);
                stallGap = stallTicks * (Math.PI * 0.03);
                stallSpeed = stallTicks * 0.002;
            }

            state.targetGap = Math.min(baseGap + stallGap, Math.PI * 0.8);
            state.targetRotSpeed = Math.min(baseSpeed + stallSpeed, 0.04);

            Engine.update(eng, delta * state.timeScale);

            state.arenaRot += state.rotSpeed * state.timeScale;
            const omega = (state.rotSpeed * state.timeScale) / (delta / 1000); 

            const limit = state.currentGap / 2;
            arenaSegments.forEach(seg => {
                let norm = seg.baseAngle;
                if (norm > Math.PI*2 - limit || norm < limit) {
                    Body.setPosition(seg.body, {x: -2000, y: -2000});
                } else {
                    const a = seg.baseAngle + state.arenaRot;
                    const px = cx + Math.cos(a)*rad;
                    const py = cy + Math.sin(a)*rad;
                    Body.setPosition(seg.body, {x: px, y: py});
                    Body.setAngle(seg.body, a);
                    
                    Body.setVelocity(seg.body, {
                        x: -Math.sin(a) * rad * omega,
                        y: Math.cos(a) * rad * omega
                    });
                }
            });

            // ZABEZPIECZENIE KINETYCZNE (Mirkro-impulsy) i Eliminacja
            for(let i = state.balls.length-1; i>=0; i--) {
                const b = state.balls[i];
                const distCenter = Math.hypot(b.position.x - cx, b.position.y - cy);
                
                if(b.speed < 1.0) {
                    const nudgeAngle = Math.atan2(cy - b.position.y, cx - b.position.x);
                    const nudgeForce = 0.00004 * b.mass;
                    Body.applyForce(b, b.position, {x: Math.cos(nudgeAngle)*nudgeForce, y: Math.sin(nudgeAngle)*nudgeForce});
                }
                
                if(distCenter > rad + 60) {
                    const t = b.tData;
                    Composite.remove(eng.world, b); state.balls.splice(i, 1);
                    document.body.classList.remove('shake-active'); void document.body.offsetWidth; document.body.classList.add('shake-active');
                    sndEliminate(); showElim(`${t.n.toUpperCase()} ELIMINATED!`);
                    
                    state.timeSinceLastElim = 0;
                    updateUI(); checkMilestones();
                }
            }
        }

        const dText = document.getElementById('dramatic-msg');
        const elimBan = document.getElementById('elim-banner');

        function showText(txt, cls, dur) { dText.innerHTML = txt; dText.className = `dramatic-text show ${cls}`; setTimeout(() => dText.className = 'dramatic-text', dur); }
        function showElim(txt) { elimBan.innerHTML = txt; elimBan.classList.add('show'); setTimeout(() => elimBan.classList.remove('show'), 1500); }

        function checkMilestones() {
            const rem = state.balls.length;
            if(rem === 10 && !state.m10) { state.m10 = true; showText("FINAL 10", "text-accent", 2000); sndEvent(); }
            if(rem === 5 && !state.m5) { state.m5 = true; showText("FINAL 5", "text-danger", 2000); sndEvent(); }
            if(rem === 3 && !state.m3) { state.m3 = true; showText("FINAL 3", "text-danger", 2000); sndEvent(); state.targetTimeScale = 0.6; }
            if(rem === 2 && !state.m2) { state.m2 = true; showText("FINAL DUEL", "text-gold", 3000); sndEvent(); state.targetTimeScale = 0.4; state.targetZoom = 1.35; document.getElementById('center-labels').style.opacity = '0'; }
            if(rem === 1) handleWin();
        }

        function handleWin() {
            state.running = false;
            const w = state.balls[0].tData;
            const idx = state.teams.findIndex(t => t.c === w.c);
            state.teams[idx].s++; saveStorage(); updateUI();

            const isChamp = state.teams[idx].s >= state.target;

            document.getElementById('flash-overlay').style.opacity = '1';
            setTimeout(() => document.getElementById('flash-overlay').style.opacity = '0', 200);

            if(isChamp) {
                sndChampion();
                confetti({ particleCount: 600, spread: 250, origin: { y: 0.5 }, zIndex: 1000, colors: ['#ffd700', '#00e5ff', '#ffffff'] });
                showText(`👑 ${w.n.toUpperCase()} WINS! 👑<br><img src="https://flagcdn.com/w160/${w.c}.png" style="margin-top:30px; border-radius:50%; width:140px; height:140px; object-fit:cover; box-shadow:0 0 60px var(--gold); border: 4px solid var(--gold);">`, 'text-gold', 7000);
                setTimeout(() => { initData(); updateUI(); autoCheck(); }, 8000);
            } else {
                sndWin();
                showText(`🏆 ${w.n.toUpperCase()} +1 POINT!`, 'text-gold', 4000);
                setTimeout(() => { state.round++; saveStorage(); autoCheck(); }, 4500);
            }
        }

        function autoCheck() {
            spawn();
            if(state.auto) { setTimeout(() => startSim(), 1000); } 
            else { document.getElementById('btn-action').innerHTML = "▶ START NEXT ROUND"; }
        }

        function startSim() { 
            initAudio(); 
            if(state.balls.length <= 1) spawn(); 
            state.running = true; 
            document.getElementById('center-labels').style.opacity = '0';
            document.getElementById('btn-action').innerHTML = "⏸ PAUSE GAME"; 
        }
        function pauseSim() { 
            state.running = false; 
            document.getElementById('btn-action').innerHTML = "▶ RESUME GAME"; 
        }

        document.getElementById('btn-action').onclick = () => { state.running ? pauseSim() : startSim(); };
        document.getElementById('btn-reset').onclick = () => { if(confirm("Reset match to Round 1?")) { pauseSim(); initData(); spawn(); document.getElementById('btn-action').innerHTML = "▶ START GAME"; } };
        document.getElementById('sel-target').onchange = (e) => { state.target = parseInt(e.target.value); document.getElementById('ft-pts').innerText = `${state.target} POINTS`; };
        document.getElementById('chk-auto').onchange = (e) => { state.auto = e.target.checked; };

        let rOpen = false;
        document.getElementById('btn-ranking').onclick = () => {
            rOpen = !rOpen;
            document.getElementById('ranking-panel').classList.toggle('hidden', !rOpen);
        };

        preload();
    </script>
</body>
</html>
