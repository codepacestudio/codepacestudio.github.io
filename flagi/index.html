<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>World Cup 2026 Simulator</title><style>
:root{--bg:#050816;--panel:rgba(8,14,34,.88);--cyan:#00e5ff;--blue:#0878ff;--red:#ff334e;--green:#00d084;--gold:#ffd166;--muted:#98a3c7}*{box-sizing:border-box;margin:0;padding:0;font-family:Segoe UI,system-ui,sans-serif;user-select:none;-webkit-tap-highlight-color:transparent}html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:#fff}canvas{position:absolute;inset:0;width:100%;height:100%}#bg{z-index:1}#game{z-index:2}#ui{position:absolute;inset:0;z-index:10;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between}.top{pointer-events:auto;display:flex;align-items:flex-start;justify-content:space-between;padding:14px;gap:10px}.pill{background:var(--panel);border:1px solid rgba(0,229,255,.35);border-radius:20px;box-shadow:0 12px 35px #0008,0 0 25px #00e5ff22;backdrop-filter:blur(16px)}.score{display:flex;gap:28px;padding:10px 28px;text-align:center}.lab{font-size:.65rem;color:var(--muted);font-weight:900;letter-spacing:2px;text-transform:uppercase}.val{font-size:2.15rem;font-weight:1000;color:var(--cyan);text-shadow:0 0 18px #00e5ffaa}.div{width:1px;background:#ffffff24}.btn{height:48px;border-radius:16px;border:1px solid rgba(0,229,255,.35);background:var(--panel);color:#fff;font-weight:1000;letter-spacing:2px;padding:0 18px;cursor:pointer;pointer-events:auto;box-shadow:0 8px 25px #0008}.small{width:48px;padding:0}.live{margin-top:-8px;padding:8px 18px;display:flex;gap:18px;justify-content:center;font-size:.68rem;color:var(--muted);font-weight:900;letter-spacing:2px;text-transform:uppercase}.live b{color:#fff}.live span{color:var(--cyan)}.center{display:flex;flex-direction:column;align-items:center}.side{position:absolute;top:92px;right:16px;width:300px;max-height:60vh;overflow:auto;padding:18px;z-index:40;pointer-events:auto}.side.left{right:auto;left:16px}.hidden{opacity:0;transform:scale(.96);pointer-events:none}.title{text-align:center;color:var(--muted);font-size:.72rem;font-weight:1000;letter-spacing:2px;text-t ansform:uppercase;letter-spacing:3px;opacity:0;transform:scale(.65);transition:.35s;text-shadow:0 16px 45px #000}.msg.show{opacity:1;transform:scale(1)}.gold{color:var(--gold);filter:drop-shadow(0 0 35px #ffd166aa)}.red{color:#fff;filter:drop-shadow(0 0 35px #ff334eaa)}.banner{position:absolute;top:-100px;width:100vw;padding:14px 0;background:linear-gradient(90deg,transparent,#ff334eea,#00e5ff88,transparent);font-weight:1000;letter-spacing:3px;font-size:clamp(1rem,4vw,1.9rem);opacity:0;transition:.22s}.banner.show{top:11vh;opacity:1}#loader{position:absolute;inset:0;z-index:300;background:radial-gradient(circle at 30% 25%,#00e5ff2a,transparent 35%),radial-gradient(circle at 80% 75%,#ff334e25,transparent 35%),#050816;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:15px;color:var(--cyan);font-weight:1000;letter-spacing:3px;text-transform:uppercase}.spin{width:82px;height:82px;border:5px solid #fff2;border-top-color:var(--cyan);border-right-color:var(--red);border-bottom-color:var(--green);border-radius:50%;animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}@keyframes shake{25%{transform:translate(-3px,2px)}50%{transform:translate(3px,-2px)}75%{transform:translate(-2px,-1px)}}.shake{animation:shake .22s}.flash{position:absolute;inset:0;background:#fff;opacity:0;z-index:99;pointer-events:none;transition:.14s}@media(max-width:768px){.top{display:grid;grid-template-columns:56px 1fr 140px}.center{grid-column:1/4;grid-row:2}.score{padding:10px 22px;gap:20px}.side,.side.left{width:92vw;left:4vw;right:4vw;top:138px}.actions{flex-wrap:wrap;justify-content:center}.start{min-width:100%;order:1}.select,.auto,.reset{order:2}.reset{flex:1}.banner.show{top:15vh}}
</style><script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script><script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script></head><body><div id="loader"><div class="spin"></div><div>World Cup 2026 Loading</div></div><canvas id="bg"></canvas><canvas id="game"></canvas><div id="flash" class="flash"></div><div id="notify"><div id="banner" class="banner"></div><div id="msg" class="msg"></div></div><div id="ui"><div class="top"><button id="statsBtn" class="btn small">▥</button><div class="center"><div class="score pill"><div><div class="lab">Round</div><div id="round" class="val">1</div></div><div class="div"></div><div><div class="lab">Remaining</div><div id="rem" class="val">48</div></div></div><div class="live pill"><div>Match time: <b id="timer">00:00</b></div><div>Leader: <span id="leader">NONE</span></div></div></div><button id="rankBtn" class="btn">☷ Ranking</button></div><div id="ranking" class="side pill hidden"><div class="title">World Cup Leaders</div><div id="rankList"></div></div><div id="stats" class="side left pill hidden"><div class="title">Global Statistics</div><div id="statList"></div><div class="title" style="margin-top:14px">Elimination Feed</div><div id="feed"></div></div><div class="bottom"><div id="hero" class="hero"><div class="remain"><span id="rem2">48</span> flags remain</div><div class="who">Who will win?</div></div><div class="controls pill"><div class="actions"><div class="select"><span>First to</span><select id="target"><option>3</option><option selected>5</option><option>7</option><option>10</option></select></div><label class="auto"><input id="auto" type="checkbox">Auto live</label><button id="start" class="start">▶ Start Match</button><button id="reset" class="btn reset">↻ Reset</button></div></div></div></div><script>
const TEAMS=[['Mexico','mx'],['South Africa','za'],['South Korea','kr'],['Czechia','cz'],['Canada','ca'],['Bosnia','ba'],['Qatar','qa'],['Switzerland','ch'],['Brazil','br'],['Morocco','ma'],['Haiti','ht'],['Scotland','gb-sct'],['USA','us'],['Paraguay','py'],['Australia','au'],['Türkiye','tr'],['Germany','de'],['Curacao','cw'],['Ivory Coast','ci'],['Ecuador','ec'],['Netherlands','nl'],['Japan','jp'],['Sweden','se'],['Tunisia','tn'],['Belgium','be'],['Egypt','eg'],['Iran','ir'],['New Zealand','nz'],['Spain','es'],['Cape Verde','cv'],['Saudi Arabia','sa'],['Uruguay','uy'],['France','fr'],['Senegal','sn'],['Iraq','iq'],['Norway','no'],['Argentina','ar'],['Algeria','dz'],['Austria','at'],['Jordan','jo'],['Portugal','pt'],['DR Congo','cd'],['Uzbekistan','uz'],['Colombia','co'],['England','gb-eng'],['Croatia','hr'],['Ghana','gh'],['Panama','pa']].map(x=>({n:x[0],c:x[1],s:0}));
let S={teams:JSON.parse(JSON.stringify(TEAMS)),imgs:{},round:1,target:5,auto:false,running:false,balls:[],rot:0,speed:.013,time:0,feed:[],m:{}};let Stats={cups:0,rounds:0,fast:999999,slow:0,wins:{}};const $=id=>document.getElementById(id),GAP=Math.PI*.13,MAX=15.5,SEG=80;let Engine=Matter.Engine,Render=Matter.Render,Bodies=Matter.Bodies,Body=Matter.Body,Composite=Matter.Composite,Events=Matter.Events,eng,rend,cx,cy,rad,segs=[],last=performance.now(),lastUi=0;
function save(){localStorage.wc26_game=JSON.stringify({teams:S.teams,round:S.round,target:S.target,auto:S.auto});localStorage.wc26_stats=JSON.stringify(Stats)}function load(){try{let g=JSON.parse(localStorage.wc26_game||'{}');if(g.teams&&g.teams.length==48)S.teams=g.teams;S.round=g.round||1;S.target=g.target||5;S.auto=!!g.auto;let st=JSON.parse(localStorage.wc26_stats||'{}');Stats={cups:st.cups||0,rounds:st.rounds||0,fast:st.fast||999999,slow:st.slow||0,wins:st.wins||{}}}catch(e){}$('target').value=S.target;$('auto').checked=S.auto}
function time(ms){let t=Math.floor(ms/1000),m=String(Math.floor(t/60)).padStart(2,'0'),s=String(t%60).padStart(2,'0');return m+':'+s}function ui(){let sort=[...S.teams].sort((a,b)=>b.s-a.s||a.n.localeCompare(b.n));$('round').textContent=S.round;$('rem').textContent=S.balls.length;$('rem2').textContent=S.balls.length;$('timer').textContent=time(S.time);$('leader').textContent=sort[0].s?sort[0].n.toUpperCase():'NONE';$('rankList').innerHTML=sort.slice(0,12).map((t,i)=>`<div class="row"><b style="color:var(--cyan);width:22px">${i+1}</b><img class="flag" src="https://flagcdn.com/w40/${t.c}.png"><div class="name">${t.n}</div><div class="pts">${t.s}</div></div>`).join('');$('statList').innerHTML=`<div class="row"><div class="name">Completed Cups</div><div class="pts">${Stats.cups}</div></div><div class="row"><div class="name">Total Rounds</div><div class="pts">${Stats.rounds}</div></div><div class="row"><div class="name">Fastest Round</div><div class="pts">${Stats.fast==999999?'--':time(Stats.fast)}</div></div><div class="row"><div class="name">Longest Round</div><div class="pts">${Stats.slow?time(Stats.slow):'--'}</div></div>`;$('feed').innerHTML=S.feed.slice(0,10).map(x=>`<div class="row"><b style="color:var(--red);width:32px">#${x.p}</b><div class="name">${x.n}</div></div>`).join('')||'<div style="text-align:center;color:var(--muted);font-weight:800">No eliminations yet</div>'}
function bg(){let c=$('bg'),x=c.getContext('2d'),P=[];function init(){c.width=innerWidth;c.height=innerHeight;P=Array.from({length:90},()=>({x:Math.random()*c.width,y:Math.random()*c.height,s:Math.random()*1.8+.5,v:Math.random()*.35+.12}))}function loop(){let g=x.createRadialGradient(c.width/2,c.height*.42,0,c.width/2,c.height*.42,Math.max(c.width,c.height));g.addColorStop(0,'#0b1738');g.addColorStop(.5,'#071022');g.addColorStop(1,'#040712');x.fillStyle=g;x.fillRect(0,0,c.width,c.height);P.forEach((p,i)=>{x.fillStyle=i%9?'#00e5ffbb':i%2?'#00d08499':'#ff334e99';x.beginPath();x.arc(p.x,p.y,p.s,0,7);x.fill();p.y-=p.v;if(p.y<0){p.y=c.height;p.x=Math.random()*c.width}});requestAnimationFrame(loop)}init();addEventListener('resize',init);loop()}bg();
function fallback(code){let c=document.createElement('canvas'),x=c.getContext('2d');c.width=c.height=80;x.fillStyle='#0878ff';x.fillRect(0,0,80,80);x.fillStyle='#fff';x.font='900 20px sans-serif';x.textAlign='center';x.textBaseline='middle';x.fillText(code.toUpperCase().slice(0,4),40,40);return c}
function preload(){load();let n=0;TEAMS.forEach(t=>{let im=new Image;im.crossOrigin='anonymous';im.onload=im.onerror=()=>{S.imgs[t.c]=im.complete&&im.naturalWidth?im:fallback(t.c);if(++n==48)init()};im.src=`https://flagcdn.com/w80/${t.c}.png`});setTimeout(()=>{TEAMS.forEach(t=>S.imgs[t.c]||(S.imgs[t.c]=fallback(t.c)));init()},5200)}
function init(){if(eng)return;$('loader').style.display='none';eng=Engine.create({positionIterations:16,velocityIterations:16});eng.gravity.y=.26;rend=Render.create({canvas:$('game'),engine:eng,options:{width:innerWidth,height:innerHeight,wireframes:false,background:'transparent',pixelRatio:devicePixelRatio||1}});Events.on(rend,'afterRender',draw);Events.on(eng,'beforeUpdate',()=>S.balls.forEach(b=>{if(b.speed>MAX){let s=MAX/b.speed;Body.setVelocity(b,{x:b.velocity.x*s,y:b.velocity.y*s})}}));resize();Render.run(rend);spawn();requestAnimationFrame(loop)}
function resize(){if(!eng)return;rend.canvas.width=innerWidth;rend.canvas.height=innerHeight;rend.options.width=innerWidth;rend.options.height=innerHeight;let mob=innerWidth<769,top=mob?190:138,bot=mob?270:245;cx=innerWidth/2;rad=Math.max(135,Math.min((innerWidth-52)/2,(innerHeight-top-bot)/2,mob?330:395));cy=top+Math.max(240,innerHeight-top-bot)/2;segs.forEach(s=>Composite.remove(eng.world,s.b));segs=[];let thick=140,or=rad+72,len=2*Math.PI*or/SEG*1.08;for(let i=0;i<SEG;i++){let a=i/SEG*Math.PI*2,b=Bodies.rectangle(cx+Math.cos(a)*or,cy+Math.sin(a)*or,len,thick,{isStatic:true,restitution:.86,friction:.002,label:'wall',render:{visible:false}});segs.push({b,base:a});Composite.add(eng.world,b)}if(!S.running&&S.balls.length)spawn()}addEventListener('resize',()=>setTimeout(resize,120));
function spawn(){S.balls.forEach(b=>Composite.remove(eng.world,b));S.balls=[];S.time=0;S.feed=[];S.m={};S.speed=.013;$('hero').style.opacity=1;let r=Math.max(10.5,Math.min(21,rad/14.2)),rings=[[1,0],[7,r*2.35],[14,r*4.75],[26,r*7.05]],idx=0;rings.forEach((R,k)=>{for(let i=0;i<R[0]&&idx<48;i++,idx++){let a=i/R[0]*Math.PI*2+(Math.random()-.5)*.2+k*.07,b=Bodies.circle(cx+Math.cos(a)*R[1]+(Math.random()-.5)*r*.7,cy-12+Math.sin(a)*R[1]+(Math.random()-.5)*r*.7,r,{restitution:.88,friction:.001,frictionAir:.0012,density:.045,label:'ball',render:{visible:false}});b.tData=S.teams[idx];Body.setVelocity(b,{x:(Math.random()-.5)*5.2,y:(Math.random()-.5)*5.2});S.balls.push(b);Composite.add(eng.world,b)}});ui()}
function draw(){let x=rend.context,gh=GAP/2,st=S.rot+gh,en=S.rot+Math.PI*2-gh;x.save();x.lineCap='round';let gr=x.createLinearGradient(cx-rad,cy,cx+rad,cy);gr.addColorStop(0,'#00e5ff');gr.addColorStop(.32,'#0878ff');gr.addColorStop(.58,'#ff334e');gr.addColorStop(.82,'#00d084');gr.addColorStop(1,'#ffd166');x.beginPath();x.arc(cx,cy,rad+1,st,en);x.strokeStyle='#00e5ff28';x.lineWidth=24;x.shadowBlur=42;x.shadowColor='#00e5ff';x.stroke();x.beginPath();x.arc(cx,cy,rad,st,en);x.strokeStyle=gr;x.lineWidth=8;x.shadowBlur=18;x.stroke();x.shadowBlur=0;S.balls.forEach(b=>{let im=S.imgs[b.tData.c],r=b.circleRadius;x.save();x.translate(b.position.x,b.position.y);x.rotate(b.angle);x.beginPath();x.arc(0,0,r,0,7);x.clip();x.drawImage(im,-r,-r,r*2,r*2);let sh=x.createRadialGradient(-r*.35,-r*.4,r*.1,0,0,r);sh.addColorStop(0,'#ffffff88');sh.addColorStop(1,'#0009');x.fillStyle=sh;x.fillRect(-r,-r,r*2,r*2);x.restore();x.beginPath();x.arc(b.position.x,b.position.y,r,0,7);x.strokeStyle='#ffffff88';x.lineWidth=1.5;x.stroke()});x.restore()}
function loop(t){requestAnimationFrame(loop);let d=t-last;last=t;if(!d||d>80)d=16.66;if(!S.running){Engine.update(eng,16.66);return}S.time+=d;if(S.time-lastUi>250){$('timer').textContent=time(S.time);lastUi=S.time}S.rot+=S.speed*d/16.66;let gh=GAP/2,hide=gh+2*Math.PI/SEG*.65,or=rad+70;segs.forEach(s=>{let rel=s.base>Math.PI?s.base-2*Math.PI:s.base;if(Math.abs(rel)<hide)Body.setPosition(s.b,{x:-3000,y:-3000});else{let a=s.base+S.rot;Body.setPosition(s.b,{x:cx+Math.cos(a)*or,y:cy+Math.sin(a)*or});Body.setAngle(s.b,a)}});Engine.update(eng,d);validate()}
function validate(){let lim=GAP/2+.08;for(let i=S.balls.length-1;i>=0;i--){let b=S.balls[i],dx=b.position.x-cx,dy=b.position.y-cy,dist=Math.hypot(dx,dy);if(dist<.001)continue;if(b.speed<.75)Body.applyForce(b,b.position,{x:-(dx/dist)*.000012*b.mass,y:-(dy/dist)*.000012*b.mass});let max=rad-b.circleRadius+2;if(dist>max){let a=Math.atan2(dy,dx)-S.rot;a=Math.atan2(Math.sin(a),Math.cos(a));if(Math.abs(a)>lim){Body.setPosition(b,{x:cx+dx/dist*max,y:cy+dy/dist*max});let nx=-dx/dist,ny=-dy/dist,dot=b.velocity.x*nx+b.velocity.y*ny;if(dot<0)Body.setVelocity(b,{x:b.velocity.x-1.86*dot*nx,y:b.velocity.y-1.86*dot*ny})}else if(dist>rad+58)elim(i)}}}
function text(v,cl='gold',dur=2200){$('msg').innerHTML=v;$('msg').className='msg show '+cl;clearTimeout(text.t);text.t=setTimeout(()=>$('msg').className='msg',dur)}function ban(v){$('banner').textContent=v;$('banner').classList.add('show');clearTimeout(ban.t);ban.t=setTimeout(()=>$('banner').classList.remove('show'),1250)}function elim(i){let b=S.balls[i],t=b.tData,p=S.balls.length;Composite.remove(eng.world,b);S.balls.splice(i,1);S.feed.unshift({p,n:t.n});document.body.classList.remove('shake');void document.body.offsetWidth;document.body.classList.add('shake');ban(t.n.toUpperCase()+' ELIMINATED!');ui();mile()}
function mile(){let r=S.balls.length;if(r==10&&!S.m[10]){S.m[10]=1;text('Final 10','red')}if(r==5&&!S.m[5]){S.m[5]=1;text('Final 5','red')}if(r==3&&!S.m[3]){S.m[3]=1;text('Final 3','red')}if(r==2&&!S.m[2]){S.m[2]=1;S.speed=.019;$('hero').style.opacity=0;text('Final Duel','gold',2500)}if(r==1)win()}
function win(){if(!S.running)return;S.running=false;$('start').classList.remove('run');let w=S.balls[0].tData,idx=S.teams.findIndex(t=>t.c==w.c);S.teams[idx].s++;Stats.rounds++;Stats.fast=Math.min(Stats.fast,S.time);Stats.slow=Math.max(Stats.slow,S.time);$('flash').style.opacity=1;setTimeout(()=>$('flash').style.opacity=0,180);let champ=S.teams[idx].s>=S.target;save();ui();if(champ){Stats.cups++;Stats.wins[w.n]=(Stats.wins[w.n]||0)+1;save();if(typeof confetti=='function')confetti({particleCount:650,spread:280,origin:{y:.48},zIndex:1000,colors:['#00e5ff','#0878ff','#ff334e','#00d084','#ffd166','#fff']});text(`👑 ${w.n.toUpperCase()}<br>WORLD CHAMPIONS!`,'gold',7200);setTimeout(()=>{S.teams=JSON.parse(JSON.stringify(TEAMS));S.round=1;save();spawn();auto()},7800)}else{text((S.teams[idx].s==S.target-1?'🔥 Match Point<br>':'🏆 ')+w.n.toUpperCase()+' +1 POINT<br>'+S.teams[idx].s+'/'+S.target,'gold',3900);setTimeout(()=>{S.round++;save();spawn();auto()},4300)}}
function auto(){if(S.auto)setTimeout(start,900);else $('start').textContent='▶ Start Next Round'}function start(){if(S.balls.length<=1)spawn();S.running=true;$('hero').style.opacity=0;$('start').textContent='⏸ Pause Game';$('start').classList.add('run')}function pause(){S.running=false;$('start').textContent='▶ Resume Game';$('start').classList.remove('run')}
$('start').onclick=()=>S.running?pause():start();$('reset').onclick=()=>{if(confirm('Reset championship to Round 1?')){pause();S.teams=JSON.parse(JSON.stringify(TEAMS));S.round=1;S.time=0;save();spawn();$('start').textContent='▶ Start Match'}};$('target').onchange=e=>{S.target=parseInt(e.target.value)||5;save();ui()};$('auto').onchange=e=>{S.auto=e.target.checked;save()};$('rankBtn').onclick=()=>{$('stats').classList.add('hidden');$('ranking').classList.toggle('hidden');ui()};$('statsBtn').onclick=()=>{$('ranking').classList.add('hidden');$('stats').classList.toggle('hidden');ui()};preload();
</script></body></html>
