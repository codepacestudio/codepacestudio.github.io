<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>World Cup 2026 Survivor Ball Simulator</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --text: #f8fafc;
            --accent: #3b82f6;
            --danger: #ef4444;
            --success: #22c55e;
            --gold: #fbbf24;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden;
            flex-direction: row;
        }

        #game-container {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }

        canvas {
            display: block;
        }

        #ui-panel {
            width: 350px;
            background-color: var(--panel);
            border-left: 2px solid #334155;
            display: flex;
            flex-direction: column;
            padding: 20px;
            z-index: 10;
        }

        h1 {
            font-size: 1.2rem;
            text-align: center;
            margin-bottom: 20px;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-box {
            background-color: #334155;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent);
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            background-color: #475569;
            color: white;
            text-transform: uppercase;
        }

        button:hover { background-color: #64748b; }
        button.primary { background-color: var(--accent); }
        button.primary:hover { background-color: #2563eb; }
        button.danger { background-color: var(--danger); }
        button.danger:hover { background-color: #dc2626; }

        .settings-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #334155;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        select {
            background: #1e293b;
            color: white;
            border: 1px solid #475569;
            padding: 5px;
            border-radius: 4px;
        }

        .leaderboard-container {
            flex: 1;
            overflow-y: auto;
            background-color: #0f172a;
            border-radius: 8px;
            padding: 10px;
        }

        .leaderboard-title {
            font-size: 1rem;
            margin-bottom: 10px;
            text-align: center;
            color: #cbd5e1;
            position: sticky;
            top: 0;
            background: #0f172a;
            padding-bottom: 5px;
            border-bottom: 1px solid #334155;
        }

        .team-row {
            display: flex;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid #1e293b;
            font-size: 0.9rem;
        }

        .team-rank { width: 30px; font-weight: bold; color: #94a3b8; }
        .team-flag { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; margin-right: 10px; border: 1px solid #475569;}
        .team-name { flex: 1; font-weight: 500; }
        .team-score { font-weight: bold; color: var(--gold); }

        /* Overlays and Notifications */
        #notification-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 50;
        }

        .message {
            font-size: 4vw;
            font-weight: 900;
            text-transform: uppercase;
            text-align: center;
            text-shadow: 0 0 20px rgba(0,0,0,0.8), 0 0 40px rgba(0,0,0,0.8);
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 20px;
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
        }

        .message.show {
            opacity: 1;
            transform: scale(1);
        }

        .msg-eliminated { color: var(--danger); text-shadow: 0 0 15px var(--danger); }
        .msg-win { color: var(--gold); text-shadow: 0 0 20px var(--gold); font-size: 5vw; }
        .msg-champion { color: #fff; text-shadow: 0 0 30px var(--gold), 0 0 60px var(--gold); font-size: 6vw; }
        .msg-point { color: var(--success); font-size: 3vw; margin-top: 10px; }

        #flash-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
            transition: opacity 0.5s;
        }

        #loading-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            z-index: 200;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 2rem;
        }

        .spinner {
            border: 6px solid #334155;
            border-top: 6px solid var(--accent);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 800px) {
            body { flex-direction: column; }
            #ui-panel { width: 100%; height: 40vh; border-left: none; border-top: 2px solid #334155; padding: 10px; }
            #game-container { height: 60vh; flex: none; }
            .stats-grid { margin-bottom: 10px; }
            .message { font-size: 8vw; }
            .msg-win { font-size: 10vw; }
            .msg-champion { font-size: 12vw; }
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <div id="loading-text">Loading Teams...</div>
    </div>

    <div id="game-container">
        <div id="notification-layer">
            <div id="msg-box" class="message"></div>
        </div>
        <div id="flash-overlay"></div>
    </div>

    <div id="ui-panel">
        <h1>World Cup 2026</h1>
        
        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-label">ROUND</div>
                <div class="stat-value" id="round-counter">1</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">BALLS LEFT</div>
                <div class="stat-value" id="balls-counter">48</div>
            </div>
        </div>

        <div class="controls">
            <div class="btn-group">
                <button id="btn-start" class="primary">Start</button>
                <button id="btn-pause">Pause</button>
            </div>
            <button id="btn-reset" class="danger">Reset Match</button>
        </div>

        <div class="controls">
            <div class="settings-row">
                <label>Target Score:</label>
                <select id="target-score">
                    <option value="3">3 Points</option>
                    <option value="5">5 Points</option>
                </select>
            </div>
            <div class="settings-row">
                <label>Auto Mode (Live):</label>
                <input type="checkbox" id="auto-mode" style="width: 20px; height: 20px;">
            </div>
        </div>

        <div class="leaderboard-container">
            <div class="leaderboard-title">LIVE RANKING</div>
            <div id="leaderboard-list"></div>
        </div>
    </div>

    <script>
        // Data & State
        const ALL_TEAMS = [
            { name: "USA", code: "us" }, { name: "Mexico", code: "mx" }, { name: "Canada", code: "ca" },
            { name: "Brazil", code: "br" }, { name: "Argentina", code: "ar" }, { name: "France", code: "fr" },
            { name: "Germany", code: "de" }, { name: "Italy", code: "it" }, { name: "Spain", code: "es" },
            { name: "England", code: "gb-eng" }, { name: "Portugal", code: "pt" }, { name: "Netherlands", code: "nl" },
            { name: "Belgium", code: "be" }, { name: "Croatia", code: "hr" }, { name: "Uruguay", code: "uy" },
            { name: "Colombia", code: "co" }, { name: "Japan", code: "jp" }, { name: "South Korea", code: "kr" },
            { name: "Morocco", code: "ma" }, { name: "Senegal", code: "sn" }, { name: "Switzerland", code: "ch" },
            { name: "Denmark", code: "dk" }, { name: "Poland", code: "pl" }, { name: "Sweden", code: "se" },
            { name: "Serbia", code: "rs" }, { name: "Australia", code: "au" }, { name: "Ecuador", code: "ec" },
            { name: "Peru", code: "pe" }, { name: "Chile", code: "cl" }, { name: "Nigeria", code: "ng" },
            { name: "Egypt", code: "eg" }, { name: "Algeria", code: "dz" }, { name: "Cameroon", code: "cm" },
            { name: "Ivory Coast", code: "ci" }, { name: "Mali", code: "ml" }, { name: "Tunisia", code: "tn" },
            { name: "Ghana", code: "gh" }, { name: "Costa Rica", code: "cr" }, { name: "Panama", code: "pa" },
            { name: "Jamaica", code: "jm" }, { name: "Honduras", code: "hn" }, { name: "New Zealand", code: "nz" },
            { name: "Qatar", code: "qa" }, { name: "Turkey", code: "tr" }, { name: "Ukraine", code: "ua" },
            { name: "Saudi Arabia", code: "sa" }, { name: "Iran", code: "ir" }, { name: "Venezuela", code: "ve" }
        ];

        let teamsData = [];
        let flagImages = {};
        let loadedImages = 0;
        
        let gameState = {
            round: 1,
            isRunning: false,
            targetScore: 3,
            autoMode: false,
            activeBalls: [],
            arenaRotation: 0,
            rotationSpeed: 0.005,
            rotationChangeTimer: 0
        };

        // DOM Elements
        const elBallsCounter = document.getElementById('balls-counter');
        const elRoundCounter = document.getElementById('round-counter');
        const elLeaderboard = document.getElementById('leaderboard-list');
        const elMsgBox = document.getElementById('msg-box');
        const elFlash = document.getElementById('flash-overlay');
        const btnStart = document.getElementById('btn-start');
        const btnPause = document.getElementById('btn-pause');
        const btnReset = document.getElementById('btn-reset');
        const selTargetScore = document.getElementById('target-score');
        const chkAutoMode = document.getElementById('auto-mode');

        // Audio System
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playTone(freq, type, duration, vol) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playEliminateSound() {
            playTone(150, 'sawtooth', 0.4, 0.1);
            setTimeout(() => playTone(100, 'square', 0.4, 0.1), 100);
        }

        function playWinSound() {
            playTone(440, 'sine', 0.5, 0.2);
            playTone(554, 'sine', 0.5, 0.2);
            playTone(659, 'sine', 0.5, 0.2);
        }

        function playChampionFanfare() {
            const notes = [440, 554, 659, 880];
            notes.forEach((freq, i) => {
                setTimeout(() => {
                    playTone(freq, 'square', 0.6, 0.2);
                }, i * 150);
            });
            setTimeout(() => {
                playTone(880, 'square', 1.5, 0.2);
                playTone(1108, 'sine', 1.5, 0.2);
            }, notes.length * 150);
        }

        // LocalStorage
        function loadSave() {
            const saved = localStorage.getItem('wc2026_save');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    teamsData = data.teams;
                    gameState.round = data.round;
                } catch(e) { initTeams(); }
            } else {
                initTeams();
            }
        }

        function saveGame() {
            localStorage.setItem('wc2026_save', JSON.stringify({
                teams: teamsData,
                round: gameState.round
            }));
        }

        function initTeams() {
            teamsData = ALL_TEAMS.map(t => ({ ...t, score: 0 }));
            gameState.round = 1;
            saveGame();
        }

        function updateUI() {
            elRoundCounter.textContent = gameState.round;
            elBallsCounter.textContent = gameState.activeBalls.length;
            
            const sortedTeams = [...teamsData].sort((a, b) => b.score - a.score || a.name.localeCompare(b.name));
            elLeaderboard.innerHTML = '';
            
            sortedTeams.forEach((team, idx) => {
                const row = document.createElement('div');
                row.className = 'team-row';
                row.innerHTML = `
                    <div class="team-rank">${idx + 1}</div>
                    <img src="https://flagcdn.com/w40/${team.code}.png" class="team-flag" crossorigin="anonymous">
                    <div class="team-name">${team.name}</div>
                    <div class="team-score">${team.score}</div>
                `;
                elLeaderboard.appendChild(row);
            });
        }

        // Preload Images
        function preloadAssets() {
            ALL_TEAMS.forEach(team => {
                const img = new Image();
                img.crossOrigin = "anonymous";
                img.onload = () => {
                    flagImages[team.code] = img;
                    loadedImages++;
                    if(loadedImages === ALL_TEAMS.length) {
                        document.getElementById('loading-screen').style.display = 'none';
                        loadSave();
                        updateUI();
                        setupPhysics();
                    }
                };
                img.src = `https://flagcdn.com/w80/${team.code}.png`;
            });
        }

        // Physics Setup (Matter.js)
        const Engine = Matter.Engine,
              Render = Matter.Render,
              Runner = Matter.Runner,
              Bodies = Matter.Bodies,
              Body = Matter.Body,
              Composite = Matter.Composite,
              Events = Matter.Events;

        let engine, render, runner, world, arenaBody;
        let centerX, centerY, arenaRadius;

        function setupPhysics() {
            const container = document.getElementById('game-container');
            const width = container.clientWidth;
            const height = container.clientHeight;
            centerX = width / 2;
            centerY = height / 2;
            arenaRadius = Math.min(width, height) * 0.45;

            engine = Engine.create();
            world = engine.world;
            engine.gravity.y = 0;
            engine.gravity.x = 0;

            render = Render.create({
                element: container,
                engine: engine,
                options: {
                    width: width,
                    height: height,
                    wireframes: false,
                    background: 'transparent'
                }
            });

            createArena();
            Render.run(render);
            runner = Runner.create();
            
            // Custom Render for Circular Flags
            Events.on(render, 'afterRender', function() {
                const ctx = render.context;
                gameState.activeBalls.forEach(ball => {
                    const team = ball.teamData;
                    const img = flagImages[team.code];
                    if (img) {
                        ctx.save();
                        ctx.translate(ball.position.x, ball.position.y);
                        ctx.rotate(ball.angle);
                        
                        ctx.beginPath();
                        ctx.arc(0, 0, ball.circleRadius, 0, 2 * Math.PI);
                        ctx.clip();
                        
                        const r = ball.circleRadius;
                        ctx.drawImage(img, -r, -r, r * 2, r * 2);
                        
                        // Inner shadow/border for depth
                        ctx.strokeStyle = 'rgba(0,0,0,0.5)';
                        ctx.lineWidth = 2;
                        ctx.stroke();
                        
                        ctx.restore();
                    }
                });
            });

            Events.on(engine, 'beforeUpdate', physicsLoop);
            spawnBalls();
        }

        function createArena() {
            if (arenaBody) Composite.remove(world, arenaBody);
            
            const parts = [];
            const segments = 60;
            const thickness = 20;
            
            // Gap size = 4 segments
            for (let i = 0; i < segments; i++) {
                if (i < 4) continue; 
                const angle = (i / segments) * Math.PI * 2;
                const x = centerX + Math.cos(angle) * arenaRadius;
                const y = centerY + Math.sin(angle) * arenaRadius;
                const length = (Math.PI * 2 * arenaRadius) / segments * 1.1;
                
                const part = Bodies.rectangle(x, y, length, thickness, {
                    angle: angle,
                    isStatic: true,
                    render: { fillStyle: '#334155', strokeStyle: '#1e293b', lineWidth: 2 }
                });
                parts.push(part);
            }

            // Central peg
            const peg = Bodies.circle(centerX, centerY, 30, {
                isStatic: true,
                render: { fillStyle: '#475569' }
            });
            parts.push(peg);

            arenaBody = Body.create({ parts: parts, isStatic: true });
            Body.setPosition(arenaBody, { x: centerX, y: centerY });
            Composite.add(world, arenaBody);
        }

        function spawnBalls() {
            gameState.activeBalls.forEach(b => Composite.remove(world, b));
            gameState.activeBalls = [];

            const ballRadius = Math.max(8, arenaRadius / 25);
            
            teamsData.forEach((team, i) => {
                const angle = (i / teamsData.length) * Math.PI * 2;
                const dist = Math.random() * (arenaRadius * 0.7) + 50;
                const x = centerX + Math.cos(angle) * dist;
                const y = centerY + Math.sin(angle) * dist;

                const ball = Bodies.circle(x, y, ballRadius, {
                    restitution: 0.9,
                    friction: 0.05,
                    frictionAir: 0.01,
                    density: 0.05,
                    render: { visible: false } // Custom render logic takes over
                });
                
                ball.teamData = team;
                gameState.activeBalls.push(ball);
                Composite.add(world, ball);
            });
            updateUI();
        }

        function showMessage(html, className, duration) {
            elMsgBox.innerHTML = html;
            elMsgBox.className = `message show ${className}`;
            setTimeout(() => {
                elMsgBox.className = 'message';
            }, duration);
        }

        function physicsLoop() {
            if (!gameState.isRunning) return;

            // Rotate Arena
            gameState.arenaRotation += gameState.rotationSpeed;
            Body.setAngle(arenaBody, gameState.arenaRotation);
            Body.setPosition(arenaBody, { x: centerX, y: centerY }); // Ensure it stays centered

            // Change rotation randomly
            gameState.rotationChangeTimer++;
            if (gameState.rotationChangeTimer > 300) {
                gameState.rotationChangeTimer = 0;
                gameState.rotationSpeed = (Math.random() - 0.5) * 0.015;
                if(Math.abs(gameState.rotationSpeed) < 0.003) gameState.rotationSpeed = 0.005;
            }

            // Chaos logic and Elimination check
            for (let i = gameState.activeBalls.length - 1; i >= 0; i--) {
                const ball = gameState.activeBalls[i];
                
                // Keep balls moving randomly so they don't group up forever
                if (Math.random() < 0.02) {
                    const force = { x: (Math.random() - 0.5) * 0.001, y: (Math.random() - 0.5) * 0.001 };
                    Body.applyForce(ball, ball.position, force);
                }

                // Check distance
                const dist = Math.hypot(ball.position.x - centerX, ball.position.y - centerY);
                if (dist > arenaRadius + 20) {
                    // ELIMINATED
                    const team = ball.teamData;
                    Composite.remove(world, ball);
                    gameState.activeBalls.splice(i, 1);
                    
                    playEliminateSound();
                    showMessage(`${team.name} ELIMINATED!`, 'msg-eliminated', 1200);
                    updateUI();

                    if (gameState.activeBalls.length === 1) {
                        handleRoundWin();
                    }
                }
            }
        }

        function handleRoundWin() {
            gameState.isRunning = false;
            Runner.stop(runner);
            
            const winnerObj = gameState.activeBalls[0];
            const winner = winnerObj.teamData;
            
            // Add point
            const teamIndex = teamsData.findIndex(t => t.code === winner.code);
            teamsData[teamIndex].score += 1;
            saveGame();
            updateUI();

            playWinSound();

            if (teamsData[teamIndex].score >= gameState.targetScore) {
                // MATCH WIN
                playChampionFanfare();
                confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 }, zIndex: 1000 });
                
                elFlash.style.opacity = '1';
                setTimeout(() => elFlash.style.opacity = '0', 200);

                showMessage(`
                    👑 ${winner.name.toUpperCase()} IS THE CHAMPION! <br>
                    <img src="https://flagcdn.com/w160/${winner.code}.png" style="margin-top:20px; border-radius:10px; box-shadow:0 0 30px #fbbf24;">
                `, 'msg-champion', 5000);

                setTimeout(() => {
                    initTeams();
                    updateUI();
                    if (gameState.autoMode) startRound();
                }, 6000);

            } else {
                // ROUND WIN
                showMessage(`
                    🏆 ${winner.name.toUpperCase()} WINS THE ROUND!<br>
                    <div class="msg-point">${winner.name.toUpperCase()} +1 POINT</div>
                `, 'msg-win', 3000);

                setTimeout(() => {
                    gameState.round++;
                    saveGame();
                    if (gameState.autoMode) {
                        startRound();
                    } else {
                        spawnBalls();
                        updateUI();
                        btnStart.textContent = "Start Next Round";
                    }
                }, 3500);
            }
        }

        function startRound() {
            initAudio();
            if (gameState.activeBalls.length <= 1) {
                spawnBalls();
            }
            gameState.isRunning = true;
            Runner.run(runner, engine);
            btnStart.textContent = "Running...";
        }

        function resizeCanvas() {
            if(!engine) return;
            const container = document.getElementById('game-container');
            const width = container.clientWidth;
            const height = container.clientHeight;
            
            render.canvas.width = width;
            render.canvas.height = height;
            render.options.width = width;
            render.options.height = height;
            
            centerX = width / 2;
            centerY = height / 2;
            arenaRadius = Math.min(width, height) * 0.45;
            createArena();
            if(!gameState.isRunning) spawnBalls();
        }

        window.addEventListener('resize', () => {
            clearTimeout(window.resizeTimer);
            window.resizeTimer = setTimeout(resizeCanvas, 200);
        });

        // Events
        btnStart.addEventListener('click', () => {
            initAudio();
            if (!gameState.isRunning) startRound();
        });

        btnPause.addEventListener('click', () => {
            gameState.isRunning = false;
            Runner.stop(runner);
            btnStart.textContent = "Resume";
        });

        btnReset.addEventListener('click', () => {
            if(confirm("Reset all scores and start over?")) {
                gameState.isRunning = false;
                Runner.stop(runner);
                initTeams();
                spawnBalls();
                updateUI();
                btnStart.textContent = "Start";
            }
        });

        selTargetScore.addEventListener('change', (e) => {
            gameState.targetScore = parseInt(e.target.value);
        });

        chkAutoMode.addEventListener('change', (e) => {
            gameState.autoMode = e.target.checked;
        });

        // Init
        preloadAssets();

    </script>
</body>
</html>
