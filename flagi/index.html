<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>World Cup 2026 Mobile Flag Arena</title>
<style>
:root {
  --bg: #040817; --bg2: #07152f; --panel: rgba(8,15,35,.86); --panel2: rgba(11,22,50,.94);
  --cyan: #00e5ff; --blue: #156bff; --red: #ff334e; --green: #00d084; --gold: #ffd166; --muted: #9aa7c9; --white: #fff;
  --border: rgba(0,229,255,.25); --shadow: 0 18px 55px rgba(0,0,0,.58);
}
* { box-sizing: border-box; margin: 0; padding: 0; font-family: Inter, "Segoe UI", system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; user-select: none; }
html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: #fff; }

#layout {
  display: flex;
  width: 100vw;
  height: 100dvh;
  background: radial-gradient(circle at 50% 15%,rgba(0,229,255,.15), transparent 34%), linear-gradient(180deg, #040817, #07152f 58%, #02040d);
}

#gameArea {
  flex: 1;
  position: relative;
  overflow: hidden;
}

#sidePanel {
  width: 360px;
  background: var(--panel2);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 16px;
  z-index: 10;
  box-shadow: -10px 0 30px rgba(0,0,0,0.5);
  backdrop-filter: blur(18px);
}

canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block; }
#bgCanvas { z-index: 1; }
#gameCanvas { z-index: 2; }

#loader { position: absolute; inset: 0; z-index: 200; background: #040817; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; text-align: center; }
.loaderBall { width: 82px; height: 82px; border: 5px solid rgba(255,255,255,.16); border-top-color: var(--cyan); border-right-color: var(--red); border-bottom-color: var(--green); border-radius: 50%; animation: spin 1s linear infinite; box-shadow: 0 0 45px rgba(0,229,255,.35); }
@keyframes spin { to { transform: rotate(360deg); } }
.loaderTitle { font-weight: 1000; letter-spacing: 3px; text-transform: uppercase; color: var(--cyan); }

#elimFlash {
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 50% 50%, rgba(255,209,102,0.5) 0%, rgba(255,51,78,0.3) 50%, transparent 100%);
  mix-blend-mode: screen;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s ease-out;
  z-index: 90;
}

@keyframes shake { 0%, 100% { transform: translate(0); } 25% { transform: translate(-3px, 2px); } 50% { transform: translate(3px, -2px); } 75% { transform: translate(-2px, -1px); } }
.shake { animation: shake .22s both; }

.hudHeader { text-align: center; margin-bottom: 15px; }
.headline { font-size: 1.8rem; font-weight: 1000; color: var(--cyan); text-transform: uppercase; margin-bottom: 12px; filter: drop-shadow(0 0 10px rgba(0,229,255,.3)); }
.scoreWrap { display: flex; justify-content: space-around; background: rgba(0,0,0,0.4); border-radius: 12px; padding: 12px; border: 1px solid rgba(255,255,255,0.05); }
.scoreBox { text-align: center; min-width: 86px; }
.scoreLabel { font-size: .64rem; color: var(--muted); font-weight: 1000; letter-spacing: 2px; text-transform: uppercase; }
.scoreValue { font-size: 2rem; line-height: 1; font-weight: 1000; color: var(--cyan); text-shadow: 0 0 18px rgba(0,229,255,.75); margin-top: 4px; }
.scoreDivider { width: 1px; height: 44px; background: rgba(255,255,255,.13); }

.controls { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
.mainBtn { width: 100%; min-height: 56px; border: 0; border-radius: 14px; background: linear-gradient(90deg, var(--cyan), var(--blue)); box-shadow: 0 0 20px rgba(0,229,255,.3), inset 0 0 15px rgba(255,255,255,.1); color: white; font-size: 1rem; font-weight: 1000; letter-spacing: 2.2px; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
.mainBtn.running { background: linear-gradient(90deg, var(--red), #ff8733); box-shadow: 0 0 20px rgba(255,51,78,.3); }
.controlRow { display: flex; gap: 8px; justify-content: space-between; }
.selectBox { flex: 1; background: rgba(0,0,0,.32); border: 1px solid rgba(255,255,255,.1); border-radius: 12px; padding: 5px 10px; display: flex; flex-direction: column; justify-content: center; }
.selectBox label { font-size: .55rem; color: var(--muted); font-weight: 1000; text-transform: uppercase; }
.selectBox select { background: transparent; color: white; border: 0; outline: 0; font-size: 1rem; font-weight: 1000; }
.resetBtn { flex: 1; border-radius: 12px; border: 1px solid rgba(255,255,255,.14); background: rgba(255,255,255,.06); color: white; font-size: .8rem; font-weight: 1000; text-transform: uppercase; cursor: pointer; }
.autoToggle { flex: 1; background: rgba(0,0,0,.32); border: 1px solid rgba(255,255,255,.1); border-radius: 12px; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 1000; font-size: 0.8rem; text-transform: uppercase; color: var(--muted); }

.rankingHeader { display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px; border-bottom: 1px solid var(--border); margin-bottom: 5px; }
.panelTitle { font-size: .8rem; font-weight: 1000; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
.textBtn { background: rgba(0,229,255,0.1); border: 1px solid var(--border); color: var(--cyan); border-radius: 8px; padding: 4px 10px; font-size: 0.65rem; font-weight: 1000; text-transform: uppercase; cursor: pointer; }

.rankingList { flex: 1; overflow-y: auto; padding-right: 5px; }
.rankingList::-webkit-scrollbar { width: 6px; }
.rankingList::-webkit-scrollbar-thumb { background: rgba(0,229,255,0.3); border-radius: 10px; }
.row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,.05); }
.row:last-child { border-bottom: 0; }
.rankNum { width: 20px; color: var(--cyan); font-weight: 1000; text-align: center; }
.flagIcon { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; border: 1px solid rgba(255,255,255,.25); }
.rowName { flex: 1; font-size: .85rem; font-weight: 850; }
.rowScore { font-size: 1.1rem; font-weight: 1000; color: var(--gold); text-shadow: 0 0 10px rgba(255,209,102,.4); }

#toastLayer { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); z-index: 70; width: 100%; text-align: center; pointer-events: none; }
.bigText { max-width: 90vw; margin: 0 auto; font-size: clamp(2.5rem, 6vw, 5rem); line-height: 1.1; font-weight: 1000; text-transform: uppercase; letter-spacing: 3px; opacity: 0; transform: scale(.65); transition: .3s cubic-bezier(.18,.89,.32,1.28); text-shadow: 0 20px 60px rgba(0,0,0,.95); }
.bigText.show { opacity: 1; transform: scale(1); }
.goldText { color: var(--gold); filter: drop-shadow(0 0 34px rgba(255,209,102,.7)); }
.cyanText { color: white; filter: drop-shadow(0 0 34px rgba(0,229,255,.7)); }
.redText { color: white; filter: drop-shadow(0 0 34px rgba(255,51,78,.7)); }

.elimBanner { position: absolute; top: -150px; left: 0; width: 100%; padding: 12px 0; background: linear-gradient(90deg, transparent, rgba(255,51,78,.9), rgba(255,209,102,.6), transparent); font-size: clamp(1rem, 3vw, 1.6rem); font-weight: 1000; letter-spacing: 3px; text-transform: uppercase; opacity: 0; transition: .25s; text-shadow: 0 4px 16px rgba(0,0,0,.9); }
.elimBanner.show { top: -20vh; opacity: 1; }

@media (max-width: 800px) {
  #layout { flex-direction: column; }
  #sidePanel { width: 100%; height: 45vh; border-left: none; border-top: 1px solid var(--border); padding: 10px; }
  #gameArea { height: 55vh; flex: none; }
  .headline { font-size: 1.4rem; margin-bottom: 8px; }
  .mainBtn { min-height: 48px; font-size: 0.9rem; }
  .scoreValue { font-size: 1.6rem; }
}
</style>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
<div id="loader"><div class="loaderBall"></div><div class="loaderTitle">Inicjalizacja Systemu</div></div>

<div id="layout">
  <div id="gameArea">
    <canvas id="bgCanvas"></canvas>
    <canvas id="gameCanvas"></canvas>
    <div id="elimFlash"></div>
    <div id="toastLayer">
      <div id="elimBanner" class="elimBanner"></div>
      <div id="bigText" class="bigText"></div>
    </div>
  </div>

  <div id="sidePanel">
    <div class="hudHeader">
      <div class="headline">World Cup 2026</div>
      <div class="scoreWrap">
        <div class="scoreBox"><div class="scoreLabel">Runda</div><div class="scoreValue" id="roundVal">1</div></div>
        <div class="scoreDivider"></div>
        <div class="scoreBox"><div class="scoreLabel">Zostało</div><div class="scoreValue" id="remainVal">48</div></div>
      </div>
    </div>
    
    <div class="controls">
      <button id="mainBtn" class="mainBtn">Start Match</button>
      <div class="controlRow">
        <div class="selectBox">
          <label>Do ilu</label>
          <select id="targetSelect">
            <option value="3">3</option>
            <option value="5" selected>5</option>
            <option value="7">7</option>
          </select>
        </div>
        <label class="autoToggle"><input type="checkbox" id="autoCheck"> Auto</label>
        <button id="resetBtn" class="resetBtn">Reset</button>
      </div>
    </div>

    <div class="rankingHeader">
      <div class="panelTitle">Ranking Klasyfikacji</div>
      <button id="toggleRankBtn" class="textBtn">Zwiń do TOP 3</button>
    </div>
    <div id="rankingList" class="rankingList"></div>
  </div>
</div>

<script>
const TEAM_DATA = [
  ["Mexico", "mx"], ["South Africa", "za"], ["South Korea", "kr"], ["Czechia", "cz"], ["Canada", "ca"], ["Bosnia", "ba"], ["Qatar", "qa"], ["Switzerland", "ch"], ["Brazil", "br"], ["Morocco", "ma"], ["Haiti", "ht"], ["Scotland", "gb-sct"], ["USA", "us"], ["Paraguay", "py"], ["Australia", "au"], ["Türkiye", "tr"], ["Ecuador", "ec"], ["Tunisia", "tn"], ["Germany", "de"], ["Curacao", "cw"], ["Ivory Coast", "ci"], ["Netherlands", "nl"], ["Japan", "jp"], ["Sweden", "se"], ["Belgium", "be"], ["Egypt", "eg"], ["Iran", "ir"], ["New Zealand", "nz"], ["Spain", "es"], ["Cape Verde", "cv"], ["Saudi Arabia", "sa"], ["Uruguay", "uy"], ["France", "fr"], ["Senegal", "sn"], ["Iraq", "iq"], ["Norway", "no"], ["Argentina", "ar"], ["Algeria", "dz"], ["Austria", "at"], ["Jordan", "jo"], ["Portugal", "pt"], ["DR Congo", "cd"], ["Uzbekistan", "uz"], ["Colombia", "co"], ["England", "gb-eng"], ["Croatia", "hr"], ["Ghana", "gh"], ["Panama", "pa"]
];

const BASE_TEAMS = TEAM_DATA.map(([n, c]) => ({ n, c, s: 0 }));
const $ = id => document.getElementById(id);

const CFG = { 
  gap: Math.PI * 0.135, 
  wallRest: 0.95, 
  ballRest: 0.98, 
  maxSpeed: 7.0, 
  gravity: 0.038, 
  damping: 0.9995, 
  subSteps: 8, 
  rotBase: 0.012, 
  rotDuel: 0.018 
};

let state = { teams: JSON.parse(JSON.stringify(BASE_TEAMS)), images: {}, round: 1, target: 5, auto: false, running: false, balls: [], rot: 0, rotSpeed: CFG.rotBase, timeMs: 0, m: {} };
let canvas = $("gameCanvas"), ctx = canvas.getContext("2d"), bg = $("bgCanvas"), bgx = bg.getContext("2d");
let cx = 0, cy = 0, rad = 200, last = performance.now(), stars = [];
let ballCache = {};
let showAllRanks = true;

function cloneTeams() { return JSON.parse(JSON.stringify(BASE_TEAMS)); }

function load() {
  try {
    let s = JSON.parse(localStorage.getItem("wc26_physics_v2") || "{}");
    if (Array.isArray(s.teams) && s.teams.length === 48) { state.teams = s.teams; state.round = s.round || 1; state.target = s.target || 5; }
  } catch (e) {}
  $("targetSelect").value = String(state.target);
}

function save() {
  try { localStorage.setItem("wc26_physics_v2", JSON.stringify({ teams: state.teams, round: state.round, target: state.target })); } catch (e) {}
}

function updateUI() {
  let sorted = [...state.teams].sort((a, b) => b.s - a.s || a.n.localeCompare(b.n));
  $("roundVal").textContent = state.round;
  $("remainVal").textContent = state.balls.length || 48;
  
  let limit = showAllRanks ? sorted.length : 3;
  $("rankingList").innerHTML = sorted.slice(0, limit).map((t, i) => `<div class="row"><div class="rankNum">${i + 1}</div><img class="flagIcon" src="https://flagcdn.com/w40/${t.c}.png" onerror="this.style.display='none'"><div class="rowName">${t.n}</div><div class="rowScore">${t.s}</div></div>`).join("");
}

$("toggleRankBtn").onclick = () => {
  showAllRanks = !showAllRanks;
  $("toggleRankBtn").textContent = showAllRanks ? "Zwiń do TOP 3" : "Pokaż całą listę";
  updateUI();
};

function fallback(code) {
  let c = document.createElement("canvas"), x = c.getContext("2d");
  c.width = c.height = 96;
  let g = x.createLinearGradient(0, 0, 96, 96);
  g.addColorStop(0, "#00e5ff");
  g.addColorStop(.5, "#ff334e");
  x.fillStyle = g;
  x.fillRect(0, 0, 96, 96);
  x.fillStyle = "#fff";
  x.font = "bold 22px Inter";
  x.textAlign = "center";
  x.textBaseline = "middle";
  x.fillText(code.toUpperCase().slice(0, 2), 48, 48);
  return c;
}

function preload() {
  load();
  let loaded = 0, finished = false;
  function finish() {
    if (finished) return;
    finished = true;
    BASE_TEAMS.forEach(t => state.images[t.c] || (state.images[t.c] = fallback(t.c)));
    $("loader").style.display = "none";
    resizeAll();
    spawn();
    requestAnimationFrame(loop);
  }
  for (let i = 0; i < 60; i++) stars.push({ x: Math.random() * 2000, y: Math.random() * 2000, s: Math.random() * 1.8 + .45, h: Math.random() });
  TEAM_DATA.forEach(([n, c]) => {
    let im = new Image();
    im.crossOrigin = "anonymous";
    im.onload = () => { state.images[c] = im; if (++loaded === 48) finish(); };
    im.onerror = () => { state.images[c] = fallback(c); if (++loaded === 48) finish(); };
    im.src = `https://flagcdn.com/w80/${c}.png`;
  });
  setTimeout(finish, 4000);
}

function resizeAll() {
  let rect = $("gameArea").getBoundingClientRect();
  let dpr = devicePixelRatio || 1;
  canvas.width = Math.floor(rect.width * dpr);
  canvas.height = Math.floor(rect.height * dpr);
  bg.width = Math.floor(rect.width * dpr);
  bg.height = Math.floor(rect.height * dpr);
  ctx.scale(dpr, dpr);
  bgx.scale(dpr, dpr);
  layoutArena(rect);
  drawBg(rect);
}

function layoutArena(rect) {
  if(!rect) rect = $("gameArea").getBoundingClientRect();
  cx = rect.width / 2;
  cy = rect.height / 2;
  rad = Math.floor(Math.min(rect.width, rect.height) * 0.42);
  if (rad < 100) rad = 100;
}

window.addEventListener("resize", () => setTimeout(resizeAll, 120));

function drawBg(rect) {
  if(!rect) rect = $("gameArea").getBoundingClientRect();
  bgx.clearRect(0, 0, rect.width, rect.height);
  let t = performance.now() * .00035;
  for (let i = 0; i < 4; i++) {
    bgx.beginPath();
    bgx.arc(cx, cy, rad + i * 50 + Math.sin(t + i) * 8, 0, Math.PI * 2);
    bgx.strokeStyle = `rgba(0, 229, 255, ${.05 - i * .01})`;
    bgx.lineWidth = 1;
    bgx.stroke();
  }
  for (let p of stars) {
    bgx.fillStyle = p.h < .13 ? "rgba(255,51,78,.72)" : p.h < .25 ? "rgba(0,208,132,.66)" : "rgba(0,229,255,.72)";
    bgx.beginPath();
    bgx.arc(p.x, p.y, p.s, 0, Math.PI * 2);
    bgx.fill();
    p.y += .2;
    p.x += Math.sin(t + p.y * .01) * .05;
    if (p.y > rect.height + 8) { p.y = -8; p.x = Math.random() * rect.width; }
  }
}

function spawn(keepPlaying = false) {
  layoutArena();
  state.balls = [];
  state.m = {};
  state.timeMs = 0;
  state.rotSpeed = CFG.rotBase;
  let br = Math.max(7.4, Math.min(15.5, rad / 17.5));
  let rings = [[1, 0], [7, br * 2.5], [14, br * 5.2], [26, br * 7.8]], idx = 0;
  
  for (let rr = 0; rr < rings.length; rr++) {
    for (let i = 0; i < rings[rr][0] && idx < state.teams.length; i++, idx++) {
      let a = i / rings[rr][0] * Math.PI * 2 + rr * .09 + (Math.random() - .5) * .24;
      state.balls.push({
        x: cx + Math.cos(a) * rings[rr][1] + (Math.random() - .5) * br * .8,
        y: cy - 8 + Math.sin(a) * rings[rr][1] + (Math.random() - .5) * br * .8,
        vx: (Math.random() - .5) * 5.2,
        vy: (Math.random() - .5) * 5.2,
        r: br,
        team: state.teams[idx],
        angle: Math.random() * 7,
        av: (Math.random() - .5) * .14,
        dead: false
      });
    }
  }
  updateUI();
}

function physics(dt) {
  let step = dt / CFG.subSteps;
  for (let s = 0; s < CFG.subSteps; s++) {
    state.rot += state.rotSpeed * step;
    for (let b of state.balls) {
      b.vy += CFG.gravity * step;
      b.vx *= Math.pow(CFG.damping, step);
      b.vy *= Math.pow(CFG.damping, step);
      b.av *= Math.pow(CFG.damping, step);
      
      let sp = Math.hypot(b.vx, b.vy);
      if (sp > CFG.maxSpeed) {
        let k = CFG.maxSpeed / sp;
        b.vx *= k;
        b.vy *= k;
      }
      b.x += b.vx * step;
      b.y += b.vy * step;
      b.angle += b.av * step;
      wallBounce(b);
    }
    ballCollisions();
  }
}

function wallBounce(b) {
  let dx = b.x - cx, dy = b.y - cy, dist = Math.hypot(dx, dy);
  if (dist < 0.001) return;
  
  let local = Math.atan2(dy, dx) - state.rot;
  local = Math.atan2(Math.sin(local), Math.cos(local));
  let inGap = Math.abs(local) < (CFG.gap * 0.5) - (b.r / rad);
  
  if (inGap && dist > rad) {
    eliminateBall(b);
    return;
  }
  
  if (dist + b.r > rad && !inGap) {
    let nx = dx / dist, ny = dy / dist;
    b.x = cx + nx * (rad - b.r);
    b.y = cy + ny * (rad - b.r);
    
    let dot = b.vx * nx + b.vy * ny;
    if (dot > 0) {
      if (dot < 1.8) dot = 1.8; 
      b.vx -= (1 + CFG.wallRest) * dot * nx;
      b.vy -= (1 + CFG.wallRest) * dot * ny;
      let tx = -ny, ty = nx, spin = state.rotSpeed * rad * 0.3;
      b.vx += tx * spin;
      b.vy += ty * spin;
      b.av += dot * 0.012;
    }
  }
}

function ballCollisions() {
  let a, b, dx, dy, d2, min, dist, nx, ny, over, rvx, rvy, rel, j;
  for (let i = 0; i < state.balls.length; i++) {
    a = state.balls[i];
    for (let k = i + 1; k < state.balls.length; k++) {
      b = state.balls[k];
      dx = b.x - a.x;
      dy = b.y - a.y;
      d2 = dx * dx + dy * dy;
      min = a.r + b.r;
      if (d2 > 0 && d2 < min * min) {
        dist = Math.sqrt(d2);
        nx = dx / dist;
        ny = dy / dist;
        over = (min - dist) * 0.5;
        a.x -= nx * over;
        a.y -= ny * over;
        b.x += nx * over;
        b.y += ny * over;
        rvx = b.vx - a.vx;
        rvy = b.vy - a.vy;
        rel = rvx * nx + rvy * ny;
        if (rel > 0) continue;
        j = -(1 + CFG.ballRest) * rel * 0.5;
        a.vx -= j * nx;
        a.vy -= j * ny;
        b.vx += j * nx;
        b.vy += j * ny;
        a.av -= j * 0.01;
        b.av += j * 0.01;
      }
    }
  }
}

function eliminateBall(b) {
  if (b.dead) return;
  b.dead = true;
  state.balls = state.balls.filter(x => !x.dead);
  
  let flash = $("elimFlash");
  flash.style.opacity = "1";
  $("gameArea").offsetWidth; 
  $("gameArea").classList.add("shake");
  
  banner(b.team.n.toUpperCase() + " ELIMINATED!");
  setTimeout(() => flash.style.opacity = "0", 150);
  setTimeout(() => $("gameArea").classList.remove("shake"), 220);
  updateUI();
  milestones();
}

function getBallCanvas(r) {
  if (ballCache[r]) return ballCache[r];
  let c = document.createElement("canvas");
  let s = r * 2.5; 
  c.width = s * 2;
  c.height = s * 2;
  let cx = c.getContext("2d");
  let sh = cx.createRadialGradient(s - r * 0.35, s - r * 0.4, r * 0.1, s, s, r);
  sh.addColorStop(0, "rgba(255,255,255,0.6)");
  sh.addColorStop(0.5, "rgba(0,0,0,0)");
  sh.addColorStop(1, "rgba(0,0,0,0.5)");
  cx.fillStyle = sh;
  cx.beginPath();
  cx.arc(s, s, r, 0, Math.PI * 2);
  cx.fill();
  ballCache[r] = c;
  return c;
}

function draw() {
  let rect = $("gameArea").getBoundingClientRect();
  ctx.clearRect(0, 0, rect.width, rect.height);
  
  let gh = CFG.gap / 2, start = state.rot + gh, end = state.rot + Math.PI * 2 - gh;
  ctx.beginPath();
  ctx.arc(cx, cy, rad, start, end);
  ctx.strokeStyle = "rgba(0,229,255,0.9)";
  ctx.lineWidth = 5;
  ctx.stroke();
  
  for (let b of state.balls) {
    let im = state.images[b.team.c], r = b.r;
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(b.angle);
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.clip();
    if (im) ctx.drawImage(im, -r, -r, r * 2, r * 2);
    ctx.restore();
    let overlay = getBallCanvas(r);
    ctx.drawImage(overlay, b.x - overlay.width / 2, b.y - overlay.height / 2);
  }
}

function loop(now) {
  requestAnimationFrame(loop);
  let dt = (now - last) / 16.666;
  last = now;
  if (!Number.isFinite(dt) || dt <= 0 || dt > 2.5) dt = 1;
  drawBg();
  if (state.running) {
    state.timeMs += dt * 16.6666;
    physics(dt);
  }
  draw();
}

function big(html, cls = "goldText", ms = 2200) {
  let e = $("bigText");
  e.innerHTML = html;
  e.className = "bigText show " + cls;
  clearTimeout(big.t);
  big.t = setTimeout(() => e.className = "bigText", ms);
}

function banner(txt) {
  let e = $("elimBanner");
  e.textContent = txt;
  e.classList.add("show");
  clearTimeout(banner.t);
  banner.t = setTimeout(() => e.classList.remove("show"), 1800);
}

function milestones() {
  let r = state.balls.length;
  if (r === 10 && !state.m[10]) { state.m[10] = 1; big("Finałowa 10", "cyanText", 1800); }
  if (r === 5 && !state.m[5]) { state.m[5] = 1; big("Finałowa 5", "redText", 1800); }
  if (r === 3 && !state.m[3]) { state.m[3] = 1; big("Finałowa 3", "redText", 1800); }
  if (r === 2 && !state.m[2]) { state.m[2] = 1; state.rotSpeed = CFG.rotDuel; big("Wielki Finał", "goldText", 2400); }
  if (r === 1) roundWin();
}

function roundWin() {
  if (!state.running) return;
  state.running = false;
  btnState();
  let w = state.balls[0].team, idx = state.teams.findIndex(t => t.c === w.c);
  if (idx < 0) return;
  
  state.teams[idx].s++;
  let champ = state.teams[idx].s >= state.target;
  save();
  updateUI();
  
  if (champ) {
    if (typeof confetti === "function") confetti({ particleCount: 650, spread: 280, startVelocity: 45, origin: { y: .48 }, zIndex: 1000, colors: ["#00e5ff", "#156bff", "#ff334e", "#00d084", "#ffd166", "#fff"] });
    big(`${w.n.toUpperCase()}<br>MISTRZ ŚWIATA!`, "goldText", 7200);
    setTimeout(() => { state.teams = cloneTeams(); state.round = 1; save(); spawn(); autoNext(); }, 7800);
  } else {
    let sc = state.teams[idx].s;
    big(`${sc === state.target - 1 ? "Punkt Meczowy<br>" : ""}${w.n.toUpperCase()} +1 PKT<br>${sc}/${state.target}`, "goldText", 3800);
    setTimeout(() => { state.round++; save(); spawn(); autoNext(); }, 4200);
  }
}

function btnState() {
  let b = $("mainBtn");
  if (state.running) { b.classList.add("running"); b.textContent = "Zatrzymaj"; } 
  else { b.classList.remove("running"); }
}

function start() {
  layoutArena();
  if (state.timeMs === 0 || state.balls.length <= 1) spawn(true);
  state.running = true;
  $("mainBtn").textContent = "Zatrzymaj";
  btnState();
}

function pause() {
  state.running = false;
  $("mainBtn").textContent = "Wznów Grę";
  btnState();
}

function autoNext() {
  if (state.auto) setTimeout(start, 850);
  else { $("mainBtn").textContent = "Następna Runda"; btnState(); }
}

$("mainBtn").onclick = () => state.running ? pause() : start();
$("resetBtn").onclick = () => {
  if (confirm("Resetować wszystko do 1 rundy?")) {
    pause();
    state.teams = cloneTeams();
    state.round = 1;
    save();
    spawn();
    $("mainBtn").textContent = "Start Match";
    btnState();
    updateUI();
  }
};
$("targetSelect").onchange = e => { state.target = parseInt(e.target.value, 10) || 5; save(); updateUI(); };
$("autoCheck").onchange = e => { state.auto = e.target.checked; save(); };

window.onload = preload;
</script>
</body>
</html>
