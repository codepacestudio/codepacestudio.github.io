<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>World Cup 2026 Simulator - Final Polish</title>
    <style>
        :root {
            --bg-base: #060913;
            --panel-bg: rgba(13, 20, 40, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-cyan: #00e5ff;
            --accent-glow: rgba(0, 229, 255, 0.5);
            --text-main: #ffffff;
            --text-muted: #8892b0;
            --danger: #ff4757;
            --success: #2ed573;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Background & Physics Layers */
        #bg-canvas, #physics-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }
        #bg-canvas { z-index: 1; opacity: 0.8; }
        #physics-canvas { z-index: 2; }

        /* Dramatic Effects */
        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-2px, 1px); }
            50% { transform: translate(2px, -1px); }
            75% { transform: translate(-2px, -1px); }
        }
        .shake-active { animation: shake 0.2s cubic-bezier(.36,.07,.19,.97) both; }
        #flash-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: white; opacity: 0; z-index: 99; pointer-events: none; transition: opacity 0.15s; }

        /* UI Overlay */
        #ui-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* --- TOP BAR --- */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 25px;
            pointer-events: auto;
            width: 100%;
        }

        .icon-btn {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            color: white;
            width: 44px; height: 44px;
            border-radius: 10px;
            font-size: 1.2rem;
            cursor: pointer;
            backdrop-filter: blur(10px);
            display: flex; justify-content: center; align-items: center;
            transition: 0.2s;
        }
        .icon-btn:hover { background: rgba(255,255,255,0.1); }

        .score-pill {
            display: flex;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 8px 30px;
            backdrop-filter: blur(15px);
            gap: 30px;
        }
        .score-half { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .score-half .label { font-size: 0.65rem; color: var(--text-muted); letter-spacing: 1px; font-weight: 600; text-transform: uppercase;}
        .score-half .value { font-size: 1.8rem; font-weight: 900; color: var(--accent-cyan); line-height: 1.1; text-shadow: 0 0 10px var(--accent-glow); }
        .divider { width: 1px; background: var(--border-color); margin: 4px 0; }

        .btn-ranking {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            color: white;
            padding: 10px 15px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 0.75rem;
            cursor: pointer;
            backdrop-filter: blur(15px);
            display: flex; align-items: center; gap: 8px; letter-spacing: 1px;
            transition: 0.2s;
        }
        .btn-ranking:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); }

        /* --- RANKING PANEL --- */
        .ranking-panel {
            position: absolute;
            top: 75px; right: 25px;
            width: 240px;
            background: rgba(6, 9, 19, 0.95);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            backdrop-filter: blur(20px);
            transition: all 0.3s ease;
            transform-origin: top right;
            pointer-events: auto;
            z-index: 20;
        }
        .ranking-panel.hidden { transform: scale(0.9) translateY(-10px); opacity: 0; pointer-events: none; }
        .lb-title { text-align: center; font-size: 0.7rem; color: var(--text-muted); margin-bottom: 12px; letter-spacing: 2px; font-weight: bold; }
        .lb-row { display: flex; align-items: center; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .lb-row:last-child { border-bottom: none; }
        .lb-rank { width: 20px; color: var(--accent-cyan); font-weight: bold; font-size: 0.8rem; }
        .lb-flag { width: 20px; height: 20px; border-radius: 50%; object-fit: cover; margin-right: 10px; border: 1px solid rgba(255,255,255,0.2); }
        .lb-name { flex: 1; font-size: 0.8rem; font-weight: 500; }
        .lb-score { font-weight: bold; color: var(--gold); font-size: 0.9rem; }

        /* --- BOTTOM UI CONTAINER --- */
        .bottom-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 15px 15px 15px;
            gap: 12px;
            pointer-events: auto;
        }

        .center-labels {
            text-align: center;
            margin-bottom: 5px;
            pointer-events: none;
        }
        .flags-remain { font-size: 0.8rem; color: var(--text-muted); letter-spacing: 1px; font-weight: 600; margin-bottom: 2px; }
        .flags-remain span { color: var(--accent-cyan); font-weight: bold; }
        .who-wins { 
            font-size: 2.2rem; font-weight: 900; letter-spacing: 2px; line-height: 1;
            background: linear-gradient(90deg, #60a5fa, #c084fc);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* Controls Block */
        .main-controls-box {
            width: 100%; max-width: 800px;
            display: flex; flex-direction: column; gap: 12px;
        }

        .action-row {
            display: flex;
            gap: 12px;
            align-items: center;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px 15px;
            backdrop-filter: blur(15px);
        }

        .select-group { display: flex; flex-direction: column; align-items: flex-start; justify-content: center;}
        .select-group span { font-size: 0.6rem; color: var(--text-muted); margin-bottom: 2px; text-transform: uppercase; letter-spacing: 1px;}
        .select-group select { background: rgba(0,0,0,0.5); color: white; border: 1px solid var(--border-color); padding: 6px 10px; border-radius: 6px; font-weight: bold; outline: none; cursor: pointer; font-size: 0.9rem;}

        .auto-toggle { display: flex; align-items: center; gap: 8px; font-size: 0.75rem; font-weight: bold; cursor: pointer; border-left: 1px solid var(--border-color); padding-left: 15px; margin-left: 5px;}
        .auto-toggle input { width: 16px; height: 16px; accent-color: var(--accent-cyan); cursor: pointer; }

        .btn-start {
            flex: 1; padding: 12px; font-weight: 900; font-size: 0.95rem; border-radius: 8px; cursor: pointer; border: none; text-transform: uppercase; letter-spacing: 1px;
            background: linear-gradient(90deg, #00e5ff, #0077ff); color: #fff; box-shadow: 0 0 15px rgba(0, 229, 255, 0.4); text-shadow: 0 1px 3px rgba(0,0,0,0.5); transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .btn-start:active { transform: scale(0.97); }

        .btn-reset {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: white; padding: 12px 20px; border-radius: 8px; font-weight: bold; font-size: 0.8rem; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: 0.2s;
        }
        .btn-reset:hover { background: rgba(255,255,255,0.1); }

        /* Info Row */
        .info-row {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 10px 20px; backdrop-filter: blur(15px);
        }
        .info-col { display: flex; flex-direction: column; align-items: center; text-align: center; flex: 1;}
        .info-col .small { font-size: 0.55rem; color: var(--text-muted); letter-spacing: 1px; font-weight: 600; text-transform: uppercase;}
        .info-col .highlight { font-size: 0.85rem; color: var(--accent-cyan); font-weight: 900; margin: 2px 0; letter-spacing: 1px;}
        .info-col.mid { border-left: 1px solid var(--border-color); border-right: 1px solid var(--border-color); }
        .info-col.mid .icon { color: var(--accent-cyan); font-size: 1.2rem; margin-bottom: 2px; text-shadow: 0 0 10px var(--accent-glow);}

        /* Events Panel */
        .events-panel {
            background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 10px 15px; backdrop-filter: blur(15px); display: flex; flex-direction: column; gap: 8px;
        }
        .events-header { display: flex; justify-content: space-between; font-size: 0.65rem; color: var(--text-muted); font-weight: bold; letter-spacing: 1px; }
        .events-list { display: flex; justify-content: space-between; gap: 10px; overflow: hidden;}
        .event-item { display: flex; flex-direction: column; font-size: 0.65rem; flex: 1; border-right: 1px solid rgba(255,255,255,0.05); padding-right: 10px; }
        .event-item:last-child { border-right: none; padding-right: 0; }
        .event-item .country { font-weight: bold; color: var(--success); margin-bottom: 2px;}
        .event-item .status { font-weight: bold; color: white; }
        .event-item .time { color: var(--text-muted); font-size: 0.55rem; margin-top: 2px;}

        /* Bottom Toggles */
        .bottom-toggles {
            display: flex; justify-content: space-between; align-items: center; width: 100%;
            background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 10px 20px; backdrop-filter: blur(15px);
        }
        .toggle-btn { display: flex; align-items: center; gap: 6px; font-size: 0.7rem; color: var(--text-muted); font-weight: bold; cursor: pointer; }
        .tiktok-mode { display: flex; align-items: center; gap: 10px; font-size: 0.7rem; color: white; font-weight: bold; }
        .switch { position: relative; display: inline-block; width: 34px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #334155; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent-cyan); }
        input:checked + .slider:before { transform: translateX(14px); }

        /* Dramatic Center Notifications */
        #notify-layer { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); z-index: 50; pointer-events: none; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .dramatic-text {
            font-size: 8vw; font-weight: 900; text-transform: uppercase; text-align: center;
            opacity: 0; transform: scale(0.5); transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-shadow: 0 10px 30px rgba(0,0,0,0.9); background: -webkit-linear-gradient(#fff, #bbb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1.1;
        }
        .dramatic-text.show { opacity: 1; transform: scale(1); }
        .text-accent { background: -webkit-linear-gradient(#fff, #00e5ff); -webkit-background-clip: text; filter: drop-shadow(0 0 20px var(--accent-glow)); }
        .text-danger { background: -webkit-linear-gradient(#ffaaaa, #ff4757); -webkit-background-clip: text; filter: drop-shadow(0 0 30px rgba(255, 71, 87, 0.6)); }
        .text-gold { background: -webkit-linear-gradient(#fff, #ffd700); -webkit-background-clip: text; filter: drop-shadow(0 0 40px rgba(255, 215, 0, 0.6)); font-size: 10vw;}

        .elim-banner {
            position: absolute; top: -100px; background: linear-gradient(90deg, transparent, rgba(255,71,87,0.9), transparent);
            width: 100vw; text-align: center; padding: 12px 0; font-size: 1.5rem; font-weight: 900; color: white;
            opacity: 0; transform: scaleY(0); transition: 0.3s; letter-spacing: 2px; text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }
        .elim-banner.show { opacity: 1; transform: scaleY(1); top: 0; }

        /* Loader */
        #loader {
            position: absolute; top:0; left:0; width:100%; height:100%; background: var(--bg-base); z-index: 200;
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--accent-cyan); font-weight: 900; font-size: 1.2rem; letter-spacing: 2px;
        }

        /* Responsiveness */
        @media (max-width: 768px) {
            .action-row { flex-wrap: wrap; justify-content: center; padding: 10px; }
            .btn-start { min-width: 100%; order: 1; padding: 15px; }
            .select-group, .auto-toggle, .btn-reset { order: 2; margin-top: 5px; }
            .events-list { flex-wrap: wrap; justify-content: center; gap: 5px; }
            .event-item { min-width: 30%; border-right: none; text-align: center; margin-bottom: 5px;}
            .top-bar { padding: 15px; }
            .bottom-toggles { padding: 10px; }
        }
        @media (max-height: 800px) {
            .events-panel, .info-row { display: none; } /* Hide secondary UI to give arena max space on very small screens */
            .who-wins { font-size: 1.8rem; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <div id="loader">LOADING RESOURCES...</div>
    <canvas id="bg-canvas"></canvas>
    <canvas id="physics-canvas"></canvas>
    <div id="flash-overlay"></div>

    <div id="notify-layer">
        <div id="elim-banner" class="elim-banner"></div>
        <div id="dramatic-msg" class="dramatic-text"></div>
    </div>

    <div id="ui-layer">
        <div class="top-bar">
            <button class="icon-btn">☰</button>
            <div class="score-pill">
                <div class="score-half">
                    <div class="label">ROUND</div>
                    <div class="value" id="val-round">1</div>
                </div>
                <div class="divider"></div>
                <div class="score-half">
                    <div class="label">REMAINING</div>
                    <div class="value" id="val-rem">48</div>
                </div>
            </div>
            <button id="btn-ranking" class="btn-ranking">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M4 22H20C21.1 22 22 21.1 22 20V4C22 2.9 21.1 2 20 2H4C2.9 2 2 2.9 2 4V20C2 21.1 2.9 22 4 22ZM7 14H9V18H7V14ZM11 10H13V18H11V10ZM15 6H17V18H15V6Z"/></svg> 
                RANKING
            </button>
        </div>

        <div class="ranking-panel hidden" id="ranking-panel">
            <div class="lb-title">TOP 5</div>
            <div id="lb-content"></div>
        </div>

        <div class="bottom-container">
            <div class="center-labels" id="center-labels">
                <div class="flags-remain"><span id="lbl-rem-num">48</span> FLAGS REMAIN</div>
                <div class="who-wins">WHO WILL WIN?</div>
            </div>

            <div class="main-controls-box">
                <div class="action-row">
                    <div class="select-group">
                        <span>BEST OF</span>
                        <select id="sel-target">
                            <option value="3">3</option>
                            <option value="5" selected>5</option>
                            <option value="7">7</option>
                        </select>
                    </div>
                    <label class="auto-toggle"><input type="checkbox" id="chk-auto"> AUTO LIVE</label>
                    <button id="btn-action" class="btn-start">▶ START GAME</button>
                    <button id="btn-reset" class="btn-reset">↻ RESET</button>
                </div>

                <div class="info-row">
                    <div class="info-col">
                        <div class="small">FIRST TEAM TO</div>
                        <div class="highlight" id="ft-pts">5 POINTS</div>
                        <div class="small">WINS THE BATTLE</div>
                    </div>
                    <div class="info-col mid">
                        <div class="icon">🏆</div>
                        <div class="small">SURVIVE. ELIMINATE. WIN.</div>
                    </div>
                    <div class="info-col">
                        <div class="small">MAY THE BEST</div>
                        <div class="highlight">FLAG</div>
                        <div class="small">WIN!</div>
                    </div>
                </div>

                <div class="events-panel">
                    <div class="events-header"><span>EVENTS</span><span>VIEW ALL ></span></div>
                    <div class="events-list" id="events-list">
                        <div class="event-item" style="opacity: 0.5;"><div class="country">Waiting...</div><div class="status">-</div><div class="time">--:--:--</div></div>
                    </div>
                </div>

                <div class="bottom-toggles">
                    <div style="display:flex; gap:20px;">
                        <div class="toggle-btn">🔊 SOUND</div>
                        <div class="toggle-btn">🎵 MUSIC</div>
                        <div class="toggle-btn">📳 VIBRATION</div>
                    </div>
                    <div class="tiktok-mode">
                        ((•)) TIKTOK LIVE MODE
                        <label class="switch">
                            <input type="checkbox" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 48 Official World Cup 2026 Teams
        const TEAMS = [
            { n: "Mexico", c: "mx" }, { n: "South Africa", c: "za" }, { n: "South Korea", c: "kr" }, { n: "Czechia", c: "cz" },
            { n: "Canada", c: "ca" }, { n: "Bosnia", c: "ba" }, { n: "Qatar", c: "qa" }, { n: "Switzerland", c: "ch" },
            { n: "Brazil", c: "br" }, { n: "Morocco", c: "ma" }, { n: "Haiti", c: "ht" }, { n: "Scotland", c: "gb-sct" },
            { n: "USA", c: "us" }, { n: "Paraguay", c: "py" }, { n: "Australia", c: "au" }, { n: "Türkiye", c: "tr" },
            { n: "Germany", c: "de" }, { n: "Curacao", c: "cw" }, { n: "Ivory Coast", c: "ci" }, { n: "Ecuador", c: "ec" },
            { n: "Netherlands", c: "nl" }, { n: "Japan", c: "jp" }, { n: "Sweden", c: "se" }, { n: "Tunisia", c: "tn" },
            { n: "Belgium", c: "be" }, { n: "Egypt", c: "eg" }, { n: "Iran", c: "ir" }, { n: "New Zealand", c: "nz" },
            { n: "Spain", c: "es" }, { n: "Cape Verde", c: "cv" }, { n: "Saudi Arabia", c: "sa" }, { n: "Uruguay", c: "uy" },
            { n: "France", c: "fr" }, { n: "Senegal", c: "sn" }, { n: "Iraq", c: "iq" }, { n: "Norway", c: "no" },
            { n: "Argentina", c: "ar" }, { n: "Algeria", c: "dz" }, { n: "Austria", c: "at" }, { n: "Jordan", c: "jo" },
            { n: "Portugal", c: "pt" }, { n: "DR Congo", c: "cd" }, { n: "Uzbekistan", c: "uz" }, { n: "Colombia", c: "co" },
            { n: "England", c: "gb-eng" }, { n: "Croatia", c: "hr" }, { n: "Ghana", c: "gh" }, { n: "Panama", c: "pa" }
        ];

        let state = {
            teams: [], images: {}, loaded: 0, events: [],
            round: 1, target: 5, auto: false, running: false,
            balls: [], arenaRot: 0, rotSpeed: 0.015,
            zoom: 1, targetZoom: 1, timeScale: 1, targetTimeScale: 1,
            m10: false, m5: false, m3: false, m2: false
        };

        // Fixed Physics Params
        const FIXED_GAP = Math.PI * 0.16; // Stała dziura (ok. 28 stopni), lekko większa by zapewnić sprawny finisz, ale bez gigantycznych zmian
        const RESTITUTION_WALLS = 0.8;
        const RESTITUTION_BALLS = 0.8; // Równe wartości zapewniają idealnie sprawiedliwe i fizyczne odbicia

        // Audio System
        let actx = null;
        let lastHitTime = 0;
        
        function initAudio() {
            try { if(!actx) actx = new (window.AudioContext || window.webkitAudioContext)(); if(actx.state === 'suspended') actx.resume(); } catch(e) {}
        }
        
        function playTone(freq, type, dur, vol, slideFreq=null) {
            if(!actx) return;
            try {
                const osc = actx.createOscillator(); const gain = actx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, actx.currentTime);
                if(slideFreq) osc.frequency.exponentialRampToValueAtTime(slideFreq, actx.currentTime + dur);
                gain.gain.setValueAtTime(vol, actx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
                osc.connect(gain); gain.connect(actx.destination);
                osc.start(); osc.stop(actx.currentTime + dur);
            } catch(e) {}
        }

        function sndHit(velocity) {
            const now = performance.now();
            if(!actx || velocity < 2.0 || now - lastHitTime < 40) return;
            lastHitTime = now;
            playTone(150 + Math.random()*50, 'triangle', 0.1, Math.min(velocity * 0.01, 0.1));
        }

        function sndEliminate() { playTone(250, 'sawtooth', 0.3, 0.15, 50); setTimeout(()=>playTone(150, 'square', 0.3, 0.15, 30), 80); }
        function sndEvent() { playTone(900, 'sine', 1.0, 0.15, 200); }
        function sndWin() { [440, 554, 659, 880].forEach((f, i) => setTimeout(()=>playTone(f, 'square', 0.4, 0.1), i*100)); }
        function sndChampion() {
            [440, 554, 659, 880, 1108, 1318].forEach((f, i) => setTimeout(()=>playTone(f, 'sine', 0.8, 0.15), i*150));
            setTimeout(()=>playTone(880, 'square', 2.0, 0.2), 900);
        }

        // Particle Background
        const bgCanvas = document.getElementById('bg-canvas');
        const bgCtx = bgCanvas.getContext('2d');
        let particles = [];
        function initBg() {
            bgCanvas.width = window.innerWidth; bgCanvas.height = window.innerHeight;
            particles = Array.from({length: 80}, () => ({
                x: Math.random() * bgCanvas.width, y: Math.random() * bgCanvas.height,
                s: Math.random() * 1.5 + 0.5, v: Math.random() * 0.3 + 0.1
            }));
        }
        function drawBg() {
            bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
            bgCtx.fillStyle = 'rgba(0, 229, 255, 0.5)';
            particles.forEach(p => {
                bgCtx.beginPath(); bgCtx.arc(p.x, p.y, p.s, 0, Math.PI*2); bgCtx.fill();
                p.y -= p.v; if(p.y < 0) { p.y = bgCanvas.height; p.x = Math.random() * bgCanvas.width; }
            });
            requestAnimationFrame(drawBg);
        }
        initBg(); drawBg(); window.addEventListener('resize', initBg);

        // Data Management
        function loadStorage() {
            try {
                const sv = localStorage.getItem('wc26_final');
                if(sv) {
                    const p = JSON.parse(sv);
                    state.teams = p.teams || TEAMS.map(t => ({...t, s: 0}));
                    state.round = p.round || 1;
                } else initData();
            } catch(e) { initData(); }
        }
        function saveStorage() { try { localStorage.setItem('wc26_final', JSON.stringify({teams: state.teams, round: state.round})); } catch(e) {} }
        function initData() { state.teams = TEAMS.map(t => ({...t, s: 0})); state.round = 1; state.events = []; saveStorage(); }

        function logEvent(teamName) {
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0') + ':' + now.getSeconds().toString().padStart(2,'0');
            // Zmiana kolorów w zależności od flagi to świetny pomysł wizualny ze zrzutu ekranu. Tu użyjemy lekkich wariantów kolorystycznych
            const colors = ['#2ed573', '#ff4757', '#eccc68', '#70a1ff', '#ffffff'];
            const color = colors[state.events.length % colors.length];
            
            state.events.unshift({ name: teamName, time: timeStr, col: color });
            if(state.events.length > 5) state.events.pop();
        }

        function updateUI() {
            document.getElementById('val-round').innerText = state.round;
            document.getElementById('val-rem').innerText = state.balls.length;
            document.getElementById('lbl-rem-num').innerText = state.balls.length;
            
            // Ranking
            const sort = [...state.teams].sort((a,b) => b.s - a.s || a.n.localeCompare(b.n)).slice(0, 5);
            document.getElementById('lb-content').innerHTML = sort.map((t, i) => `
                <div class="lb-row">
                    <div class="lb-rank">${i+1}</div>
                    <img src="https://flagcdn.com/w40/${t.c}.png" class="lb-flag" crossorigin="anonymous">
                    <div class="lb-name">${t.n}</div>
                    <div class="lb-score">${t.s}</div>
                </div>
            `).join('');

            // Events Log
            const evList = document.getElementById('events-list');
            if(state.events.length === 0) {
                evList.innerHTML = `<div class="event-item" style="opacity: 0.3;"><div class="country" style="color:white;">Awaiting...</div><div class="status">-</div><div class="time">--:--:--</div></div>`;
            } else {
                evList.innerHTML = state.events.map(e => `
                    <div class="event-item">
                        <div class="country" style="color:${e.col};">${e.name}</div>
                        <div class="status">ELIMINATED!</div>
                        <div class="time">${e.time}</div>
                    </div>
                `).join('');
            }
        }

        function preload() {
            TEAMS.forEach(t => {
                const img = new Image(); img.crossOrigin = "anonymous";
                const checkLoad = () => {
                    state.loaded++;
                    if(state.loaded === TEAMS.length) { document.getElementById('loader').style.display = 'none'; loadStorage(); updateUI(); setupMatter(); }
                };
                img.onload = () => { state.images[t.c] = img; checkLoad(); };
                img.onerror = () => {
                    const c = document.createElement('canvas'); c.width = 80; c.height = 80; const ctx = c.getContext('2d');
                    ctx.fillStyle = `#1a1a2e`; ctx.fillRect(0,0,80,80);
                    ctx.fillStyle = '#fff'; ctx.font = 'bold 24px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText(t.c.toUpperCase(), 40, 40); state.images[t.c] = c; checkLoad();
                };
                img.src = `https://flagcdn.com/w80/${t.c}.png`;
            });
        }

        // MATTER.JS CORE
        const { Engine, Render, Bodies, Body, Composite, Events } = Matter;
        let eng, rnd;
        let cx, cy, rad;
        let arenaSegments = [];
        const NUM_SEGMENTS = 70;

        function setupMatter() {
            const canvas = document.getElementById('physics-canvas');
            eng = Engine.create({ positionIterations: 24, velocityIterations: 24 }); // Bardzo dokładne obliczenia
            eng.gravity.y = 0.8;
            eng.gravity.x = 0;
            
            rnd = Render.create({ canvas: canvas, engine: eng, options: { width: window.innerWidth, height: window.innerHeight, wireframes: false, background: 'transparent' } });

            resizeArena();

            Events.on(rnd, 'beforeRender', () => {
                const ctx = rnd.context; ctx.save();
                ctx.translate(cx, cy); ctx.scale(state.zoom, state.zoom); ctx.translate(-cx, -cy);
            });

            Events.on(rnd, 'afterRender', () => {
                const ctx = rnd.context;
                // Renderowanie świecącej obręczy z przerwą
                const gapHalf = FIXED_GAP / 2;
                ctx.beginPath();
                ctx.arc(cx, cy, rad, state.arenaRot + gapHalf, state.arenaRot + Math.PI*2 - gapHalf);
                ctx.strokeStyle = '#00e5ff'; ctx.lineWidth = 10;
                ctx.shadowBlur = 25; ctx.shadowColor = '#00e5ff';
                ctx.stroke(); ctx.shadowBlur = 0;

                // Renderowanie 3D kulek
                state.balls.forEach(b => {
                    const img = state.images[b.tData.c];
                    if(img) {
                        ctx.save();
                        ctx.translate(b.position.x, b.position.y); ctx.rotate(b.angle);
                        ctx.beginPath(); ctx.arc(0, 0, b.circleRadius, 0, Math.PI*2); ctx.clip();
                        const r = b.circleRadius;
                        ctx.drawImage(img, -r, -r, r*2, r*2);
                        // Delikatny gradient cieniujący kulę, by wyglądała trójwymiarowo (jak na zrzucie)
                        const grad = ctx.createRadialGradient(-r*0.3, -r*0.3, r*0.1, 0, 0, r);
                        grad.addColorStop(0, 'rgba(255,255,255,0.4)'); grad.addColorStop(1, 'rgba(0,0,0,0.6)');
                        ctx.fillStyle = grad; ctx.fill();
                        ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.stroke();
                        ctx.restore();
                    }
                });
                ctx.restore();
            });

            Events.on(eng, 'collisionStart', (e) => {
                e.pairs.forEach(p => {
                    if(!p.bodyA.isStatic && !p.bodyB.isStatic && p.bodyA.label==='ball' && p.bodyB.label==='ball') {
                        const vA = p.bodyA.velocity; const vB = p.bodyB.velocity;
                        sndHit(Math.hypot(vA.x - vB.x, vA.y - vB.y));
                    }
                });
            });

            spawn();
            Render.run(rnd);
            requestAnimationFrame(customPhysicsLoop);
        }

        function resizeArena() {
            // Obliczenia wymiarów tak, by arena dominowała, a UI było omijanie
            const topSpace = 90; 
            const bottomSpace = window.innerHeight > 800 ? 280 : 180; 
            const availableH = window.innerHeight - topSpace - bottomSpace;
            
            cx = window.innerWidth / 2; 
            cy = topSpace + (availableH / 2);
            
            rad = Math.min(window.innerWidth * 0.9, availableH) * 0.45;
            if(rad > 350) rad = 350; // Max wielkość
            if(rad < 150) rad = 150;
            
            if(rnd) { rnd.canvas.width = window.innerWidth; rnd.canvas.height = window.innerHeight; }

            arenaSegments.forEach(s => Composite.remove(eng.world, s.body));
            arenaSegments = [];

            const thick = 40;
            const len = (Math.PI*2*rad)/NUM_SEGMENTS * 1.05;

            for(let i=0; i<NUM_SEGMENTS; i++) {
                const baseAngle = (i/NUM_SEGMENTS) * Math.PI*2;
                const body = Bodies.rectangle(cx + Math.cos(baseAngle)*rad, cy + Math.sin(baseAngle)*rad, len, thick, {
                    isStatic: true, restitution: RESTITUTION_WALLS, friction: 0.05, label: 'wall', render: { visible: false }
                });
                arenaSegments.push({ body: body, baseAngle: baseAngle });
                Composite.add(eng.world, body);
            }
            
            if(!state.running && state.balls.length <= 1) spawn();
        }

        window.addEventListener('resize', () => { clearTimeout(window.rsz); window.rsz = setTimeout(resizeArena, 200); });

        // KONCENTRYCZNY GRID SPAWNING (Brak nakładania, idealny wygląd)
        function spawn() {
            state.balls.forEach(b => Composite.remove(eng.world, b));
            state.balls = [];
            const br = Math.max(10, rad / 14);
            
            // Algorytm rozmieszczający w idealnych ringach (od środka w górę)
            const rings = [
                { count: 1,  radius: 0 },
                { count: 7,  radius: br * 2.3 },
                { count: 14, radius: br * 4.6 },
                { count: 26, radius: br * 6.9 }
            ];

            let teamIdx = 0;
            rings.forEach(ring => {
                for(let i=0; i<ring.count; i++) {
                    if (teamIdx >= state.teams.length) break;
                    // Przesunięcie Y lekko w górę, żeby po stracie grawitacja je ładnie wymieszała
                    let angle = (i / ring.count) * Math.PI * 2;
                    let bx = cx + Math.cos(angle) * ring.radius;
                    let by = cy - 20 + Math.sin(angle) * ring.radius;

                    const b = Bodies.circle(bx, by, br, {
                        restitution: RESTITUTION_BALLS, friction: 0.005, frictionAir: 0.001, density: 0.05, label: 'ball', render: { visible: false }
                    });
                    b.tData = state.teams[teamIdx];
                    state.balls.push(b); Composite.add(eng.world, b);
                    teamIdx++;
                }
            });
            
            state.targetTimeScale = 1; state.timeScale = 1; state.targetZoom = 1; state.zoom = 1; 
            state.m10 = false; state.m5 = false; state.m3 = false; state.m2 = false;
            state.events = []; // Czysty log na nową grę
            
            document.getElementById('center-labels').style.opacity = '1';
            updateUI();
        }

        let lastTime = performance.now();

        // GŁÓWNA PĘTLA
        function customPhysicsLoop(time) {
            requestAnimationFrame(customPhysicsLoop);
            let delta = time - lastTime; lastTime = time;
            if(delta > 100) delta = 1000/60;

            state.zoom += (state.targetZoom - state.zoom) * 0.05;
            state.timeScale += (state.targetTimeScale - state.timeScale) * 0.05;

            if(!state.running) return;

            Engine.update(eng, delta * state.timeScale);

            // Stała, stabilna rotacja w jednym kierunku
            state.arenaRot += state.rotSpeed * state.timeScale;
            const omega = (state.rotSpeed * state.timeScale) / (delta / 1000); 

            // Kinematyka ścian
            const limit = FIXED_GAP / 2;
            arenaSegments.forEach(seg => {
                let norm = seg.baseAngle;
                if (norm > Math.PI*2 - limit || norm < limit) {
                    Body.setPosition(seg.body, {x: -2000, y: -2000}); // Schowaj segment dla zrobienia luki
                } else {
                    const a = seg.baseAngle + state.arenaRot;
                    const px = cx + Math.cos(a)*rad;
                    const py = cy + Math.sin(a)*rad;
                    Body.setPosition(seg.body, {x: px, y: py});
                    Body.setAngle(seg.body, a);
                    
                    Body.setVelocity(seg.body, {
                        x: -Math.sin(a) * rad * omega,
                        y: Math.cos(a) * rad * omega
                    });
                }
            });

            // Anti-Stall & Eliminacja
            for(let i = state.balls.length-1; i>=0; i--) {
                const b = state.balls[i];
                const distCenter = Math.hypot(b.position.x - cx, b.position.y - cy);
                
                // MIKRO-IMPULS (Balans dla ostatnich zwalniających piłek). Zachowuje naturalność ruchu, brak wybuchów.
                if(b.speed < 0.5) {
                    const nudgeAngle = Math.atan2(cy - b.position.y, cx - b.position.x);
                    const nudgeForce = 0.000015 * b.mass; // Ekstremalnie delikatny
                    Body.applyForce(b, b.position, {x: Math.cos(nudgeAngle)*nudgeForce, y: Math.sin(nudgeAngle)*nudgeForce});
                }
                
                // Eliminacja (wypadnięcie grawitacyjne)
                if(distCenter > rad + 60) {
                    const t = b.tData;
                    Composite.remove(eng.world, b); state.balls.splice(i, 1);
                    document.body.classList.remove('shake-active'); void document.body.offsetWidth; document.body.classList.add('shake-active');
                    
                    sndEliminate(); 
                    showElim(`${t.n.toUpperCase()} ELIMINATED!`);
                    logEvent(t.n);
                    
                    updateUI(); checkMilestones();
                }
            }
        }

        const dText = document.getElementById('dramatic-msg');
        const elimBan = document.getElementById('elim-banner');

        function showText(txt, cls, dur) { dText.innerHTML = txt; dText.className = `dramatic-text show ${cls}`; setTimeout(() => dText.className = 'dramatic-text', dur); }
        function showElim(txt) { elimBan.innerHTML = txt; elimBan.classList.add('show'); setTimeout(() => elimBan.classList.remove('show'), 1500); }

        function checkMilestones() {
            const rem = state.balls.length;
            if(rem === 10 && !state.m10) { state.m10 = true; showText("FINAL 10", "text-accent", 2000); sndEvent(); }
            if(rem === 5 && !state.m5) { state.m5 = true; showText("FINAL 5", "text-danger", 2000); sndEvent(); }
            if(rem === 3 && !state.m3) { state.m3 = true; showText("FINAL 3", "text-danger", 2000); sndEvent(); state.targetTimeScale = 0.6; }
            if(rem === 2 && !state.m2) { state.m2 = true; showText("FINAL DUEL", "text-gold", 3000); sndEvent(); state.targetTimeScale = 0.4; state.targetZoom = 1.35; document.getElementById('center-labels').style.opacity = '0'; }
            if(rem === 1) handleWin();
        }

        function handleWin() {
            state.running = false;
            const w = state.balls[0].tData;
            const idx = state.teams.findIndex(t => t.c === w.c);
            state.teams[idx].s++; saveStorage(); updateUI();

            const isChamp = state.teams[idx].s >= state.target;

            document.getElementById('flash-overlay').style.opacity = '1';
            setTimeout(() => document.getElementById('flash-overlay').style.opacity = '0', 200);

            if(isChamp) {
                sndChampion();
                confetti({ particleCount: 600, spread: 250, origin: { y: 0.5 }, zIndex: 1000, colors: ['#ffd700', '#00e5ff', '#ffffff'] });
                showText(`👑 ${w.n.toUpperCase()} WINS! 👑<br><img src="https://flagcdn.com/w160/${w.c}.png" style="margin-top:30px; border-radius:50%; width:140px; height:140px; object-fit:cover; box-shadow:0 0 60px var(--gold); border: 4px solid var(--gold);">`, 'text-gold', 7000);
                setTimeout(() => { initData(); updateUI(); autoCheck(); }, 8000);
            } else {
                sndWin();
                showText(`🏆 ${w.n.toUpperCase()} +1 POINT!`, 'text-gold', 4000);
                setTimeout(() => { state.round++; saveStorage(); autoCheck(); }, 4500);
            }
        }

        function autoCheck() {
            spawn();
            if(state.auto) { setTimeout(() => startSim(), 1000); } 
            else { document.getElementById('btn-action').innerHTML = "▶ START NEXT ROUND"; }
        }

        function startSim() { 
            initAudio(); 
            if(state.balls.length <= 1) spawn(); 
            state.running = true; 
            document.getElementById('center-labels').style.opacity = '0';
            document.getElementById('btn-action').innerHTML = "⏸ PAUSE GAME"; 
        }
        function pauseSim() { 
            state.running = false; 
            document.getElementById('btn-action').innerHTML = "▶ RESUME GAME"; 
        }

        document.getElementById('btn-action').onclick = () => { state.running ? pauseSim() : startSim(); };
        document.getElementById('btn-reset').onclick = () => { if(confirm("Reset match to Round 1?")) { pauseSim(); initData(); spawn(); document.getElementById('btn-action').innerHTML = "▶ START GAME"; } };
        document.getElementById('sel-target').onchange = (e) => { state.target = parseInt(e.target.value); document.getElementById('ft-pts').innerText = `${state.target} POINTS`; };
        document.getElementById('chk-auto').onchange = (e) => { state.auto = e.target.checked; };

        let rOpen = false;
        document.getElementById('btn-ranking').onclick = () => {
            rOpen = !rOpen;
            document.getElementById('ranking-panel').classList.toggle('hidden', !rOpen);
        };

        preload();
    </script>
</body>
</html>
