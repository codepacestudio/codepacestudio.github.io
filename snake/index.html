<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Snake Mobile</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
            color: #fff;
            font-family: sans-serif;
            overflow: hidden;
            touch-action: none; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #score-board {
            font-size: 2rem;
            font-weight: bold;
            color: #00ffcc;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        canvas {
            background-color: #111;
            border: 2px solid #333;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.1);
            border-radius: 8px;
        }

        #game-over {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 10, 0.95);
            padding: 40px;
            border: 2px solid #ff0055;
            text-align: center;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(255, 0, 85, 0.4);
            z-index: 10;
        }

        #game-over h2 {
            color: #ff0055;
            margin-top: 0;
            font-size: 2.5rem;
            text-transform: uppercase;
        }

        #game-over p {
            font-size: 1.5rem;
            margin-bottom: 30px;
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            background: #00ffcc;
            color: #000;
            border: none;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            text-transform: uppercase;
            transition: 0.2s;
        }

        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div id="score-board">WYNIK: <span id="score">0</span></div>
    
    <canvas id="gameCanvas" width="300" height="400"></canvas>
    
    <div id="game-over">
        <h2>Rozbity!</h2>
        <p>Zdobywasz: <span id="final-score">0</span> pkt</p>
        <button onclick="resetGame()">Zagraj ponownie</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const gameOverScreen = document.getElementById('game-over');
        const finalScoreElement = document.getElementById('final-score');

        const gridSize = 20;
        const tileCountX = canvas.width / gridSize;
        const tileCountY = canvas.height / gridSize;

        let snake = [];
        let dx = 0;
        let dy = 0;
        let foodX;
        let foodY;
        let score = 0;
        let gameLoop;
        let gameActive = true;

        let touchStartX = 0;
        let touchStartY = 0;

        function initGame() {
            snake = [
                {x: Math.floor(tileCountX / 2), y: Math.floor(tileCountY / 2)}
            ];
            dx = 0;
            dy = -1; 
            score = 0;
            scoreElement.innerText = score;
            gameActive = true;
            gameOverScreen.style.display = 'none';
            placeFood();
            
            if(gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(update, 150); 
        }

        function update() {
            if (!gameActive) return;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            if (head.x < 0 || head.x >= tileCountX || head.y < 0 || head.y >= tileCountY) {
                return gameOver();
            }

            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    return gameOver();
                }
            }

            snake.unshift(head);

            if (head.x === foodX && head.y === foodY) {
                score += 10;
                scoreElement.innerText = score;
                placeFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function draw() {
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#ff0055';
            ctx.beginPath();
            ctx.arc(foodX * gridSize + gridSize/2, foodY * gridSize + gridSize/2, gridSize/2 - 2, 0, Math.PI * 2);
            ctx.fill();

            snake.forEach((segment, index) => {
                ctx.fillStyle = index === 0 ? '#fff' : '#00ffcc';
                ctx.fillRect(segment.x * gridSize + 1, segment.y * gridSize + 1, gridSize - 2, gridSize - 2);
            });
        }

        function placeFood() {
            foodX = Math.floor(Math.random() * tileCountX);
            foodY = Math.floor(Math.random() * tileCountY);
            
            for (let i = 0; i < snake.length; i++) {
                if (snake[i].x === foodX && snake[i].y === foodY) {
                    placeFood();
                    break;
                }
            }
        }

        function gameOver() {
            gameActive = false;
            clearInterval(gameLoop);
            finalScoreElement.innerText = score;
            gameOverScreen.style.display = 'block';
        }

        function resetGame() {
            initGame();
        }

        window.addEventListener('keydown', e => {
            if (!gameActive) return;
            switch (e.key) {
                case 'ArrowUp': if (dy !== 1) { dx = 0; dy = -1; } break;
                case 'ArrowDown': if (dy !== -1) { dx = 0; dy = 1; } break;
                case 'ArrowLeft': if (dx !== 1) { dx = -1; dy = 0; } break;
                case 'ArrowRight': if (dx !== -1) { dx = 1; dy = 0; } break;
            }
        });

        document.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, {passive: false});

        document.addEventListener('touchmove', e => {
            e.preventDefault(); 
        }, {passive: false});

        document.addEventListener('touchend', e => {
            if (!gameActive) return;
            
            let touchEndX = e.changedTouches[0].screenX;
            let touchEndY = e.changedTouches[0].screenY;
            
            let swipeDx = touchEndX - touchStartX;
            let swipeDy = touchEndY - touchStartY;
            
            if (Math.abs(swipeDx) > Math.abs(swipeDy)) {
                if (swipeDx > 30 && dx !== -1) { dx = 1; dy = 0; }
                else if (swipeDx < -30 && dx !== 1) { dx = -1; dy = 0; }
            } else {
                if (swipeDy > 30 && dy !== -1) { dx = 0; dy = 1; }
                else if (swipeDy < -30 && dy !== 1) { dx = 0; dy = -1; }
            }
        }, {passive: false});

        initGame();
    </script>
</body>
</html>
