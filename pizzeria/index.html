<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Pizza Nostra | Prawdziwa Włoska Pizza</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent-green: #22c55e;
            --accent-red: #ef4444;
            --accent-white: #f8fafc;
            --text-muted: #94a3b8;
            --gold: #fbbf24;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--accent-white); line-height: 1.6; overflow-x: hidden; }
        h1, h2, h3, .brand { font-family: 'Playfair Display', serif; }
        html { scroll-behavior: smooth; }

        .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px);
            padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .nav-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .logo { font-size: 1.5rem; font-weight: 900; color: var(--accent-white); text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .logo span:nth-child(1) { color: var(--accent-green); }
        .logo span:nth-child(2) { color: var(--accent-white); }
        .logo span:nth-child(3) { color: var(--accent-red); }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: var(--text-muted); text-decoration: none; font-weight: 600; font-size: 0.9rem; transition: 0.3s; }

        header {
            height: 90vh; display: flex; align-items: center; justify-content: center; text-align: center;
            background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.7)), 
                        url('https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=2070&auto=format&fit=crop');
            background-size: cover; background-position: center; padding: 20px;
        }
        .hero-h1 { font-size: clamp(3rem, 8vw, 6rem); line-height: 1; margin-bottom: 20px; }
        .badge { display: inline-block; padding: 5px 15px; border: 1px solid var(--accent-green); color: var(--accent-green); border-radius: 50px; font-weight: 700; margin-bottom: 20px; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px; }

        .container { max-width: 1200px; margin: 0 auto; padding: 80px 20px; }
        .section-header { text-align: center; margin-bottom: 60px; }
        .section-header h2 { font-size: 3rem; margin-bottom: 10px; }

        .menu-filters { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 40px; }
        .filter-btn {
            background: transparent; border: 1px solid var(--card-bg); color: var(--text-muted);
            padding: 10px 25px; border-radius: 50px; cursor: pointer; font-weight: 600; transition: 0.3s;
        }
        .filter-btn.active, .filter-btn:hover { background: var(--accent-white); color: var(--bg); border-color: var(--accent-white); }

        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .menu-item {
            background: var(--card-bg); padding: 25px; border-radius: 15px; cursor: pointer;
            transition: 0.3s; border: 1px solid transparent;
        }
        .menu-item:hover { background: #2d3a4f; border-color: rgba(255,255,255,0.1); transform: translateY(-5px); }
        .menu-item h3 { font-size: 1.2rem; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
        .menu-item p { font-size: 0.85rem; color: var(--text-muted); min-height: 45px; }
        .menu-price { color: var(--accent-green); font-weight: 800; margin-top: 15px; display: block; font-size: 1.1rem; }

        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95); z-index: 2000; display: none;
            align-items: center; justify-content: center; padding: 20px;
        }
        .modal-content {
            background: var(--card-bg); max-width: 500px; width: 100%; border-radius: 25px;
            padding: 40px; position: relative; border: 1px solid rgba(255,255,255,0.1);
        }
        .close-modal { position: absolute; top: 20px; right: 25px; font-size: 2rem; cursor: pointer; color: var(--text-muted); }
        
        .size-selector, .crust-selector { display: flex; gap: 10px; margin: 20px 0; }
        .size-btn, .crust-btn {
            flex: 1; padding: 10px; border: 1px solid #334155; border-radius: 10px;
            background: transparent; color: var(--accent-white); cursor: pointer; transition: 0.3s; font-size: 0.8rem;
        }
        .size-btn.active, .crust-btn.active { background: var(--accent-green); border-color: var(--accent-green); color: #000; font-weight: 700; }

        .btn-order {
            width: 100%; padding: 15px; background: var(--accent-red); color: white;
            border: none; border-radius: 12px; font-weight: 800; font-size: 1rem; cursor: pointer; margin-top: 20px;
        }

        .floating-cta {
            position: fixed; bottom: 30px; right: 30px; background: var(--accent-green);
            color: #000; padding: 15px 30px; border-radius: 50px; font-weight: 800;
            text-decoration: none; box-shadow: 0 10px 30px rgba(34, 197, 94, 0.4); z-index: 900;
        }

        footer { background: #020617; padding: 60px 20px; text-align: center; }

        @media (max-width: 768px) {
            .hero-h1 { font-size: 3.5rem; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-content">
            <a href="#" class="logo"><span>La</span><span>Pizza</span><span>Nostra</span></a>
            <div class="nav-links">
                <a href="#menu">Menu</a>
                <a href="tel:48000000000">Zadzwoń</a>
            </div>
        </div>
    </nav>

    <header>
        <div class="hero-content">
            <span class="badge">Włoska Pasja</span>
            <h1 class="hero-h1">La Pizza Nostra</h1>
            <p>50 unikalnych smaków. Od klasyków po piekielnie ostre wyzwania.</p>
        </div>
    </header>

    <div class="container">
        <section id="menu" class="reveal">
            <div class="section-header">
                <h2>Nasze Menu</h2>
                <p>Wybierz kategorię i znajdź swój ulubiony smak.</p>
            </div>

            <div class="menu-filters">
                <button class="filter-btn active" onclick="filterMenu('all')">Wszystkie (50)</button>
                <button class="filter-btn" onclick="filterMenu('klasyk')">Klasyki</button>
                <button class="filter-btn" onclick="filterMenu('ostra')">Ostre</button>
                <button class="filter-btn" onclick="filterMenu('wegetariańska')">Wegetariańskie</button>
                <button class="filter-btn" onclick="filterMenu('mięsna')">Mięsne</button>
            </div>

            <div id="pizza-list" class="menu-grid"></div>
        </section>
    </div>

    <footer>
        <p>ul. Neapolitańska 14, Warszawa | Projekt Portfolio 2026</p>
    </footer>

    <a href="tel:+48792198691" class="floating-cta">Zamów: +48 792 198 691</a>

    <div class="modal" id="pizzaModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closePizzaModal()">&times;</span>
            <h2 id="modalTitle"></h2>
            <p id="modalDesc"></p>
            
            <div style="margin-top: 25px;">
                <label style="font-size: 0.75rem; font-weight: 800;">ROZMIAR:</label>
                <div class="size-selector">
                    <button class="size-btn" onclick="selectSize(0, this)">24cm</button>
                    <button class="size-btn active" onclick="selectSize(1, this)">32cm</button>
                    <button class="size-btn" onclick="selectSize(2, this)">42cm</button>
                    <button class="size-btn" onclick="selectSize(3, this)">50cm</button>
                </div>
            </div>

            <div style="margin-top: 15px;">
                <label style="font-size: 0.75rem; font-weight: 800;">CIASTO:</label>
                <div class="crust-selector">
                    <button class="crust-btn active" onclick="selectCrust('cienkie', this)">Cienkie</button>
                    <button class="crust-btn" onclick="selectCrust('grube', this)">Grube (+2zł)</button>
                </div>
            </div>

            <div style="margin-top: 25px; border-top: 1px solid #334155; padding-top: 20px; display: flex; justify-content: space-between; align-items: center;">
                <span id="modalPrice" style="font-size: 1.8rem; font-weight: 900; color: var(--accent-green);"></span>
                <button class="btn-order" style="width: auto; padding: 12px 25px; margin:0;" onclick="alert('Dziękujemy za wybór! To jest strona pokazowa.')">ZAMÓW</button>
            </div>
        </div>
    </div>

    <script>
        const pizzas = [
            // KLASYKI (1-10)
            {id:1, name:"Margherita", desc:"Sos pomidorowy, mozzarella, świeża bazylia, oliwa extra vergine", cats:['klasyk','wegetariańska'], spicy:0, price:19},
            {id:2, name:"Capriciosa", desc:"Sos pomidorowy, mozzarella, szynka gotowana, pieczarki", cats:['klasyk'], spicy:0, price:24},
            {id:3, name:"Hawajska", desc:"Sos pomidorowy, mozzarella, szynka gotowana, soczysty ananas", cats:['klasyk'], spicy:0, price:24},
            {id:4, name:"Pepperoni", desc:"Sos pomidorowy, mozzarella, pikantne salami pepperoni", cats:['klasyk','mięsna'], spicy:0, price:26},
            {id:5, name:"Napoli", desc:"Sos pomidorowy, mozzarella, anchois, kapary, czarne oliwki", cats:['klasyk'], spicy:0, price:27},
            {id:6, name:"Quattro Formaggi", desc:"Sos pomidorowy, mozzarella, gorgonzola, parmezan, ricotta", cats:['klasyk','wegetariańska'], spicy:0, price:28},
            {id:7, name:"Vegetariana", desc:"Sos pomidorowy, mozzarella, grillowana cukinia, bakłażan, papryka", cats:['klasyk','wegetariańska'], spicy:0, price:25},
            {id:8, name:"Prosciutto e Funghi", desc:"Sos pomidorowy, mozzarella, szynka crudo, pieczarki, rukola", cats:['klasyk','mięsna'], spicy:0, price:29},
            {id:9, name:"Tonno e Cipolla", desc:"Sos pomidorowy, mozzarella, tuńczyk, czerwona cebula", cats:['klasyk'], spicy:0, price:26},
            {id:10, name:"Marinara", desc:"Sos pomidorowy, czosnek, oregano, oliwa (bez sera)", cats:['klasyk','wegetariańska'], spicy:0, price:18},
            
            // OSTRE (11-23)
            {id:11, name:"Diavola", desc:"Sos pomidorowy, mozzarella, salami piccante, jalapeno", cats:['ostra','mięsna'], spicy:1, price:28},
            {id:12, name:"Calabrese", desc:"Sos pomidorowy, mozzarella, nduja, salami piccante, cebula", cats:['ostra','mięsna'], spicy:2, price:30},
            {id:13, name:"Piekielna Uczta", desc:"Sos pomidorowy, mozzarella, habanero, ostra kiełbasa, tabasco", cats:['ostra','mięsna'], spicy:3, price:32},
            {id:14, name:"Etna", desc:"Sos pomidorowy, mozzarella, anchois, kapary, chilli, oliwki", cats:['ostra'], spicy:2, price:29},
            {id:15, name:"Vesuvio", desc:"Sos pomidorowy, mozzarella, pikantne salami, gorgonzola, chilli", cats:['ostra','mięsna'], spicy:1, price:30},
            {id:16, name:"Mexicana", desc:"Sos pomidorowy, wołowina, kukurydza, fasola, jalapeno", cats:['ostra','mięsna'], spicy:1, price:31},
            {id:17, name:"Ognisty Kurczak", desc:"Sos pomidorowy, kurczak marynowany w chilli, jalapeno", cats:['ostra','mięsna'], spicy:1, price:29},
            {id:18, name:"Chilli Cheese", desc:"Sos pomidorowy, cheddar, mozzarella, płatki chilli", cats:['ostra','wegetariańska'], spicy:1, price:27},
            {id:19, name:"Lucyfer", desc:"Sos pomidorowy, mozzarella, nduja, habanero, piri-piri", cats:['ostra','mięsna'], spicy:3, price:34},
            {id:20, name:"Arabiata", desc:"Sos pomidorowy, czosnek, świeże chilli, pietruszka", cats:['ostra','wegetariańska'], spicy:2, price:22},
            {id:21, name:"Inferno", desc:"Sos pomidorowy, salami piccante, cebula, habanero", cats:['ostra','mięsna'], spicy:3, price:31},
            {id:22, name:"Volcano", desc:"Biały sos, mozzarella, pikantna kiełbasa, jalapeno", cats:['ostra','mięsna'], spicy:2, price:30},
            {id:23, name:"Spicy Veg", desc:"Sos pomidorowy, mix warzyw, jalapeno, płatki chilli", cats:['ostra','wegetariańska'], spicy:1, price:26},

            // WEGE (24-37)
            {id:24, name:"Spinaci", desc:"Sos pomidorowy, świeży szpinak, czosnek, feta", cats:['wegetariańska'], spicy:0, price:26},
            {id:25, name:"Verde Bosco", desc:"Sos pomidorowy, borowiki, mozzarella, natka pietruszki", cats:['wegetariańska'], spicy:0, price:29},
            {id:26, name:"Pesto", desc:"Pesto bazyliowe, pomidorki cherry, mozzarella di bufala", cats:['wegetariańska'], spicy:0, price:31},
            {id:27, name:"Gorgonzola e Pere", desc:"Biały sos, mozzarella, gorgonzola, gruszka, orzechy", cats:['wegetariańska'], spicy:0, price:30},
            {id:28, name:"Melanzane", desc:"Sos pomidorowy, grillowany bakłażan, parmezan, bazylia", cats:['wegetariańska'], spicy:0, price:26},
            {id:29, name:"Tartufo", desc:"Biały sos, oliwa truflowa, pieczarki, rukola", cats:['wegetariańska'], spicy:0, price:32},
            {id:30, name:"Ricotta e noci", desc:"Biały sos, mozzarella, ricotta, orzechy włoskie, miód", cats:['wegetariańska'], spicy:0, price:29},
            {id:31, name:"Contadina Veg", desc:"Sos pomidorowy, kukurydza, groszek, papryka, cukinia", cats:['wegetariańska'], spicy:0, price:25},
            {id:32, name:"Bufala", desc:"Sos pomidorowy, mozzarella di bufala, bazylia, oliwa", cats:['wegetariańska'], spicy:0, price:33},
            {id:33, name:"Funghi Bianca", desc:"Biały sos, mix grzybów leśnych, czosnek, mozzarella", cats:['wegetariańska'], spicy:0, price:28},
            {id:34, name:"Asparagi", desc:"Sos pomidorowy, szparagi, mozzarella, jajko", cats:['wegetariańska'], spicy:0, price:29},
            {id:35, name:"Zucchine", desc:"Sos pomidorowy, grillowana cukinia, czosnek, parmezan", cats:['wegetariańska'], spicy:0, price:24},
            {id:36, name:"Formaggio Misto", desc:"Cheddar, mozzarella, feta, gorgonzola, oscypek", cats:['wegetariańska'], spicy:0, price:30},
            {id:37, name:"Veggie Hot", desc:"Sos pomidorowy, warzywa, chilli, czosnek", cats:['wegetariańska','ostra'], spicy:1, price:26},

            // MIĘSNE & PREMIUM (38-50)
            {id:38, name:"Bresaola", desc:"Sos pomidorowy, suszona wołowina, rukola, parmezan", cats:['mięsna'], spicy:0, price:36},
            {id:39, name:"Carbonara", desc:"Biały sos, boczek, żółtko jajka, pecorino romano", cats:['mięsna'], spicy:0, price:29},
            {id:40, name:"Contadina", desc:"Sos pomidorowy, wiejska kiełbasa, boczek, cebula", cats:['mięsna'], spicy:0, price:31},
            {id:41, name:"Frutti di Mare", desc:"Sos pomidorowy, krewetki, małże, kalmary, czosnek", cats:['mięsna'], spicy:0, price:38},
            {id:42, name:"Mortadella", desc:"Biały sos, włoska mortadela, pesto pistacjowe", cats:['mięsna'], spicy:0, price:35},
            {id:43, name:"Salmone", desc:"Biały sos, łosoś wędzony, koper, kapary", cats:['mięsna'], spicy:0, price:34},
            {id:44, name:"Salsiccia", desc:"Sos pomidorowy, włoska kiełbasa salsiccia, brokuły", cats:['mięsna'], spicy:0, price:31},
            {id:45, name:"Pollo BBQ", desc:"Sos BBQ, kurczak, czerwona cebula, kukurydza", cats:['mięsna'], spicy:0, price:28},
            {id:46, name:"Parma", desc:"Sos pomidorowy, szynka parmeńska, rukola, parmezan", cats:['mięsna'], spicy:0, price:33},
            {id:47, name:"Cacciatore", desc:"Sos pomidorowy, salami, pieczarki, czarne oliwki", cats:['mięsna'], spicy:0, price:29},
            {id:48, name:"Nduja Special", desc:"Sos pomidorowy, nduja, ricotta, miodowa glazura", cats:['mięsna','ostra'], spicy:2, price:32},
            {id:49, name:"Mare e Monti", desc:"Sos pomidorowy, krewetki, pieczarki, czosnek", cats:['mięsna'], spicy:0, price:34},
            {id:50, name:"Boczek e Jajo", desc:"Sos pomidorowy, chrupiący boczek, jajko, szczypiorek", cats:['mięsna'], spicy:0, price:28}
        ];

        let currentPizza = null;
        let selectedSizeIdx = 1;
        let crustExtra = 0;

        function renderMenu(filter = 'all') {
            const list = document.getElementById('pizza-list');
            list.innerHTML = '';
            pizzas.forEach(p => {
                if(filter === 'all' || p.cats.includes(filter)) {
                    const item = document.createElement('div');
                    item.className = 'menu-item reveal';
                    item.onclick = () => openPizza(p.id);
                    let icons = (p.cats.includes('wegetariańska') ? '🌱' : '') + '🌶️'.repeat(p.spicy);
                    item.innerHTML = `<h3>${p.name} <span>${icons}</span></h3><p>${p.desc}</p><span class="menu-price">od ${p.price.toFixed(2)} zł</span>`;
                    list.appendChild(item);
                }
            });
            setTimeout(() => { document.querySelectorAll('.reveal').forEach(el => el.classList.add('active')); }, 100);
        }

        function filterMenu(cat) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderMenu(cat);
        }

        function openPizza(id) {
            currentPizza = pizzas.find(p => p.id === id);
            selectedSizeIdx = 1;
            crustExtra = 0;
            document.getElementById('modalTitle').innerText = currentPizza.name;
            document.getElementById('modalDesc').innerText = currentPizza.desc;
            updatePrice();
            document.getElementById('pizzaModal').style.display = 'flex';
        }

        function closePizzaModal() { document.getElementById('pizzaModal').style.display = 'none'; }

        function selectSize(idx, btn) {
            selectedSizeIdx = idx;
            document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            updatePrice();
        }

        function selectCrust(type, btn) {
            crustExtra = (type === 'grube') ? 2 : 0;
            document.querySelectorAll('.crust-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            updatePrice();
        }

        function updatePrice() {
            const mult = [0.8, 1, 1.4, 1.8];
            let total = (currentPizza.price * mult[selectedSizeIdx]) + crustExtra;
            document.getElementById('modalPrice').innerText = total.toFixed(2) + ' zł';
        }

        window.onload = () => renderMenu();
        window.onclick = (e) => { if(e.target.id === 'pizzaModal') closePizzaModal(); }
    </script>
</body>
</html>
