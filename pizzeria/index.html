<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Pizza Nostra | Autentyczna Włoska Pizza</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent-green: #22c55e;
            --accent-red: #ef4444;
            --accent-white: #f8fafc;
            --text-muted: #94a3b8;
            --gold: #fbbf24;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--accent-white); line-height: 1.6; overflow-x: hidden; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        html { scroll-behavior: smooth; }

        .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px);
            padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .nav-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .logo { font-size: 1.5rem; font-weight: 900; color: var(--accent-white); text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .logo span:nth-child(1) { color: var(--accent-green); }
        .logo span:nth-child(2) { color: var(--accent-white); }
        .logo span:nth-child(3) { color: var(--accent-red); }

        header {
            height: 60vh; display: flex; align-items: center; justify-content: center; text-align: center;
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), 
                        url('https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=2070&auto=format&fit=crop');
            background-size: cover; background-position: center; padding: 20px;
        }
        .hero-h1 { font-size: clamp(3rem, 8vw, 5rem); line-height: 1; margin-bottom: 20px; }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        
        /* WYSZUKIWARKA I FILTRY */
        .menu-controls {
            position: sticky; top: 80px; z-index: 100; background: var(--bg);
            padding: 20px 0; margin-bottom: 40px; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .search-container { max-width: 600px; margin: 0 auto 20px; position: relative; }
        .search-input {
            width: 100%; padding: 15px 25px; border-radius: 50px; border: 2px solid var(--card-bg);
            background: var(--card-bg); color: white; font-size: 1rem; transition: 0.3s;
            outline: none; text-align: center;
        }
        .search-input:focus { border-color: var(--accent-green); background: #2d3a4f; }

        .menu-filters { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .filter-btn {
            background: #1e293b; border: 1px solid transparent; color: var(--text-muted);
            padding: 10px 20px; border-radius: 50px; cursor: pointer; font-weight: 600; transition: 0.3s; font-size: 0.85rem;
        }
        .filter-btn.active, .filter-btn:hover { background: var(--accent-white); color: var(--bg); }

        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .menu-item {
            background: var(--card-bg); padding: 25px; border-radius: 15px; cursor: pointer;
            transition: 0.3s; border: 1px solid transparent; display: flex; flex-direction: column; justify-content: space-between;
        }
        .menu-item:hover { border-color: rgba(255,255,255,0.2); transform: translateY(-5px); background: #2d3a4f; }
        .menu-item h3 { font-size: 1.1rem; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .menu-item p { font-size: 0.85rem; color: var(--text-muted); line-height: 1.5; margin-bottom: 15px; min-height: 40px; }
        .menu-price { color: var(--accent-green); font-weight: 800; }

        /* Modal */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95); z-index: 2000; display: none;
            align-items: center; justify-content: center; padding: 20px;
        }
        .modal-content {
            background: var(--card-bg); max-width: 450px; width: 100%; border-radius: 25px;
            padding: 30px; position: relative; border: 1px solid rgba(255,255,255,0.1);
        }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 2rem; cursor: pointer; color: var(--text-muted); }
        
        .size-selector, .crust-selector { display: flex; gap: 8px; margin: 15px 0; }
        .size-btn, .crust-btn {
            flex: 1; padding: 10px; border: 1px solid #334155; border-radius: 10px;
            background: transparent; color: var(--accent-white); cursor: pointer; transition: 0.3s; font-size: 0.75rem;
        }
        .size-btn.active, .crust-btn.active { background: var(--accent-green); border-color: var(--accent-green); color: #000; font-weight: 700; }

        .btn-order {
            width: 100%; padding: 15px; background: var(--accent-red); color: white;
            border: none; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 15px;
        }

        .floating-cta {
            position: fixed; bottom: 20px; right: 20px; background: var(--accent-green);
            color: #000; padding: 12px 25px; border-radius: 50px; font-weight: 800;
            text-decoration: none; z-index: 900; font-size: 0.9rem;
        }

        footer { background: #020617; padding: 40px 20px; text-align: center; font-size: 0.8rem; color: var(--text-muted); }

        @media (max-width: 768px) {
            .hero-h1 { font-size: 2.5rem; }
            .nav-content { justify-content: center; }
            .nav-links { display: none; }
            .menu-controls { top: 60px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-content">
            <a href="#" class="logo"><span>La</span><span>Pizza</span><span>Nostra</span></a>
        </div>
    </nav>

    <header>
        <div class="hero-content">
            <h1 class="hero-h1">La Pizza Nostra</h1>
            <p>Prawdziwa włoska receptura w Twoim mieście.</p>
        </div>
    </header>

    <div class="container">
        
        <div class="menu-controls">
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="Wyszukaj pizzę po nazwie..." oninput="handleSearch()">
            </div>
            <div class="menu-filters">
                <button class="filter-btn active" onclick="setFilter('all', this)">Wszystkie</button>
                <button class="filter-btn" onclick="setFilter('klasyk', this)">Klasyki</button>
                <button class="filter-btn" onclick="setFilter('ostra', this)">Ostre</button>
                <button class="filter-btn" onclick="setFilter('wegetariańska', this)">Wege</button>
                <button class="filter-btn" onclick="setFilter('mięsna', this)">Mięsne</button>
            </div>
        </div>

        <div id="pizza-list" class="menu-grid"></div>
        <div id="no-results" style="display:none; text-align:center; padding: 40px; color: var(--text-muted);">Nie znaleźliśmy pizzy o tej nazwie... Spróbuj wpisać coś innego!</div>
    </div>

    <footer>
        <p>ul. Neapolitańska 14, Warszawa | Projekt Portfolio Dawid | 2026</p>
    </footer>

    <a href="tel:+48792198691" class="floating-cta">Zadzwoń: +48 792 198 691</a>

    <div class="modal" id="pizzaModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closePizzaModal()">&times;</span>
            <h2 id="modalTitle"></h2>
            <p id="modalDesc"></p>
            
            <div style="margin-top: 20px;">
                <label style="font-size: 0.7rem; font-weight: 800; color: var(--accent-green);">ROZMIAR:</label>
                <div class="size-selector">
                    <button class="size-btn" onclick="selectSize(0, this)">24cm</button>
                    <button class="size-btn active" onclick="selectSize(1, this)">32cm</button>
                    <button class="size-btn" onclick="selectSize(2, this)">42cm</button>
                    <button class="size-btn" onclick="selectSize(3, this)">50cm</button>
                </div>
            </div>

            <div style="margin-top: 15px;">
                <label style="font-size: 0.7rem; font-weight: 800; color: var(--accent-green);">CIASTO:</label>
                <div class="crust-selector">
                    <button class="crust-btn active" onclick="selectCrust('cienkie', this)">Cienkie</button>
                    <button class="crust-btn" onclick="selectCrust('grube', this)">Grube (+2zł)</button>
                </div>
            </div>

            <div style="margin-top: 25px; border-top: 1px solid #334155; padding-top: 20px; display: flex; justify-content: space-between; align-items: center;">
                <span id="modalPrice" style="font-size: 1.8rem; font-weight: 900; color: var(--accent-green);"></span>
                <button class="btn-order" style="width: auto; padding: 12px 25px; margin:0;" onclick="alert('Strona demonstracyjna.')">ZAMÓW</button>
            </div>
        </div>
    </div>

            {id:16, name:"Mexicana", desc:"Sos pomidorowy, wołowina, kukurydza, fasola, jalapeno", cats:['ostra','mięsna'], spicy:1, price:31},

            {id:20, name:"Arabiata", desc:"Sos pomidorowy, czosnek, świeże chilli, pietruszka", cats:['ostra','wegetariańska'], spicy:2, price:22},

            {id:22, name:"Volcano", desc:"Biały sos, mozzarella, pikantna kiełbasa, jalapeno", cats:['ostra','mięsna'], spicy:2, price:30},

            {id:40, name:"Contadina", desc:"Sos pomidorowy, wiejska kiełbasa, boczek, cebula", cats:['mięsna'], spicy:0, price:31},
            {id:41, name:"Frutti di Mare", desc:"Sos pomidorowy, krewetki, małże, kalmary, czosnek", cats:['mięsna'], spicy:0, price:38},

            {id:43, name:"Salmone", desc:"Biały sos, łosoś wędzony, koper, kapary", cats:['mięsna'], spicy:0, price:34},
            {id:44, name:"Salsiccia", desc:"Sos pomidorowy, włoska kiełbasa salsiccia, brokuły", cats:['mięsna'], spicy:0, price:31},
            {id:45, name:"Pollo BBQ", desc:"Sos BBQ, kurczak, czerwona cebula, kukurydza", cats:['mięsna'], spicy:0, price:28},
            {id:46, name:"Parma", desc:"Sos pomidorowy, szynka parmeńska, rukola, parmezan", cats:['mięsna'], spicy:0, price:33},
            {id:47, name:"Cacciatore", desc:"Sos pomidorowy, salami, pieczarki, czarne oliwki", cats:['mięsna'], spicy:0, price:29},
            {id:48, name:"Nduja Special", desc:"Sos pomidorowy, nduja, ricotta, miodowa glazura", cats:['mięsna','ostra'], spicy:2, price:32},
            {id:49, name:"Mare e Monti", desc:"Sos pomidorowy, krewetki, pieczarki, czosnek", cats:['mięsna'], spicy:0, price:34},
            {id:50, name:"Boczek e Jajo", desc:"Sos pomidorowy, chrupiący boczek, jajko, szczypiorek", cats:['mięsna'], spicy:0, price:28}
        ];

        let currentCat = 'all';
        let currentSearch = '';
        let currentPizza = null;
        let selectedSizeIdx = 1;
        let crustExtra = 0;

        function renderMenu() {
            const list = document.getElementById('pizza-list');
            const noRes = document.getElementById('no-results');
            list.innerHTML = '';
            
            const filtered = pizzas.filter(p => {
                const matchesCat = currentCat === 'all' || p.cats.includes(currentCat);
                const matchesSearch = p.name.toLowerCase().includes(currentSearch.toLowerCase());
                return matchesCat && matchesSearch;
            });

            if(filtered.length === 0) {
                noRes.style.display = 'block';
            } else {
                noRes.style.display = 'none';
                filtered.forEach(p => {
                    const item = document.createElement('div');
                    item.className = 'menu-item reveal active';
                    item.onclick = () => openPizza(p.id);
                    let icons = (p.cats.includes('wegetariańska') ? ' 🌱' : '') + ' 🌶️'.repeat(p.spicy);
                    item.innerHTML = `<h3>${p.name} <span>${icons}</span></h3><p>${p.desc}</p><span class="menu-price">od ${p.price.toFixed(2)} zł</span>`;
                    list.appendChild(item);
                });
            }
        }

        function setFilter(cat, btn) {
            currentCat = cat;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderMenu();
        }

        function handleSearch() {
            currentSearch = document.getElementById('searchInput').value;
            renderMenu();
        }

        function openPizza(id) {
            currentPizza = pizzas.find(p => p.id === id);
            selectedSizeIdx = 1; crustExtra = 0;
            document.getElementById('modalTitle').innerText = currentPizza.name;
            document.getElementById('modalDesc').innerText = currentPizza.desc;
            updatePrice();
            document.getElementById('pizzaModal').style.display = 'flex';
        }

        function closePizzaModal() { document.getElementById('pizzaModal').style.display = 'none'; }
        function selectSize(idx, btn) {
            selectedSizeIdx = idx;
            document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active'); updatePrice();
        }
        function selectCrust(type, btn) {
            crustExtra = (type === 'grube') ? 2 : 0;
            document.querySelectorAll('.crust-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active'); updatePrice();
        }
        function updatePrice() {
            const mult = [0.8, 1, 1.4, 1.8];
            let total = (currentPizza.price * mult[selectedSizeIdx]) + crustExtra;
            document.getElementById('modalPrice').innerText = total.toFixed(2) + ' zł';
        }

        window.onload = () => renderMenu();
    </script>
</body>
</html>
