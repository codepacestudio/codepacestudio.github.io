<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>5 Sekund | 18+</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', -apple-system, sans-serif;
            user-select: none;
        }

        body {
            background-color: #0a050d;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #app-container {
            width: 100%;
            max-width: 450px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px 20px;
            background: radial-gradient(circle at top, #1a0b2e 0%, #0a050d 100%);
            position: relative;
        }

        /* Licznik czasu */
        #timer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }

        #timer-text {
            font-size: 5rem;
            font-weight: 800;
            color: #ff2a5f;
            text-shadow: 0 0 20px rgba(255, 42, 95, 0.5);
            line-height: 1;
            margin-bottom: 10px;
        }

        #progress-bar-bg {
            width: 100%;
            height: 8px;
            background-color: #22123b;
            border-radius: 4px;
            overflow: hidden;
        }

        #progress-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff2a5f, #7928ca);
            transform-origin: left;
            transition: transform 0.1s linear;
        }

        /* Główne okno pytania */
        #question-box {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            margin: 40px 0;
        }

        #question-text {
            font-size: 1.8rem;
            font-weight: 600;
            line-height: 1.4;
            color: #f3f4f6;
            min-height: 120px;
        }

        /* Przyciski i akcje */
        #controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        #btn-draw {
            background: linear-gradient(135deg, #7928ca, #ff2a5f);
            color: #white;
            box-shadow: 0 8px 25px rgba(255, 42, 95, 0.3);
        }

        #btn-start-timer {
            background-color: #ffffff;
            color: #0a050d;
            display: none;
        }

        /* Licznik pozostałych pytań */
        #counter {
            text-align: center;
            font-size: 0.85rem;
            color: #6b7280;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div id="app-container">
    <div id="timer-container">
        <div id="timer-text">5</div>
        <div id="progress-bar-bg">
            <div id="progress-bar"></div>
        </div>
    </div>

    <div id="question-box">
        <div id="question-text">Kliknij przycisk poniżej, aby wylosować pierwsze pikantne pytanie...</div>
    </div>

    <div id="controls">
        <button class="btn" id="btn-draw" onclick="drawQuestion()">Losuj pytanie</button>
        <button class="btn" id="btn-start-timer" onclick="startTimer()">Odpliczaj czas</button>
        <div id="counter">Pozostało pytań: <span id="questions-left">100</span>/100</div>
    </div>
</div>

    let currentQuestions = [...questionsPool];
    let timerInterval = null;
    let timeRemaining = 5;

    function drawQuestion() {
        if (currentQuestions.length === 0) {
            currentQuestions = [...questionsPool];
        }

        clearInterval(timerInterval);
        resetTimerUI();

        const randomIndex = Math.floor(Math.random() * currentQuestions.length);
        const question = currentQuestions.splice(randomIndex, 1)[0];

        document.getElementById('question-text').innerText = question;
        document.getElementById('questions-left').innerText = currentQuestions.length;
        
        document.getElementById('btn-start-timer').style.display = 'block';
    }

    function startTimer() {
        clearInterval(timerInterval);
        timeRemaining = 5;
        document.getElementById('timer-text').innerText = timeRemaining;
        
        const progressBar = document.getElementById('progress-bar');
        progressBar.style.transform = 'scaleX(1)';
        progressBar.style.transition = 'none';

        // Wymuszenie odświeżenia layoutu przed animacją
        progressBar.offsetHeight; 
        progressBar.style.transition = 'transform 5s linear';
        progressBar.style.transform = 'scaleX(0)';

        timerInterval = setInterval(() => {
            timeRemaining--;
            if (timeRemaining >= 0) {
                document.getElementById('timer-text').innerText = timeRemaining;
            }

            if (timeRemaining === 0) {
                clearInterval(timerInterval);
                document.getElementById('timer-text').innerText = "KONIEC!";
                // Opcjonalnie: możesz dodać tutaj dźwięk alarmu
            }
        }, 1000);
    }

    function resetTimerUI() {
        document.getElementById('timer-text').innerText = "5";
        const progressBar = document.getElementById('progress-bar');
        progressBar.style.transition = 'none';
        progressBar.style.transform = 'scaleX(1)';
        document.getElementById('btn-start-timer').style.display = 'none';
    }
